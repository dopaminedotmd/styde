<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard</title>
<style>
:root {
  --bg-primary: #0b0d11;
  --bg-secondary: #13161c;
  --bg-card: #1a1e26;
  --bg-hover: #222833;
  --bg-active: #2a3140;
  --border: #2a3140;
  --border-light: #363d4d;
  --text-primary: #e8eaed;
  --text-secondary: #9aa0ab;
  --text-muted: #636b7a;
  --accent-blue: #4b7bec;
  --accent-green: #2ed573;
  --accent-orange: #ffa502;
  --accent-red: #ff4757;
  --accent-purple: #7c5bf0;
  --accent-cyan: #17c0eb;
  --gradient-primary: linear-gradient(135deg, #4b7bec, #7c5bf0);
  --shadow-card: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-elevated: 0 8px 24px rgba(0,0,0,0.4);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 400ms ease;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

.app-layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
}

.sidebar {
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  padding: 24px 0;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.sidebar-logo {
  padding: 0 20px 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.sidebar-logo .logo-icon {
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  background: var(--gradient-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
}
.sidebar-logo .logo-text { font-size: 16px; font-weight: 600; color: var(--text-primary); }
.sidebar-nav { flex: 1; padding: 0 12px; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
  font-size: 14px;
  font-weight: 500;
  text-decoration: none;
  user-select: none;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active { background: var(--bg-active); color: var(--text-primary); }
.nav-item.active::before { content: ''; width: 3px; height: 20px; background: var(--accent-blue); border-radius: 2px; margin-left: -15px; position: absolute; }
.nav-item .nav-icon { font-size: 18px; width: 22px; text-align: center; }
.nav-item .nav-badge {
  margin-left: auto;
  background: var(--accent-red);
  color: #fff;
  font-size: 11px;
  padding: 1px 7px;
  border-radius: 10px;
  font-weight: 600;
}
.sidebar-footer {
  padding: 16px 20px 0;
  border-top: 1px solid var(--border);
  margin-top: 12px;
}

.main-content {
  padding: 24px 32px;
  max-width: 1400px;
  width: 100%;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 16px;
}
.header-left {}
.header-title { font-size: 22px; font-weight: 700; color: var(--text-primary); }
.header-subtitle { font-size: 14px; color: var(--text-muted); margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 12px; }

.search-box {
  display: flex;
  align-items: center;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  gap: 8px;
  min-width: 220px;
  transition: border-color var(--transition-fast);
}
.search-box:focus-within { border-color: var(--accent-blue); }
.search-box input {
  background: none;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-size: 13px;
  width: 100%;
  font-family: inherit;
}
.search-box input::placeholder { color: var(--text-muted); }
.search-box .search-icon { color: var(--text-muted); font-size: 15px; }

.header-actions { display: flex; gap: 8px; }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: all var(--transition-fast);
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent-blue);
  color: #fff;
}
.btn-primary:hover { background: #3d6ed9; box-shadow: 0 2px 8px rgba(75,123,236,0.35); }
.btn-secondary {
  background: var(--bg-card);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-light); }
.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  padding: 8px 10px;
}
.btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }

.date-range-selector {
  display: flex;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.date-range-selector .dr-btn {
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all var(--transition-fast);
  border: none;
  background: none;
  font-family: inherit;
}
.date-range-selector .dr-btn:hover { color: var(--text-secondary); background: var(--bg-hover); }
.date-range-selector .dr-btn.active { color: var(--accent-blue); background: var(--bg-active); }

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.kpi-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px;
  transition: all var(--transition-normal);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.kpi-card:hover {
  border-color: var(--border-light);
  box-shadow: var(--shadow-card);
  transform: translateY(-1px);
}
.kpi-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 3px;
}
.kpi-card:nth-child(1)::after { background: var(--accent-blue); }
.kpi-card:nth-child(2)::after { background: var(--accent-green); }
.kpi-card:nth-child(3)::after { background: var(--accent-orange); }
.kpi-card:nth-child(4)::after { background: var(--accent-purple); }
.kpi-top { display: flex; justify-content: space-between; align-items: flex-start; }
.kpi-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
.kpi-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 18px; }
.kpi-card:nth-child(1) .kpi-icon { background: rgba(75,123,236,0.15); color: var(--accent-blue); }
.kpi-card:nth-child(2) .kpi-icon { background: rgba(46,213,115,0.15); color: var(--accent-green); }
.kpi-card:nth-child(3) .kpi-icon { background: rgba(255,165,2,0.15); color: var(--accent-orange); }
.kpi-card:nth-child(4) .kpi-icon { background: rgba(124,91,240,0.15); color: var(--accent-purple); }
.kpi-value { font-size: 28px; font-weight: 700; margin-top: 12px; color: var(--text-primary); }
.kpi-change { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 500; margin-top: 4px; }
.kpi-change.up { color: var(--accent-green); }
.kpi-change.down { color: var(--accent-red); }
.kpi-period { font-size: 12px; color: var(--text-muted); margin-top: 8px; }

.charts-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px;
}
.chart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.chart-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
.chart-legend { display: flex; gap: 16px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }
.chart-canvas { width: 100%; height: 260px; }

.table-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
}
.table-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.table-title { font-size: 15px; font-weight: 600; }
.table-actions { display: flex; gap: 8px; }
.data-table {
  width: 100%;
  border-collapse: collapse;
}
.data-table th {
  text-align: left;
  padding: 10px 20px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
  cursor: pointer;
  user-select: none;
  transition: color var(--transition-fast);
}
.data-table th:hover { color: var(--text-secondary); }
.data-table th.sort-asc::after { content: ' \25B2'; font-size: 9px; }
.data-table th.sort-desc::after { content: ' \25BC'; font-size: 9px; }
.data-table td {
  padding: 12px 20px;
  font-size: 13px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  transition: background var(--transition-fast);
}
.data-table tr:hover td { background: var(--bg-hover); }
.data-table tr:last-child td { border-bottom: none; }
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
}
.status-badge.active { background: rgba(46,213,115,0.12); color: var(--accent-green); }
.status-badge.pending { background: rgba(255,165,2,0.12); color: var(--accent-orange); }
.status-badge.failed { background: rgba(255,71,87,0.12); color: var(--accent-red); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; }
.status-badge.active .status-dot { background: var(--accent-green); }
.status-badge.pending .status-dot { background: var(--accent-orange); }
.status-badge.failed .status-dot { background: var(--accent-red); }

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  text-align: center;
}
.empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
.empty-state-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
.empty-state-desc { font-size: 13px; color: var(--text-muted); max-width: 300px; }

.error-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
  background: rgba(255,71,87,0.06);
  border: 1px solid rgba(255,71,87,0.2);
  border-radius: var(--radius-md);
  margin: 16px;
}
.error-state-icon { font-size: 36px; margin-bottom: 12px; }
.error-state-title { font-size: 15px; font-weight: 600; color: var(--accent-red); margin-bottom: 4px; }
.error-state-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }
.error-retry-btn { padding: 6px 16px; background: var(--accent-red); color: #fff; border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 500; transition: opacity var(--transition-fast); }
.error-retry-btn:hover { opacity: 0.85; }

.skeleton {
  background: linear-gradient(90deg, var(--bg-hover) 25%, var(--bg-active) 50%, var(--bg-hover) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s ease-in-out infinite;
  border-radius: 4px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton-kpi { height: 90px; border-radius: var(--radius-md); }
.skeleton-chart { height: 300px; border-radius: var(--radius-md); }
.skeleton-row { height: 44px; width: 100%; margin-bottom: 1px; }

.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px;
  width: 90%;
  max-width: 520px;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: var(--shadow-elevated);
  animation: modalIn var(--transition-normal) ease-out;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.modal-title { font-size: 18px; font-weight: 600; }
.modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: var(--bg-hover);
  color: var(--text-muted);
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
}
.modal-close:hover { background: var(--bg-active); color: var(--text-primary); }
.modal-body { margin-bottom: 20px; }
.modal-detail-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.modal-detail-label { color: var(--text-muted); }
.modal-detail-value { color: var(--text-primary); font-weight: 500; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; }

.toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  color: #fff;
  animation: toastIn 0.3s ease-out;
  box-shadow: var(--shadow-elevated);
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: opacity var(--transition-fast);
}
.toast.success { background: var(--accent-green); }
.toast.error { background: var(--accent-red); }
.toast.info { background: var(--accent-blue); }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}

@media (max-width: 1100px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .charts-grid { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .app-layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main-content { padding: 16px; }
  .kpi-grid { grid-template-columns: 1fr; }
  .header { flex-direction: column; align-items: stretch; }
  .header-right { flex-direction: column; }
  .search-box { min-width: 100%; }
  .date-range-selector { width: 100%; justify-content: center; }
  .data-table { font-size: 12px; }
  .data-table th, .data-table td { padding: 8px 12px; }
}
@media (max-width: 480px) {
  .header-title { font-size: 18px; }
  .kpi-value { font-size: 24px; }
}
</style>
</head>

<script id="dataStore">
window.AppState = class AppState {
  constructor() {
    this._state = {
      currentRoute: 'overview',
      dateRange: '7d',
      loading: true,
      error: null,
      kpis: [],
      chartData: { revenue: [], users: [] },
      tableData: [],
      selectedRow: null,
      searchQuery: ''
    };
    this._listeners = new Map();
    this._id = 0;
  }

  get(key) { return this._state[key]; }
  set(key, value) {
    const prev = this._state[key];
    if (prev === value) return;
    this._state[key] = value;
    this._notify(key, value, prev);
  }
  update(partial) {
    for (const key in partial) {
      this.set(key, partial[key]);
    }
  }

  on(key, fn) {
    if (!this._listeners.has(key)) this._listeners.set(key, new Map());
    const id = ++this._id;
    this._listeners.get(key).set(id, fn);
    return () => { const m = this._listeners.get(key); if (m) m.delete(id); };
  }

  _notify(key, value, prev) {
    const m = this._listeners.get(key);
    if (m) m.forEach(fn => { try { fn(value, prev); } catch(e) { console.warn('State listener error:', e); } });
    const all = this._listeners.get('*');
    if (all) all.forEach(fn => { try { fn(key, value, prev); } catch(e) { console.warn('State listener error:', e); } });
  }
};
</script>

<script id="apiClient">
window.ApiClient = class ApiClient {
  constructor(baseUrl = '/api') {
    this.baseUrl = baseUrl;
    this.retries = 2;
    this.retryDelay = 1000;
  }

  async get(endpoint, signal) {
    return this._request('GET', endpoint, null, signal);
  }

  async post(endpoint, data, signal) {
    return this._request('POST', endpoint, data, signal);
  }

  async _request(method, endpoint, body, signal) {
    let lastError = null;
    const url = this.baseUrl + endpoint;

    for (let attempt = 0; attempt <= this.retries; attempt++) {
      try {
        const opts = {
          method,
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          signal
        };
        if (body) opts.body = JSON.stringify(body);

        const res = await fetch(url, opts);

        if (!res.ok) {
          const errText = await res.text().catch(() => '');
          throw new Error(`HTTP ${res.status}: ${errText || res.statusText}`);
        }

        const text = await res.text();
        if (!text) return {};
        const data = JSON.parse(text);
        return { data, ok: true };
      } catch (err) {
        lastError = err;
        if (err.name === 'AbortError') throw err;
        if (attempt < this.retries) {
          await new Promise(r => setTimeout(r, this.retryDelay * (attempt + 1)));
        }
      }
    }
    return { ok: false, error: lastError.message || 'Request failed after retries' };
  }
};
</script>

<script id="chartEngine">
window.ChartEngine = class ChartEngine {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.dpr = window.devicePixelRatio || 1;
  }

  resize() {
    const rect = this.canvas.getBoundingClientRect();
    this.canvas.width = rect.width * this.dpr;
    this.canvas.height = rect.height * this.dpr;
    this.ctx.scale(this.dpr, this.dpr);
    this.w = rect.width;
    this.h = rect.height;
  }

  drawLineChart(data, opts = {}) {
    this.resize();
    const ctx = this.ctx;
    const w = this.w;
    const h = this.h;
    const pad = { top: 20, right: 16, bottom: 32, left: 48 };
    const innerW = w - pad.left - pad.right;
    const innerH = h - pad.top - pad.bottom;

    ctx.clearRect(0, 0, w, h);

    const color = opts.color || '#4b7bec';
    const label = opts.label || '';
    const fillColor = opts.fillColor || null;
    const points = opts.points ?? true;
    const smooth = opts.smooth ?? true;

    if (!data || data.length < 2) {
      ctx.fillStyle = '#636b7a';
      ctx.font = '13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('No data available', w/2, h/2);
      return;
    }

    const max = Math.max(...data) * 1.1;
    const min = 0;
    const range = max - min || 1;

    const toX = (i) => pad.left + (i / (data.length - 1)) * innerW;
    const toY = (v) => pad.top + innerH - ((v - min) / range) * innerH;

    const lineY = toY(0);

    ctx.beginPath();
    ctx.strokeStyle = '#2a3140';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = pad.top + (i / 4) * innerH;
      ctx.moveTo(pad.left, y);
      ctx.lineTo(w - pad.right, y);
    }
    ctx.stroke();

    if (fillColor) {
      ctx.beginPath();
      if (smooth && data.length > 2) {
        ctx.moveTo(toX(0), lineY);
        for (let i = 0; i < data.length; i++) {
          if (i === 0) {
            ctx.lineTo(toX(i), toY(data[i]));
          } else {
            const xc = (toX(i) + toX(i-1)) / 2;
            const yc = (toY(data[i]) + toY(data[i-1])) / 2;
            ctx.quadraticCurveTo(toX(i-1), toY(data[i-1]), xc, yc);
          }
        }
        ctx.lineTo(toX(data.length-1), lineY);
      } else {
        ctx.moveTo(toX(0), lineY);
        data.forEach((v, i) => ctx.lineTo(toX(i), toY(v)));
        ctx.lineTo(toX(data.length-1), lineY);
      }
      ctx.closePath();
      const grad = ctx.createLinearGradient(0, pad.top, 0, h - pad.bottom);
      grad.addColorStop(0, fillColor.replace('0.15', '0.15').replace(')', ', 0.15)'));
      const baseColor = fillColor;
      grad.addColorStop(1, baseColor.replace('0.15', '0.02').replace(')', ', 0.02)'));
      ctx.fillStyle = grad;
      ctx.fill();
    }

    ctx.beginPath();
    if (smooth && data.length > 2) {
      ctx.moveTo(toX(0), toY(data[0]));
      for (let i = 1; i < data.length; i++) {
        const xc = (toX(i) + toX(i-1)) / 2;
        const yc = (toY(data[i]) + toY(data[i-1])) / 2;
        ctx.quadraticCurveTo(toX(i-1), toY(data[i-1]), xc, yc);
      }
      ctx.lineTo(toX(data.length-1), toY(data[data.length-1]));
    } else {
      data.forEach((v, i) => {
        if (i === 0) ctx.moveTo(toX(i), toY(v));
        else ctx.lineTo(toX(i), toY(v));
      });
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.stroke();

    if (points) {
      data.forEach((v, i) => {
        if (i % Math.max(1, Math.floor(data.length / 10)) === 0 || i === data.length - 1) {
          ctx.beginPath();
          ctx.arc(toX(i), toY(v), 3, 0, Math.PI * 2);
          ctx.fillStyle = color;
          ctx.fill();
          ctx.strokeStyle = '#13161c';
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      });
    }

    ctx.fillStyle = '#636b7a';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    const step = Math.max(1, Math.floor(data.length / 6));
    for (let i = 0; i < data.length; i += step) {
      ctx.fillText(`D${i+1}`, toX(i), h - 8);
    }

    ctx.textAlign = 'right';
    for (let i = 0; i <= 4; i++) {
      const val = min + (i / 4) * range;
      const y = pad.top + innerH - (i / 4) * innerH;
      ctx.fillText(val >= 1000 ? (val/1000).toFixed(1) + 'k' : val.toFixed(0), pad.left - 8, y + 3);
    }
  }

  drawDoughnutChart(values, labels, colors) {
    this.resize();
    const ctx = this.ctx;
    const w = this.w;
    const h = this.h;
    const cx = w / 2;
    const cy = h / 2;
    const radius = Math.min(w, h) * 0.38;
    const innerRadius = radius * 0.6;

    ctx.clearRect(0, 0, w, h);

    const total = values.reduce((a, b) => a + b, 0);
    if (total === 0) {
      ctx.fillStyle = '#636b7a';
      ctx.font = '13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('No data', cx, cy + 4);
      return;
    }

    let startAngle = -Math.PI / 2;
    values.forEach((val, i) => {
      const slice = (val / total) * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, startAngle, startAngle + slice);
      ctx.arc(cx, cy, innerRadius, startAngle + slice, startAngle, true);
      ctx.closePath();
      ctx.fillStyle = colors[i % colors.length];
      ctx.fill();
      startAngle += slice;
    });

    ctx.beginPath();
    ctx.arc(cx, cy, innerRadius, 0, Math.PI * 2);
    ctx.fillStyle = '#1a1e26';
    ctx.fill();

    ctx.fillStyle = '#e8eaed';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(total.toLocaleString(), cx, cy - 4);
    ctx.fillStyle = '#636b7a';
    ctx.font = '11px sans-serif';
    ctx.fillText('Total', cx, cy + 16);
  }
};
</script>

<script id="dashboardApp">
(function() {

const state = new window.AppState();
const api = new window.ApiClient();

function simulateApi(type, delay = 600, failRate = 0) {
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => {
      if (Math.random() < failRate) {
        reject(new Error('Network error: request timed out'));
      } else {
        resolve(MockData[type] || {});
      }
    }, delay);
    if (state.get('_abortSignal')) {
      state.get('_abortSignal').addEventListener('abort', () => {
        clearTimeout(timer);
        reject(new DOMException('Aborted', 'AbortError'));
      });
    }
  });
}

async function loadDashboard() {
  state.set('loading', true);
  state.set('error', null);
  const ac = new AbortController();
  state.set('_abortSignal', ac.signal);

  try {
    renderSkeletons();
    const [kpis, chartData, tableData] = await Promise.all([
      simulateApi('kpis', 700, 0),
      simulateApi('chartData', 900, 0),
      simulateApi('tableData', 500, 0)
    ]);
    state.update({ kpis: kpis, chartData: chartData, tableData: tableData, loading: false });
    renderAll();
  } catch (err) {
    if (err.name === 'AbortError') return;
    state.set('error', err.message || 'Failed to load dashboard data');
    state.set('loading', false);
    renderError();
  }
}

function renderSkeletons() {

const _sortState = {};
function sortTable(key, dir) {
  const data = [...(state.get('tableData') || [])];
  data.sort((a, b) => {
    let va = a[key], vb = b[key];
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return dir === 'asc' ? -1 : 1;
    if (va > vb) return dir === 'asc' ? 1 : -1;
    return 0;
  });
  state.set('_sortedData', data);
  const query = state.get('searchQuery') || '';
  const filtered = query ? data.filter(r => r.name.toLowerCase().includes(query.toLowerCase())) : data;
  const tbody = document.getElementById('tableBody');
  if (tbody) {
    tbody.innerHTML = filtered.map(row => `
      <tr data-id="${row.id}">
        <td><strong style="color:var(--text-primary);font-weight:500">${row.name}</strong></td>
        <td><span class="status-badge ${row.status}"><span class="status-dot"></span> ${row.status.charAt(0).toUpperCase() + row.status.slice(1)}</span></td>
        <td>${row.revenue}</td>
        <td>${row.users}</td>
        <td>${row.lastActive}</td>
      </tr>
    `).join('');
  }
}

function handleAddProject() {

  document.getElementById('modalBody').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:12px">
      <div><label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px">Project Name</label>
      <input type="text" id="newProjectName" placeholder="Enter project name" style="width:100%;padding:8px 12px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:inherit;font-size:13px" /></div>
      <div><label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px">Initial Status</label>
      <select id="newProjectStatus" style="width:100%;padding:8px 12px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:inherit;font-size:13px">
        <option value="active">Active</option>
        <option value="pending">Pending</option>
        <option value="failed">Failed</option>
      </select></div>
    </div>
  `;
  document.getElementById('modalActionBtn').textContent = 'Create';
  const existingHandler = document.getElementById('modalActionBtn')._clickHandler;
  if (existingHandler) document.getElementById('modalActionBtn').removeEventListener('click', existingHandler);
  const handler = () => {
    const name = document.getElementById('newProjectName').value.trim();
    if (!name) { showToast('Project name is required', 'error'); return; }
    const status = document.getElementById('newProjectStatus').value;
    const newRow = {
      id: Date.now(),
      name: name,
      status: status,
      revenue: '$0',
      users: 0,
      lastActive: new Date().toISOString().split('T')[0]
    };
    const data = [...(state.get('tableData') || []), newRow];
    state.set('tableData', data);
    renderTable();
    closeModal();
    showToast(`Project "${name}" created`, 'success');
  };
  document.getElementById('modalActionBtn').addEventListener('click', handler);
  document.getElementById('modalActionBtn')._clickHandler = handler;
  modal.classList.add('open');
}

function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  const icons = { success: '\u2713', error: '\u2717', info: '\u2139' };
  toast.innerHTML = `${icons[type] || ''} ${message}`;
  toast.addEventListener('click', () => toast.remove());
  container.appendChild(toast);
  setTimeout(() => {
    if (toast.parentNode) {
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 300);
    }
  }, 3500);
}

function setupEventBindings() {
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
      const route = item.dataset.route;
      state.set('currentRoute', route);
      if (route === 'overview') {
        document.getElementById('pageTitle').textContent = 'Analytics Overview';
        document.getElementById('pageSubtitle').textContent = 'Monitor your key metrics and performance';
        loadDashboard();
      } else {
        document.getElementById('pageTitle').textContent = route.charAt(0).toUpperCase() + route.slice(1);
        document.getElementById('pageSubtitle').textContent = 'Coming soon';
        document.getElementById('kpiGrid').innerHTML = '';
        document.getElementById('chartsGrid').innerHTML = '';
        document.getElementById('tableSection').innerHTML = '';
        showToast(`Navigated to ${route}`, 'info');
      }
    });
  });

  document.querySelectorAll('.dr-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.dr-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.set('dateRange', btn.dataset.range);
      showToast(`Showing ${btn.textContent.trim()} data`, 'info');
    });
  });

  document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
  document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
  document.getElementById('detailModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('detailModal')) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  document.getElementById('refreshBtn').addEventListener('click', () => {
    showToast('Refreshing data...', 'info');
    loadDashboard();
  });

  document.getElementById('searchInput').addEventListener('input', (e) => {
    state.set('searchQuery', e.target.value);
    renderTable();
  });

  document.getElementById('notifBtn').addEventListener('click', () => {
    showToast('No new notifications', 'info');
  });
}

document.addEventListener('DOMContentLoaded', () => {
  setupEventBindings();
  loadDashboard();
});

})();
</script>
</body>
</html>
