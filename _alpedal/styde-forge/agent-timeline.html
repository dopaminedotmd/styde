<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Styde Forge — Agent Lifecycle Timeline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI','SF Pro',system-ui,sans-serif;padding:20px;overflow-x:hidden}
h1{font-size:20px;font-weight:600;color:#f0f6fc;margin-bottom:4px}
.subtitle{color:#8b949e;font-size:13px;margin-bottom:20px}
.controls{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.controls button{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;transition:.15s}
.controls button:hover{background:#30363d;border-color:#58a6ff}
.controls button.active{background:#1f6feb;border-color:#58a6ff;color:#fff}
.slider-wrap{flex:1;min-width:200px;display:flex;align-items:center;gap:10px}
.slider-wrap label{font-size:12px;color:#8b949e;white-space:nowrap}
input[type=range]{flex:1;height:4px;background:#30363d;border-radius:2px;accent-color:#58a6ff}
.time-display{font-size:12px;color:#8b949e;font-family:monospace;min-width:160px}
.legend{display:flex;gap:16px;margin-bottom:14px;font-size:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.dot.gold{background:#ffd700;box-shadow:0 0 6px rgba(255,215,0,.5)}
.dot.amber{background:#f0883e;box-shadow:0 0 4px rgba(240,136,62,.4)}
.dot.cool{background:#58a6ff;box-shadow:0 0 4px rgba(88,166,255,.3)}
#timeline-wrap{overflow-x:auto;overflow-y:visible;padding-bottom:10px;border:1px solid #30363d;border-radius:8px;background:#161b22;position:relative}
#timeline{min-width:1200px}
.track-labels{position:sticky;left:0;z-index:2;background:#161b22}
.track-label{height:32px;display:flex;align-items:center;padding:0 12px;font-size:11px;color:#8b949e;white-space:nowrap;border-bottom:1px solid #21262d}
.track-label .count{color:#484f58;margin-left:6px;font-size:10px}
.popup{display:none;position:fixed;z-index:100;background:#1c2128;border:1px solid #30363d;border-radius:8px;padding:14px 16px;box-shadow:0 8px 24px rgba(0,0,0,.5);min-width:260px;max-width:340px;pointer-events:auto}
.popup.show{display:block}
.popup h3{font-size:14px;color:#f0f6fc;margin-bottom:6px}
.popup .row{display:flex;justify-content:space-between;padding:2px 0;font-size:12px}
.popup .row .k{color:#8b949e}
.popup .row .v{color:#c9d1d9;font-family:monospace}
.popup .close{position:absolute;top:8px;right:10px;color:#484f58;cursor:pointer;font-size:16px;line-height:1}
.popup .close:hover{color:#f0f6fc}
#stats{display:flex;gap:20px;margin-bottom:14px;font-size:12px;flex-wrap:wrap}
.stat{display:flex;gap:6px;align-items:baseline}
.stat .num{font-size:18px;font-weight:700;color:#f0f6fc}
.stat .lbl{color:#8b949e}
.tooltip-node{cursor:pointer;transition:r .1s}
.tooltip-node:hover{filter:brightness(1.3)}
.promotion-badge{fill:#238636;font-size:9px;font-family:monospace}
.node-time{font-size:9px;fill:#484f58;font-family:monospace}
</style>
</head>
<body>

<h1>Styde Forge — Agent Lifecycle Timeline</h1>
<p class="subtitle">Agent spawn → eval → improve → promote cycles across all blueprints</p>

<div id="stats"></div>

<div class="legend">
  <span class="legend-item"><span class="dot gold"></span> 85+ (Production ready)</span>
  <span class="legend-item"><span class="dot amber"></span> 70–84 (Improving)</span>
  <span class="legend-item"><span class="dot cool"></span> &lt;70 (Early / Failed)</span>
  <span class="legend-item"><span style="background:#238636;width:10px;height:10px;border-radius:2px;display:inline-block"></span> Promoted</span>
</div>

<div class="controls">
  <button id="playBtn">Play</button>
  <button id="resetBtn">Reset</button>
  <div class="slider-wrap">
    <label>Time</label>
    <input type="range" id="timeSlider" min="0" max="1000" value="1000">
    <span class="time-display" id="timeDisplay">—</span>
  </div>
</div>

<div id="timeline-wrap">
  <svg id="timeline" viewBox="0 0 1400 0"></svg>
</div>

<div class="popup" id="popup">
  <span class="close" id="popupClose">&times;</span>
  <h3 id="popupTitle"></h3>
  <div id="popupBody"></div>
</div>

  {bp:"agent-promotion-evaluator",id:5,d:"2026-06-29T21:12:46Z",s:82,j:80,c:80.8,st:"eval"},
  {bp:"agent-promotion-evaluator",id:19,d:"2026-06-29T21:06:43Z",s:5,j:62,c:39.2,st:"eval"},
  {bp:"agent-promotion-evaluator",id:9,d:"2026-06-29T20:55:26Z",s:93,j:94,c:93.6,st:"eval"},

// Parse timestamps, sort
EVAL_EVENTS.forEach(e=>{e.ts=new Date(e.d);e.uid=e.bp+'-'+e.id});
EVAL_EVENTS.sort((a,b)=>a.ts-b.ts);

const t0 = EVAL_EVENTS[0].ts.getTime();
const t1 = EVAL_EVENTS[EVAL_EVENTS.length-1].ts.getTime();
const span = t1 - t0;

// Group by blueprint
const bpMap = {};
EVAL_EVENTS.forEach(e=>{
  if(!bpMap[e.bp]) bpMap[e.bp]=[];
  bpMap[e.bp].push(e);
});
const bpNames = Object.keys(bpMap).sort();

// Stats
const totalEvals = EVAL_EVENTS.length;
const golds = EVAL_EVENTS.filter(e=>e.c>=85).length;
const promoted = EVAL_EVENTS.filter(e=>e.st==='promote').length;
document.getElementById('stats').innerHTML =
  `<div class="stat"><span class="num">${totalEvals}</span><span class="lbl">eval events</span></div>` +
  `<div class="stat"><span class="num">${bpNames.length}</span><span class="lbl">blueprints</span></div>` +
  `<div class="stat"><span class="num" style="color:#ffd700">${golds}</span><span class="lbl">≥85</span></div>` +
  `<div class="stat"><span class="num" style="color:#f0883e">${totalEvals-golds}</span><span class="lbl">&lt;85</span></div>` +
  `<div class="stat"><span class="num" style="color:#238636">${promoted}</span><span class="lbl">promoted</span></div>`;

// SVG constants
const MARGIN_L = 260;
const MARGIN_R = 60;
const TRACK_H = 32;
const PAD_Y = 16;
const SVG_W = 1400;
const PLOT_L = MARGIN_L;
const PLOT_R = SVG_W - MARGIN_R;
const PLOT_W = PLOT_R - PLOT_L;

const totalH = bpNames.length * TRACK_H + PAD_Y * 2;
const svg = document.getElementById('timeline');
svg.setAttribute('viewBox', `0 0 ${SVG_W} ${totalH}`);
svg.setAttribute('height', totalH);

function xPos(ts){
  const p = (ts.getTime() - t0) / span;
  return PLOT_L + p * PLOT_W;
}

function scoreColor(c){
  if(c>=85) return '#ffd700';
  if(c>=70) return '#f0883e';
  return '#58a6ff';
}

function scoreRadius(c){
  if(c>=85) return 6;
  if(c>=70) return 5;
  return 4;
}

// Draw grid
const grid = document.createElementNS('http://www.w3.org/2000/svg','g');
svg.appendChild(grid);

// Hourly gridlines
const hourMs = 3600000;
const gridStart = Math.floor(t0/hourMs)*hourMs;
for(let g=gridStart; g<=t1; g+=hourMs){
  const gd = new Date(g);
  if(gd < EVAL_EVENTS[0].ts) continue;
  const gx = xPos(gd);
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',gx); line.setAttribute('y1',PAD_Y);
  line.setAttribute('x2',gx); line.setAttribute('y2',totalH-PAD_Y);
  line.setAttribute('stroke','#21262d');
  line.setAttribute('stroke-width','1');
  grid.appendChild(line);
  const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
  lbl.setAttribute('x',gx); lbl.setAttribute('y',PAD_Y-4);
  lbl.setAttribute('text-anchor','middle');
  lbl.setAttribute('fill','#484f58');
  lbl.setAttribute('font-size','9');
  lbl.setAttribute('font-family','monospace');
  lbl.textContent = `${String(gd.getUTCHours()).padStart(2,'0')}:00`;
  grid.appendChild(lbl);
}

// Track labels + lines
bpNames.forEach((bp,i)=>{
  const y = PAD_Y + i * TRACK_H + TRACK_H/2;
  // label bg
  const lblBg = document.createElementNS('http://www.w3.org/2000/svg','rect');
  lblBg.setAttribute('x',0); lblBg.setAttribute('y',y-TRACK_H/2);
  lblBg.setAttribute('width',MARGIN_L-8); lblBg.setAttribute('height',TRACK_H);
  lblBg.setAttribute('fill','#161b22');
  svg.appendChild(lblBg);
  // label text
  const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
  lbl.setAttribute('x',12); lbl.setAttribute('y',y+4);
  lbl.setAttribute('fill','#c9d1d9');
  lbl.setAttribute('font-size','11');
  lbl.setAttribute('font-family','monospace');
  lbl.textContent = bp;
  svg.appendChild(lbl);
  // track line
  const tline = document.createElementNS('http://www.w3.org/2000/svg','line');
  tline.setAttribute('x1',PLOT_L); tline.setAttribute('y1',y);
  tline.setAttribute('x2',PLOT_R); tline.setAttribute('y2',y);
  tline.setAttribute('stroke','#21262d');
  tline.setAttribute('stroke-width','1');
  svg.appendChild(tline);
});

// Popup
const popup = document.getElementById('popup');
const popupTitle = document.getElementById('popupTitle');
const popupBody = document.getElementById('popupBody');

function showPopup(e, evt){
  const bpDisplay = evt.bp.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  popupTitle.textContent = bpDisplay + ' — Agent #' + evt.id;
  const isPromote = evt.st === 'promote' || evt.p;
  popupBody.innerHTML =
    (isPromote ? '<div class="row"><span class="k">Stage</span><span class="v" style="color:#238636">Promoted</span></div>' :
    `<div class="row"><span class="k">Stage</span><span class="v">${evt.st||'eval'}</span></div>`) +
    `<div class="row"><span class="k">Run ID</span><span class="v">#${evt.id}</span></div>` +
    (evt.st!=='spawn' && !isPromote ? `
    <div class="row"><span class="k">Self-score</span><span class="v">${evt.s}</span></div>
    <div class="row"><span class="k">Judge score</span><span class="v">${evt.j}</span></div>
    <div class="row"><span class="k">Composite</span><span class="v" style="color:${scoreColor(evt.c)};font-weight:700">${evt.c}</span></div>
    <div class="row"><span class="k">Timestamp</span><span class="v">${evt.d}</span></div>` :
    `<div class="row"><span class="k">Timestamp</span><span class="v">${evt.d}</span></div>`);
  const rect = e.target.getBoundingClientRect();
  let px = rect.right + 12;
  let py = rect.top - 10;
  if(px+340 > window.innerWidth) px = rect.left - 350;
  if(py < 10) py = 10;
  if(py+200 > window.innerHeight) py = window.innerHeight - 220;
  popup.style.left = px+'px';
  popup.style.top = py+'px';
  popup.classList.add('show');
}
document.getElementById('popupClose').onclick = ()=>popup.classList.remove('show');
document.addEventListener('click',e=>{if(!e.target.closest('.popup')&&!e.target.closest('.tooltip-node'))popup.classList.remove('show')});

// Draw nodes
const nodeGroups = [];
bpNames.forEach((bp,i)=>{
  const y = PAD_Y + i * TRACK_H + TRACK_H/2;
  const events = bpMap[bp];
  events.forEach(evt=>{
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    const x = xPos(evt.ts);
    const r = scoreRadius(evt.c);
    // connecting line from previous event on same blueprint
    // node circle
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',x); circle.setAttribute('cy',y);
    circle.setAttribute('r',r);
    const isPromote = evt.st === 'promote' || evt.p;
    if(isPromote){
      circle.setAttribute('fill','#238636');
      circle.setAttribute('stroke','#2ea043');
      circle.setAttribute('stroke-width','2');
      // promotion badge
      const badge = document.createElementNS('http://www.w3.org/2000/svg','text');
      badge.setAttribute('x',x); badge.setAttribute('y',y+3);
      badge.setAttribute('text-anchor','middle');
      badge.setAttribute('fill','#fff');
      badge.setAttribute('font-size','8');
      badge.setAttribute('font-weight','bold');
      badge.setAttribute('class','promotion-badge');
      badge.textContent = 'P';
      g.appendChild(badge);
    } else if(evt.st==='spawn'){
      circle.setAttribute('fill','none');
      circle.setAttribute('stroke','#484f58');
      circle.setAttribute('stroke-width','1.5');
      circle.setAttribute('stroke-dasharray','2,2');
    } else {
      circle.setAttribute('fill',scoreColor(evt.c));
    }
    circle.classList.add('tooltip-node');
    circle.addEventListener('click',e=>showPopup(e,evt));
    g.appendChild(circle);
    // time label for nodes that are far apart
    const prev = events.indexOf(evt) > 0 ? events[events.indexOf(evt)-1] : null;
    if(!prev || Math.abs(evt.ts-prev.ts) > hourMs*2){
      const tl = document.createElementNS('http://www.w3.org/2000/svg','text');
      tl.setAttribute('x',x); tl.setAttribute('y',y-12);
      tl.setAttribute('text-anchor','middle');
      tl.setAttribute('fill','#484f58');
      tl.setAttribute('font-size','8');
      tl.setAttribute('font-family','monospace');
      tl.setAttribute('class','node-time');
      tl.textContent = evt.d.slice(11,16);
      g.appendChild(tl);
    }
    svg.appendChild(g);
    nodeGroups.push({g,evt,x,y});
  });
});

// Time scrubber
const slider = document.getElementById('timeSlider');
const timeDisplay = document.getElementById('timeDisplay');
let currentCutoff = t1;

function fmtTime(ts){
  const d = new Date(ts);
  return d.toISOString().slice(11,19)+'Z';
}

function applyCutoff(cutoff){
  currentCutoff = cutoff;
  timeDisplay.textContent = fmtTime(cutoff) + ' — showing';
  // show/hide nodes based on cutoff
  nodeGroups.forEach(({g,evt})=>{
    g.style.display = evt.ts.getTime() <= cutoff ? 'block' : 'none';
  });
  // count visible
  const visible = nodeGroups.filter(n=>n.evt.ts.getTime()<=cutoff).length;
  timeDisplay.textContent = fmtTime(cutoff) + ` — ${visible}/${totalEvals}`;
}

slider.addEventListener('input',()=>{
  const pct = parseInt(slider.value)/1000;
  const cutoff = t0 + pct * span;
  applyCutoff(cutoff);
});

applyCutoff(t1);

// Auto-play
const playBtn = document.getElementById('playBtn');
let playing = false;
let playInterval = null;

playBtn.addEventListener('click',()=>{
  if(playing){
    clearInterval(playInterval);
    playBtn.textContent = 'Play';
    playBtn.classList.remove('active');
    playing = false;
    return;
  }
  playing = true;
  playBtn.textContent = 'Pause';
  playBtn.classList.add('active');
  slider.value = '0';
  const stepMs = span / 200;
  let cur = t0;
  playInterval = setInterval(()=>{
    cur += stepMs;
    const pct = ((cur - t0) / span) * 1000;
    slider.value = Math.min(1000, Math.round(pct));
    applyCutoff(cur);
    if(cur >= t1){
      clearInterval(playInterval);
      playBtn.textContent = 'Play';
      playBtn.classList.remove('active');
      playing = false;
      slider.value = '1000';
      applyCutoff(t1);
    }
  }, 60);
});

document.getElementById('resetBtn').addEventListener('click',()=>{
  if(playing){
    clearInterval(playInterval);
    playBtn.textContent = 'Play';
    playing = false;
  }
  slider.value = '1000';
  applyCutoff(t1);
});

// Handle promote events on the timeline specially
// We already included the promote node for aesthetic-style-composer id:22

console.log('Agent Timeline loaded. Blueprints:', bpNames.length, 'Events:', totalEvals);
</script>
