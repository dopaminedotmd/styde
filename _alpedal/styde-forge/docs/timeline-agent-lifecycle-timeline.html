.controls button:hover { background:#30363d; }

.legend { display:flex; gap:16px; padding:4px 24px 12px; font-size:11px; align-items:center; }
.legend-item { display:flex; align-items:center; gap:4px; }
.legend-dot { width:10px; height:10px; border-radius:50%; }
#timeline { overflow-x:auto; padding:0 24px; }
.track { display:flex; align-items:center; height:28px; margin:1px 0; position:relative; cursor:pointer; border-radius:4px; }
.track:hover { background:#161b22; }

.track-lane { position:relative; flex:1; height:24px; }
.node { position:absolute; top:50%; transform:translate(-50%,-50%); width:12px; height:12px; border-radius:50%; cursor:pointer; transition:all .15s; border:1.5px solid rgba(0,0,0,.4); z-index:2; }
.node:hover { width:18px; height:18px; z-index:10; filter:brightness(1.3); }
.node.spawn { background:#58a6ff; }
.node.eval { background:#d29922; }
.node.improve { background:#3fb950; }
.node.score-hot { background:#d29922; border-color:#f0883e; box-shadow:0 0 6px rgba(240,136,62,.5); }
.node.score-amber { background:#d29922; }
.node.score-cool { background:#8b949e; }
.connector { position:absolute; top:50%; height:2px; background:#21262d; z-index:1; }
#popup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#161b22; border:1px solid #30363d; border-radius:8px; padding:16px; z-index:100; min-width:320px; max-width:420px; box-shadow:0 8px 32px rgba(0,0,0,.5); }
#popup h2 { font-size:14px; margin-bottom:8px; color:#f0f6fc; }
#popup table { width:100%; border-collapse:collapse; font-size:12px; }
#popup td { padding:3px 6px; border-bottom:1px solid #21262d; }
#popup td:first-child { color:#8b949e; width:60px; }
#popup td:nth-child(2) { color:#c9d1d9; }
#popup .detail-cell { max-width:260px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#popup .close { float:right; cursor:pointer; color:#8b949e; font-size:16px; }
#popup .close:hover { color:#f0f6fc; }
#overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:99; }
.stats { display:flex; gap:24px; padding:4px 24px 12px; font-size:11px; color:#8b949e; }
.stats span { color:#c9d1d9; font-weight:600; }
</style>
</head>

      }
      prevX = x;

      let cls = 'node ' + e.action;
      const dm = e.detail.match(/C:([\d.]+)/);
      if (dm) {
        const score = parseFloat(dm[1]);
        if (score >= 85) cls += ' score-hot';
        else if (score >= 70) cls += ' score-amber';
        else cls += ' score-cool';
      }

      html += '<div class="' + cls + '" style="left:' + x + '%;" title="' + e.action.toUpperCase() + ' ' + new Date(e.time).toISOString().slice(11,19) + '" onclick="event.stopPropagation();showPopup(' + a.id + ',' + i + ')"></div>';
    }

    html += '</div></div>';
  }
  timeline.innerHTML = html || '<div style="padding:20px;color:#8b949e;font-size:13px;">No agents match current filters in this time window.</div>';
}

function showPopup(agentId, eventIdx) {
  const a = AGENTS.find(x => x.id === agentId);
  if (!a) return;
  const e = a.events[eventIdx];
  const dm = e.detail.match(/C:([\d.]+)/);
  const sm = e.detail.match(/S:([\d.]+)/);
  const jm = e.detail.match(/J:([\d.]+)/);
  const detailText = e.detail.length > 80 ? e.detail.slice(0,80) + '...' : e.detail;

  let rows = '';
  rows += '<tr><td>run_id</td><td>#' + a.id + '</td></tr>';
  rows += '<tr><td>action</td><td>' + e.action + '</td></tr>';
  rows += '<tr><td>time</td><td>' + new Date(e.time).toISOString().slice(0,19).replace('T',' ') + '</td></tr>';
  if (dm) rows += '<tr><td>score</td><td><strong>' + dm[1] + '</strong></td></tr>';
  if (sm) rows += '<tr><td>semantic</td><td>' + sm[1] + '</td></tr>';
  if (jm) rows += '<tr><td>json</td><td>' + jm[1] + '</td></tr>';
  rows += '<tr><td>stage</td><td>' + e.action + '</td></tr>';
  rows += '<tr><td>version</td><td>iter ' + (eventIdx+1) + '/' + a.events.length + '</td></tr>';
  rows += '<tr><td>detail</td><td class="detail-cell" title="' + e.detail.replace(/"/g,'&quot;') + '">' + detailText + '</td></tr>';
  rows += '<tr><td>status</td><td>' + a.status + '</td></tr>';

  document.getElementById('popupTitle').textContent = 'Agent #' + a.id + ' -- ' + e.action.toUpperCase();
  document.getElementById('popupBody').innerHTML = rows;
  document.getElementById('popup').style.display = 'block';
  document.getElementById('overlay').style.display = 'block';
}

document.getElementById('popupClose').onclick = function() {
  document.getElementById('popup').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
};
document.getElementById('overlay').onclick = function() {
  document.getElementById('popup').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
};

let playing = false;
let playInterval = null;
playBtn.onclick = function() {
  if (playing) {
    playing = false;
    clearInterval(playInterval);
    playBtn.textContent = 'Play';
    playBtn.className = '';
  } else {
    playing = true;
    playBtn.textContent = 'Pause';
    playBtn.className = 'active';
    playInterval = setInterval(() => {
      let v = parseInt(scrubber.value);
      if (v >= 100) { v = 0; }
      else { v += 1; }
      scrubber.value = v;
      render();
    }, 80);
  }
};

scrubber.oninput = render;
showStuck.onchange = render;
showPromoted.onchange = render;

render();
</script>
</body>
</html>
