<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
#header { padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; flex-wrap: wrap; gap: 8px; }
#header h1 { font-size: 16px; font-weight: 600; color: #58a6ff; }
#header .stats { font-size: 12px; color: #8b949e; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
#header .stats span { display: flex; align-items: center; gap: 4px; }
.legend { display: flex; gap: 12px; font-size: 11px; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.legend-dot.gold { background: #ffd700; }
.legend-dot.amber { background: #ff8c00; }
.legend-dot.cool { background: #58a6ff; }
.legend-dot.muted { background: #21262d; border: 1px solid #30363d; }
#main { display: flex; flex: 1; overflow: hidden; }
#labels { width: 200px; min-width: 200px; overflow-y: auto; overflow-x: hidden; background: #0d1117; border-right: 1px solid #21262d; flex-shrink: 0; }
#labels::-webkit-scrollbar, #canvas-wrap::-webkit-scrollbar { width: 6px; }
#labels::-webkit-scrollbar-thumb, #canvas-wrap::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
.label-row { height: 28px; display: flex; align-items: center; padding: 0 10px; font-size: 11px; color: #8b949e; border-bottom: 1px solid #161b22; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
.label-row:hover { background: #161b22; color: #c9d1d9; }
.label-row.active { background: #1f2937; color: #58a6ff; }
#canvas-wrap { flex: 1; overflow: auto; position: relative; }
#timeline-svg { display: block; }
#controls { padding: 8px 20px; background: #161b22; border-top: 1px solid #30363d; flex-shrink: 0; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
#controls button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
#controls button:hover { background: #30363d; }
#controls button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
#scrubber-wrap { flex: 1; display: flex; align-items: center; gap: 8px; min-width: 200px; }
#scrubber-wrap label { font-size: 11px; color: #8b949e; min-width: 100px; white-space: nowrap; }
#scrubber { flex: 1; accent-color: #58a6ff; height: 4px; }
#popup { display: none; position: fixed; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; z-index: 100; min-width: 280px; max-width: 420px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
#popup h3 { font-size: 14px; color: #58a6ff; margin-bottom: 8px; }
#popup .row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; gap: 8px; }
#popup .row .key { color: #8b949e; flex-shrink: 0; }
#popup .row .val { color: #c9d1d9; font-weight: 500; text-align: right; }
#popup .detail { margin-top: 8px; font-size: 11px; color: #8b949e; line-height: 1.5; max-height: 80px; overflow-y: auto; }
#popup .close { position: absolute; top: 8px; right: 10px; cursor: pointer; color: #8b949e; font-size: 16px; }
#popup .close:hover { color: #f85149; }
.tooltip { position: fixed; display: none; background: #21262d; border: 1px solid #30363d; border-radius: 4px; padding: 6px 10px; font-size: 11px; pointer-events: none; z-index: 99; white-space: nowrap; }
#filter-wrap { display: flex; align-items: center; gap: 6px; }
#filter-wrap select { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 3px 6px; border-radius: 4px; font-size: 11px; max-width: 180px; }
</style>
</head>

<script>
var state = { events: [], blueprints: [], timeStart: null, timeEnd: null, playing: false, playTimer: null, currentFrame: 0, bpFilter: 'all', animating: false };

function init() {
  if (TIMELINE_DATA && TIMELINE_DATA.events && TIMELINE_DATA.events.length > 0) {
    state.events = TIMELINE_DATA.events;
    state.blueprints = TIMELINE_DATA.blueprints;
    state.timeStart = new Date(TIMELINE_DATA.time_start);
    state.timeEnd = new Date(TIMELINE_DATA.time_end);
  }
  if (state.events.length === 0) {
    document.getElementById('stat-events').textContent = 'No data loaded';
    document.getElementById('stat-range').textContent = 'No data';
    document.getElementById('time-label').textContent = 'No data';
    document.getElementById('time-label-end').textContent = '';
    return;
  }
  document.getElementById('stat-events').textContent = state.events.length + ' events';
  document.getElementById('stat-bps').textContent = state.blueprints.length + ' blueprints';
  document.getElementById('stat-range').textContent = fmtDate(state.timeStart) + ' - ' + fmtDate(state.timeEnd);
  document.getElementById('time-label').textContent = fmtDate(state.timeStart);
  document.getElementById('time-label-end').textContent = fmtDate(state.timeEnd);

  var sel = document.getElementById('bp-filter');
  state.blueprints.forEach(function(bp) {
    var opt = document.createElement('option');
    opt.value = bp;
    opt.textContent = bp;
    sel.appendChild(opt);
  });

  sel.addEventListener('change', function() {
    state.bpFilter = sel.value;
    render();
  });

  document.getElementById('scrubber').addEventListener('input', function() {
    if (state.animating) return;
    state.currentFrame = parseInt(this.value);
    render();
  });

  document.getElementById('btn-play').addEventListener('click', togglePlay);
  document.getElementById('btn-reset').addEventListener('click', function() {
    state.currentFrame = 0;
    document.getElementById('scrubber').value = 0;
    render();
  });
  document.getElementById('popup-close').addEventListener('click', function() {
    document.getElementById('popup').style.display = 'none';
  });
  document.addEventListener('click', function(e) {
    var popup = document.getElementById('popup');
    if (popup.style.display === 'block' && !popup.contains(e.target) && e.target.tagName !== 'circle') {
      popup.style.display = 'none';
    }
  });

  render();
}

function fmtDate(d) {
  if (!d) return '-';
  var s = d.toISOString();
  return s.replace('T', ' ').substring(0, 16);
}

function fmtTime(d) {
  if (!d) return '';
  var h = String(d.getHours()).padStart(2,'0');
  var m = String(d.getMinutes()).padStart(2,'0');
  return h + ':' + m;
}

function scoreColor(score) {
  if (score === null || score === undefined) return '#21262d';
  if (score >= 85) return '#ffd700';
  if (score >= 70) return '#ff8c00';
  return '#58a6ff';
}

function togglePlay() {
  state.playing = !state.playing;
  var btn = document.getElementById('btn-play');
  btn.textContent = state.playing ? 'Pause' : 'Play';
  btn.classList.toggle('active', state.playing);
  if (state.playing) {
    if (state.currentFrame >= state.maxFrame) state.currentFrame = 0;
    state.playTimer = setInterval(function() {
      if (state.currentFrame >= state.maxFrame) {
        state.currentFrame = 0;
      }
      state.currentFrame++;
      document.getElementById('scrubber').value = state.currentFrame;
      state.animating = true;
      render();
      state.animating = false;
    }, 400);
  } else {
    clearInterval(state.playTimer);
    state.playTimer = null;
  }
}

function getVisibleEvents(frame) {
  var sorted = state.events.slice().sort(function(a, b) {
    return new Date(a.timestamp) - new Date(b.timestamp);
  });
  var idx = Math.min(frame, sorted.length - 1);
  var cutoff = sorted[idx];
  if (!cutoff) return [];
  var cutoffTime = new Date(cutoff.timestamp).getTime();

  var filtered = state.events.filter(function(e) {
    var et = new Date(e.timestamp).getTime();
    return et <= cutoffTime;
  });

  if (state.bpFilter !== 'all') {
    filtered = filtered.filter(function(e) { return e.blueprint === state.bpFilter; });
  }
  return filtered;
}

function render() {
  var svg = document.getElementById('timeline-svg');
  var wrap = document.getElementById('canvas-wrap');
  var labelsDiv = document.getElementById('labels');

  var visibleEvents = getVisibleEvents(state.currentFrame);
  state.maxFrame = state.events.length - 1;

  var bpSet = {};
  var bpEvents = {};
  visibleEvents.forEach(function(e) {
    bpSet[e.blueprint] = true;
    if (!bpEvents[e.blueprint]) bpEvents[e.blueprint] = [];
    bpEvents[e.blueprint].push(e);
  });
  var activeBps = [];
  if (state.bpFilter === 'all') {
    state.blueprints.forEach(function(b) {
      if (bpSet[b]) activeBps.push(b);
    });
  } else {
    activeBps = [state.bpFilter];
  }

  var rowH = 28;
  var margin = { top: 10, bottom: 28, left: 10, right: 20 };
  var trackH = activeBps.length * rowH;
  var svgH = trackH + margin.top + margin.bottom;

  var timeMin = state.timeStart.getTime();
  var timeMax = state.timeEnd.getTime();
  var rangeT = timeMax - timeMin;
  var svgW = Math.max(wrap.clientWidth - 10, 600);

  svg.setAttribute('width', svgW);
  svg.setAttribute('height', Math.max(svgH, 50));
  svg.innerHTML = '';

  document.getElementById('scrubber').max = state.events.length - 1;

  var curEvent = visibleEvents.length > 0 ? visibleEvents[visibleEvents.length - 1] : null;
  if (curEvent) {
    document.getElementById('time-label').textContent = fmtDate(new Date(curEvent.timestamp));
  }

  // Build labels
  labelsDiv.innerHTML = '';
  activeBps.forEach(function(bp) {
    var div = document.createElement('div');
    div.className = 'label-row' + (state.bpFilter === bp ? ' active' : '');
    div.textContent = bp;
    div.title = bp;
    labelsDiv.appendChild(div);
  });

  if (activeBps.length === 0) {
    svg.innerHTML = '<text x="20" y="30" fill="#8b949e" font-size="13">No events match filter</text>';
    return;
  }

  // Glow filter defs
  var defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  var filter = document.createElementNS('http://www.w3.org/2000/svg', 'filter');
  filter.setAttribute('id', 'glow');
  filter.setAttribute('x', '-50%');
  filter.setAttribute('y', '-50%');
  filter.setAttribute('width', '200%');
  filter.setAttribute('height', '200%');
  var blur = document.createElementNS('http://www.w3.org/2000/svg', 'feGaussianBlur');
  blur.setAttribute('stdDeviation', '2');
  blur.setAttribute('result', 'blur');
  filter.appendChild(blur);
  var merge = document.createElementNS('http://www.w3.org/2000/svg', 'feMerge');
  var mn1 = document.createElementNS('http://www.w3.org/2000/svg', 'feMergeNode');
  mn1.setAttribute('in', 'blur');
  merge.appendChild(mn1);
  var mn2 = document.createElementNS('http://www.w3.org/2000/svg', 'feMergeNode');
  mn2.setAttribute('in', 'SourceGraphic');
  merge.appendChild(mn2);
  filter.appendChild(merge);
  defs.appendChild(filter);
  svg.appendChild(defs);

  // Grid lines
  var gridCount = Math.min(12, Math.floor(svgW / 70));
  for (var i = 0; i <= gridCount; i++) {
    var t = timeMin + (rangeT * i / gridCount);
    var x = margin.left + ((t - timeMin) / rangeT) * (svgW - margin.left - margin.right);
    var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x);
    line.setAttribute('y1', margin.top);
    line.setAttribute('x2', x);
    line.setAttribute('y2', svgH - margin.bottom);
    line.setAttribute('stroke', '#21262d');
    line.setAttribute('stroke-width', '1');
    svg.appendChild(line);
    var d = new Date(t);
    var label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', x);
    label.setAttribute('y', svgH - 6);
    label.setAttribute('fill', '#8b949e');
    label.setAttribute('font-size', '9');
    label.setAttribute('text-anchor', 'middle');
    label.textContent = fmtTime(d);
    svg.appendChild(label);
  }

  // Draw timeline
  activeBps.forEach(function(bp, bi) {
    var y = margin.top + bi * rowH + rowH / 2;
    var events = bpEvents[bp] || [];

    // Track line
    var tline = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    tline.setAttribute('x1', margin.left);
    tline.setAttribute('y1', y);
    tline.setAttribute('x2', svgW - margin.right);
    tline.setAttribute('y2', y);
    tline.setAttribute('stroke', '#21262d');
    tline.setAttribute('stroke-width', '1');
    svg.appendChild(tline);

    // Connect events with lines
    var sorted = events.slice().sort(function(a, b) {
      return new Date(a.timestamp) - new Date(b.timestamp);
    });
    for (var i = 1; i < sorted.length; i++) {
      var t1 = new Date(sorted[i-1].timestamp).getTime();
      var t2 = new Date(sorted[i].timestamp).getTime();
      var x1 = margin.left + ((t1 - timeMin) / rangeT) * (svgW - margin.left - margin.right);
      var x2 = margin.left + ((t2 - timeMin) / rangeT) * (svgW - margin.left - margin.right);
      var cline = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      cline.setAttribute('x1', x1);
      cline.setAttribute('y1', y);
      cline.setAttribute('x2', x2);
      cline.setAttribute('y2', y);
      cline.setAttribute('stroke', '#30363d');
      cline.setAttribute('stroke-width', '0.5');
      cline.setAttribute('stroke-dasharray', '3,3');
      svg.insertBefore(cline, svg.firstChild);
    }

    // Event circles
    events.forEach(function(e) {
      var et = new Date(e.timestamp).getTime();
      var x = margin.left + ((et - timeMin) / rangeT) * (svgW - margin.left - margin.right);
      var hasScore = e.score !== null && e.score !== undefined;
      var color = hasScore ? scoreColor(e.score) : '#21262d';
      var r = hasScore ? 5 : 3;

      var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', x);
      circle.setAttribute('cy', y);
      circle.setAttribute('r', r);
      circle.setAttribute('fill', color);
      circle.setAttribute('stroke', hasScore ? '#0d1117' : '#30363d');
      circle.setAttribute('stroke-width', '1.5');
      if (hasScore && e.score >= 85) circle.setAttribute('filter', 'url(#glow)');
      circle.setAttribute('data-run-id', e.run_id);
      circle.setAttribute('data-blueprint', e.blueprint);
      circle.setAttribute('data-action', e.action);
      circle.setAttribute('data-score', e.score !== null && e.score !== undefined ? e.score : '');
      circle.setAttribute('data-detail', e.detail || '');
      circle.setAttribute('data-timestamp', e.timestamp);
      circle.setAttribute('data-progress', e.progress);
      circle.setAttribute('data-status', e.status);
      circle.style.cursor = 'pointer';

      (function(c) {
        c.addEventListener('mouseenter', function(evt) {
          var tip = document.getElementById('tooltip');
          var a = c.getAttribute('data-action');
          var bp = c.getAttribute('data-blueprint');
          var rid = c.getAttribute('data-run-id');
          var sc = c.getAttribute('data-score');
          var ts = c.getAttribute('data-timestamp');
          if (ts) ts = ts.substring(0, 16).replace('T', ' ');
          var txt = a + ' #' + rid + ' - ' + bp;
          if (sc) txt += ' (C:' + sc + ')';
          tip.textContent = txt;
          tip.style.display = 'block';
          tip.style.left = (evt.clientX + 12) + 'px';
          tip.style.top = (evt.clientY - 10) + 'px';
        });
        c.addEventListener('mousemove', function(evt) {
          var tip = document.getElementById('tooltip');
          tip.style.left = (evt.clientX + 12) + 'px';
          tip.style.top = (evt.clientY - 10) + 'px';
        });
        c.addEventListener('mouseleave', function() {
          document.getElementById('tooltip').style.display = 'none';
        });
        c.addEventListener('click', function(evt) {
          var popup = document.getElementById('popup');
          document.getElementById('popup-title').textContent =
            c.getAttribute('data-action') + ' #' + c.getAttribute('data-run-id');
          var bp = c.getAttribute('data-blueprint');
          var sc = c.getAttribute('data-score');
          var ts = c.getAttribute('data-timestamp');
          var det = c.getAttribute('data-detail');
          var prog = c.getAttribute('data-progress');
          var st = c.getAttribute('data-status');

          var html = '';
          html += '<div class="row"><span class="key">Blueprint</span><span class="val">' + bp + '</span></div>';
          html += '<div class="row"><span class="key">Run ID</span><span class="val">#' + c.getAttribute('data-run-id') + '</span></div>';
          html += '<div class="row"><span class="key">Action</span><span class="val">' + c.getAttribute('data-action') + '</span></div>';
          html += '<div class="row"><span class="key">Timestamp</span><span class="val">' + (ts ? ts.substring(0, 19).replace('T', ' ') : '-') + '</span></div>';
          html += '<div class="row"><span class="key">Progress</span><span class="val">' + prog + '%</span></div>';
          html += '<div class="row"><span class="key">Status</span><span class="val">' + st + '</span></div>';
          if (sc) html += '<div class="row"><span class="key">Score (C)</span><span class="val" style="color:' + scoreColor(parseFloat(sc)) + '">' + sc + '</span></div>';
          if (det && det.length > 0 && det !== 'iter 1/5' && det.indexOf('C:') < 0) {
            html += '<div class="row" style="flex-direction:column;align-items:flex-start"><span class="key">Detail</span><span class="detail">' + det + '</span></div>';
          }
          document.getElementById('popup-body').innerHTML = html;
          popup.style.display = 'block';
          var px = evt.clientX + 16;
          var py = evt.clientY - 10;
          if (px + 300 > window.innerWidth) px = evt.clientX - 300;
          if (py + 200 > window.innerHeight) py = window.innerHeight - 210;
          if (py < 10) py = 10;
          popup.style.left = px + 'px';
          popup.style.top = py + 'px';
        });
      })(circle);

      svg.appendChild(circle);
    });
  });
}

window.addEventListener('resize', function() { render(); });

init();
</script>
