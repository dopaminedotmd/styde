<script type="text/javascript"><![CDATA[
var tooltip = document.getElementById('tooltipDiv');
var detailPopup = document.getElementById('detailDiv');
var detailTitle = document.getElementById('detailTitle');
var detailBody = document.getElementById('detailBody');
var playbackTimer = null;
var currentPos = 0;

function showTooltip(evt, el) {
    var rect = el.getBoundingClientRect();
    var svgRect = document.querySelector('svg').getBoundingClientRect();
    var label = el.getAttribute('data-bp').replace(/-/g,' ') + ' [' + el.getAttribute('data-action') + ']';
    var score = el.getAttribute('data-score');
    if (score) label += ' C:' + score;
    label += ' id=' + el.getAttribute('data-id');
    tooltip.textContent = label;
    tooltip.style.display = 'block';
    tooltip.style.left = (rect.left - svgRect.left + 12) + 'px';
    tooltip.style.top = (rect.top - svgRect.top - 28) + 'px';
}

function hideTooltip() {
    tooltip.style.display = 'none';
}

function showDetail(el) {
    var bp = el.getAttribute('data-bp').replace(/-/g,' ');
    var action = el.getAttribute('data-action');
    var score = el.getAttribute('data-score');
    var ts = el.getAttribute('data-ts');
    var id = el.getAttribute('data-id');
    var detail = el.getAttribute('data-detail') || '';
    var title = bp;
    var body = '';
    body += '<div><span style="color:#9aa0a6">Action:</span> ' + action + '</div>';
    body += '<div><span style="color:#9aa0a6">Run ID:</span> ' + id + '</div>';
    body += '<div><span style="color:#9aa0a6">Timestamp:</span> ' + ts + '</div>';
    if (score) body += '<div><span style="color:#9aa0a6">Score:</span> <span style="color:#ffd54f;font-weight:600">' + score + '</span></div>';
    if (detail) body += '<div style="margin-top:6px;padding:6px 8px;background:#0f1117;border-radius:4px;font-size:11px;color:#b0b3c6">' + detail + '</div>';
    detailTitle.innerHTML = title;
    detailBody.innerHTML = body;
    detailPopup.style.display = 'block';
    detailPopup.style.left = '60px';
    detailPopup.style.top = '60px';
}

function closeDetail() {
    detailPopup.style.display = 'none';
}

document.addEventListener('click', function(e) {
    if (!e.target.closest('circle') && !e.target.closest('#detailDiv')) {
        closeDetail();
    }
});
]]></script>

  <label>Time</label>
  <input type="range" id="timeSlider" min="0" max="100" value="0" step="0.5">
  <span class="time-display" id="timeLabel">00:00</span>
  <button id="playBtn">play</button>
</div>

<script>
(function() {
  var slider = document.getElementById('timeSlider');
  var timeLabel = document.getElementById('timeLabel');
  var playBtn = document.getElementById('playBtn');
  var playing = false;
  var timer = null;
  var totalMs = 7421000;

  var startTime = new Date( + t0 + );
  var endTime = new Date( + t1 + );
  var rangeMs = endTime - startTime;

  slider.addEventListener('input', function() {
    var frac = this.value / 100;
    var t = new Date(startTime.getTime() + frac * rangeMs);
    timeLabel.textContent = t.toTimeString().slice(0,5);
    updateNodes(frac);
  });

  playBtn.addEventListener('click', function() {
    if (playing) {
      clearInterval(timer);
      playing = false;
      playBtn.textContent = 'play';
    } else {
      playing = true;
      playBtn.textContent = 'stop';
      timer = setInterval(function() {
        var val = parseFloat(slider.value);
        if (val >= 100) {
          slider.value = 0;
          val = 0;
        }
        slider.value = val + 0.5;
        var frac = slider.value / 100;
        var t = new Date(startTime.getTime() + frac * rangeMs);
        timeLabel.textContent = t.toTimeString().slice(0,5);
        updateNodes(frac);
        if (slider.value >= 100) {
          clearInterval(timer);
          playing = false;
          playBtn.textContent = 'play';
        }
      }, 150);
    }
  });

  function updateNodes(frac) {
    var nodes = document.querySelectorAll('circle.node');
    var cutoffTime = startTime.getTime() + frac * rangeMs;
    nodes.forEach(function(n) {
      var ts = n.getAttribute('data-ts');
      if (!ts) return;
      var nodeTime = new Date(ts).getTime();
      if (nodeTime <= cutoffTime) {
        n.setAttribute('opacity', '0.9');
      } else {
        n.setAttribute('opacity', '0.08');
      }
    });
  }
})();
</script>
