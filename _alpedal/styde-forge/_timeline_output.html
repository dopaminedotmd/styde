<!DOCTYPE html>
<html lang=en>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1.0">
<title>Agent Lifecycle Timeline - Styde Forge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0d1117;color:#c9d1d9;overflow-x:hidden}
.header{padding:20px 24px 10px;border-bottom:1px solid #30363d}
.header h1{font-size:20px;font-weight:600;color:#f0f6fc}
.header .meta{font-size:12px;color:#8b949e;margin-top:3px}
.legend{display:flex;gap:16px;padding:8px 24px;background:#0d1117;border-bottom:1px solid #21262d;font-size:11px;align-items:center;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;color:#8b949e}
.legend-dot{width:10px;height:10px;border-radius:50%}
.legend-dot.gold{background:#d29922}
.legend-dot.amber{background:#bb8d1e;opacity:.65}
.legend-dot.cool{background:#58a6ff;opacity:.5}
.legend-icon{width:12px;height:12px;border-radius:2px;display:inline-block}
.legend-icon.spawn{background:#238636}
.legend-icon.eval{background:#d29922}
.legend-icon.improve{background:#58a6ff}
.legend-icon.promote{background:#da3633}
.legend-icon.archive{background:#484f58}
.controls{display:flex;align-items:center;gap:12px;padding:10px 24px;border-bottom:1px solid #21262d;background:#161b22;flex-wrap:wrap}
.controls label{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:.4px}
.controls input[type=range]{flex:1;min-width:160px;accent-color:#d29922}
.controls .time-display{font-size:12px;color:#c9d1d9;min-width:155px;font-family:"JetBrains Mono","Fira Code",monospace}
.btn{padding:5px 14px;border:1px solid #30363d;border-radius:5px;background:#21262d;color:#c9d1d9;font-size:11px;cursor:pointer;font-weight:500}
.btn:hover{background:#30363d}
.btn.active{background:#d29922;color:#0d1117;border-color:#d29922}
.btn-group{display:flex;gap:3px}
.timeline-container{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 170px);padding:6px 24px 24px}
.timeline-svg{min-width:100%}
.node{cursor:pointer;transition:r .1s,opacity .12s}
.node.dimmed{opacity:.15!important}
.node:hover{opacity:1!important}
.track-label{font-size:11px}
.track-label text{font-size:10px;fill:#c9d1d9;dominant-baseline:middle}
.axis-text{font-size:9px;fill:#8b949e;font-family:"JetBrains Mono",monospace}
.grid-line{stroke:#21262d;stroke-width:1}
#popup{display:none;position:fixed;background:#1c2128;border:1px solid #30363d;border-radius:8px;padding:14px 18px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.4);min-width:260px;max-width:380px}
#popup h3{font-size:13px;color:#f0f6fc;margin-bottom:6px}
#popup .row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;border-bottom:1px solid #21262d}
#popup .row:last-child{border-bottom:none}
#popup .label{color:#8b949e}
#popup .value{color:#f0f6fc;font-family:"JetBrains Mono",monospace;font-size:11px}
#popup .close{float:right;cursor:pointer;color:#8b949e;font-size:16px;line-height:1;background:none;border:none}
#popup .close:hover{color:#f0f6fc}
#popup .score-val{font-weight:600}
.stat-bar{font-size:11px;color:#484f58;padding:3px 24px;background:#0d1117;text-align:right;border-top:1px solid #21262d}
.select-filter{background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:4px;padding:4px 6px;font-size:11px;min-width:160px;max-width:280px}
</style>
</head>

<div class=header>

</select>

l,"",null,""],["web-security-engineer","2026-06-26T10:22:31Z","20260626-102215","spawn",null,"archive",2,"manual"],["web-security-engineer","2026-06-26T10:22:31Z","20260626-102215","archive",null,"archive",null,"manual"],["web-security-engineer","2026-06-26T10:23:19Z","20260626-102215","improve",null,"",null,""],["web-security-engineer","2026-06-26T10:23:40Z","20260626-102320","spawn",null,"refinery",3,"manual"],["web-security-engineer","2026-06-26T10:24:34Z","20260626-102320","improve",null,"",null,""],["web-security-engineer","2026-06-26T10:26:10Z","20260626-102434","spawn",null,"refinery",4,"manual"],["web-security-engineer","2026-06-26T10:26:56Z","20260626-102434","improve",null,"",null,""],["web-security-engineer","2026-06-26T10:27:22Z","20260626-102656","spawn",null,"refinery",5,"manual"],["web-security-engineer","2026-06-26T10:28:10Z","20260626-102656","improve",null,"",null,""],["web-security-engineer","2026-06-29T21:44:59Z","28","eval",null,"",null,""],["webgl-threejs-developer","2026-06-26T00:06:54Z","20260626-000654","spawn",null,"refinery",1,"manual"],["workflow-automation-engineer","2026-06-26T00:07:43Z","20260626-000743","spawn",null,"refinery",1,"manual"],["workflow-automation-engineer","2026-06-26T01:07:48Z","20260626-010748","spawn",null,"refinery",1,"manual"],["workflow-automation-engineer","2026-06-26T01:11:33Z","20260626-011133","spawn",null,"refinery",1,"manual"],["zero-knowledge-proof-dev","2026-06-26T00:07:59Z","20260626-000759","spawn",null,"refinery",1,"manual"]];

var allBps={},bpNames=[],globalMin=0,globalMax=0,isPlaying=false,playInt=null,curScrub=1000;

function init(){
  var raw=JSON.parse(EVENTS);
  var bpMap={};
  for(var i=0;i<raw.length;i++){
    var e=raw[i];
    var name=e[0];
    if(!bpMap[name])bpMap[name]=[];
    bpMap[name].push({ts:e[1],id:e[2],action:e[3],score:e[4],stage:e[5],iter:e[6],bench:e[7]});
  }
  allBps=bpMap;
  bpNames=Object.keys(bpMap).sort(function(a,b){
    var ma=0,mb=0,ea=allBps[a],eb=allBps[b];
    for(var i=0;i<ea.length;i++)if(ea[i].score!=null&&ea[i].score>ma)ma=ea[i].score;
    for(var i=0;i<eb.length;i++)if(eb[i].score!=null&&eb[i].score>mb)mb=eb[i].score;
    return mb-ma;
  });
  var minT=Infinity,maxT=-Infinity;
  for(var b=0;b<bpNames.length;b++){
    var evts=allBps[bpNames[b]];
    for(var i=0;i<evts.length;i++){
      var t=new Date(evts[i].ts).getTime();
      if(t<minT)minT=t;
      if(t>maxT)maxT=t;
    }
  }
  globalMin=minT;globalMax=maxT;
  var total=0,wsc=0;
  for(var b=0;b<bpNames.length;b++){var evts=allBps[bpNames[b]];total+=evts.length;for(var i=0;i<evts.length;i++)if(evts[i].score!=null)wsc++;}
  document.getElementById('bpCount').textContent=bpNames.length;
  document.getElementById('eventCount').textContent=total;
  document.getElementById('scoreCount').textContent=wsc;
  document.getElementById('timeRange').textContent=new Date(minT).toISOString().slice(0,19).replace('T',' ')+' to '+new Date(maxT).toISOString().slice(0,19).replace('T',' ');
  render();
  popFilter();
}

function color(sc){
  if(sc==null)return '#8b949e';
  if(sc>=85)return '#d29922';
  if(sc>=70)return '#bb8d1e';
  return '#58a6ff';
}

function opac(sc){
  if(sc==null)return.35;
  if(sc>=85)return 1;
  if(sc>=70)return.7;
  return.5;
}

function rad(sc,act){
  if(act==='spawn')return 4;
  if(act==='improve')return 4;
  if(act==='promote')return 5;
  if(act==='archive')return 3;
  if(sc==null)return 5;
  return Math.max(4,Math.min(9,sc/12));
}

function render(){
  var sv=parseInt(document.getElementById('scrubber').value);
  var ct=globalMin+(globalMax-globalMin)*(sv/1000);
  var bpf=document.getElementById('bpFilter').value;
  var sf=document.getElementById('stageFilter').value;
  var vis=bpf==='all'?bpNames:[bpf];
  if(sf!=='all')vis=vis.filter(function(n){var evts=allBps[n];for(var i=0;i<evts.length;i++)if(evts[i].stage===sf)return true;return false;});
  var n=vis.length,ML=200,MT=24,TH=26,TG=3,PAD=50;
  var th=MT+n*(TH+TG)+30;
  var tw=ML+1800;
  var asp=globalMax-globalMin;
  var pl=ML,pr=tw-PAD,pw=pr-pl;
  var s='<svg class=timeline-svg width='+tw+' height='+th+' viewBox="0 0 '+tw+' '+th+'"><rect width='+tw+' height='+th+' fill=#0d1117/>';
  var ni=8;
  for(var i=0;i<=ni;i++){
    var t=globalMin+(asp*i/ni);
    var x=pl+(t-globalMin)/asp*pw;
    s+='<line class=grid-line x1='+x+' y1=22 x2='+x+' y2='+(th-14)+'/>';
    var d=new Date(t);
    s+='<text class=axis-text x='+x+' y=14 text-anchor=middle>'+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+'</text>';
  }
  s+='<text class=axis-text x='+pl+' y=14 text-anchor=start font-size=9>'+new Date(globalMin).toISOString().slice(0,10)+'</text>';
  s+='<text class=axis-text x='+pr+' y=14 text-anchor=end font-size=9>'+new Date(globalMax).toISOString().slice(0,10)+'</text>';
  var sx=pl+(ct-globalMin)/asp*pw;
  s+='<line x1='+sx+' y1=22 x2='+sx+' y2='+(th-14)+' stroke=#d29922 stroke-width=1.5 stroke-dasharray=4,3 opacity=.5/>';
  for(var i=0;i<n;i++){
    var bp=vis[i],y0=MT+i*(TH+TG);
    var evts=allBps[bp].slice().sort(function(a,b){return new Date(a.ts)-new Date(b.ts);});
    var bg=i%2===0?'#0d1117':'#161b2233';
    s+='<rect x='+(pl-6)+' y='+y0+' width='+(pw+12)+' height='+TH+' fill='+bg+' rx=3/>';
    var lb=bp.length>30?bp.slice(0,27)+'...':bp;
    s+='<text class=track-label x='+(ML-10)+' y='+(y0+TH/2)+' text-anchor=end>'+lb+'</text>';
    var ft=[];
    for(var e=0;e<evts.length;e++)if(new Date(evts[e].ts).getTime()<=ct)ft.push(evts[e]);
    var lts=[];
    for(var e=0;e<ft.length;e++)lts.push(new Date(ft[e].ts).getTime());
    lts.sort(function(a,b){return a-b;});
    if(lts.length>=2){
      var pd='';
      for(var j=0;j<lts.length;j++){var lx=pl+(lts[j]-globalMin)/asp*pw;pd+=(j===0?'M':'L')+lx+','+(y0+TH/2);}
      s+='<path d='+pd+' stroke=#30363d stroke-width=1 fill=none opacity=.3/>';
    }
    for(var e=0;e<ft.length;e++){
      var a=ft[e],t=new Date(a.ts).getTime(),x=pl+(t-globalMin)/asp*pw,y=y0+TH/2;
      var r=rad(a.score,a.action),c=color(a.score),o=opac(a.score);
      var esc=bp.replace(/'/g,"\\'").replace(/"/g,'&quot;');
      var oc='onclick="pop(this)"';
      var hv='onmouseover="dim(''+esc+'')" onmouseout="undim()"';
      if(a.action==='spawn'){
        var pts=(x)+','+(y-r-1)+' '+(x-r+1)+','+(y+r-1)+' '+(x+r-1)+','+(y+r-1);
        s+='<polygon class=node points='+pts+' fill=#238636 opacity=.5 data-bp='+esc+' data-id='+a.id+' data-act=spawn '+oc+' '+hv+'/>';
      }else if(a.action==='improve'){
        var pts=(x)+','+(y-r)+' '+(x+r)+','+y+' '+(x)+','+(y+r)+' '+(x-r)+','+y;
        s+='<polygon class=node points='+pts+' fill=#58a6ff opacity=.4 data-bp='+esc+' data-id='+a.id+' data-act=improve '+oc+' '+hv+'/>';
      }else if(a.action==='promote'){
        s+='<circle class=node cx='+x+' cy='+y+' r='+r+' fill=#da3633 opacity=.7 stroke=#ff7b72 stroke-width=1 data-bp='+esc+' data-id='+a.id+' data-act=promote '+oc+' '+hv+'/>';
      }else if(a.action==='archive'){
        s+='<rect class=node x='+(x-3)+' y='+(y-3)+' width=6 height=6 fill=#484f58 opacity=.4 rx=1 data-bp='+esc+' data-id='+a.id+' data-act=archive '+oc+' '+hv+'/>';
      }else{
        var fc=a.score!=null?c:'#484f58';
        s+='<circle class=node cx='+x+' cy='+y+' r='+r+' fill='+fc+' opacity='+o+' filter=url(#sh) data-bp='+esc+' data-id='+a.id+' data-act=eval '+oc+' '+hv+'/>';
        if(a.score!=null&&a.score>=80){
          s+='<text x='+x+' y='+(y+r+9)+' text-anchor=middle fill='+c+' font-size=7 font-family=monospace opacity='+o+'>'+a.score+'</text>';
        }
      }
    }
  }
  s+='<defs><filter id=sh><feDropShadow dx=0 dy=1 stdDeviation=1.5 flood-opacity=.2/></filter></defs>';
  s+='</svg>';
  document.getElementById('timeline').innerHTML=s;
  var d2=new Date(ct);
  document.getElementById('statBar').textContent='showing '+n+' bps | cut at '+d2.toISOString().slice(0,19).replace('T',' ');
}

function dim(bp){
  var ns=document.querySelectorAll('.node');
  for(var i=0;i<ns.length;i++){var n=ns[i];n.classList.toggle('dimmed',n.getAttribute('data-bp')!==bp);}
}
function undim(){
  var ns=document.querySelectorAll('.node');
  for(var i=0;i<ns.length;i++)ns[i].classList.remove('dimmed');
}

function pop(el){
  var bp=el.getAttribute('data-bp'),id=el.getAttribute('data-id'),evts=allBps[bp]||[],a=null;
  for(var i=0;i<evts.length;i++){if(evts[i].id==id){a=evts[i];break;}}
  if(!a)return;
  document.getElementById('popupTitle').textContent=bp;
  var rows=[{l:'Run ID',v:a.id},{l:'Action',v:a.action},{l:'Stage',v:a.stage||'-'},{l:'Timestamp',v:a.ts}];
  if(a.score!=null)rows.push({l:'Score',v:a.score});
  if(a.iter!=null)rows.push({l:'Iter',v:a.iter});
  if(a.bench)rows.push({l:'Benchmark',v:a.bench});
  var h='';
  for(var i=0;i<rows.length;i++)h+='<div class=row><span class=label>'+rows[i].l+'</span><span class=value>'+(rows[i].v||'')+'</span></div>';
  document.getElementById('popupBody').innerHTML=h;
  var popup=document.getElementById('popup');
  popup.style.display='block';
  var r=el.getBoundingClientRect(),l=r.right+10,t=r.top;
  if(l+380>window.innerWidth)l=r.left-290;
  if(t+280>window.innerHeight)t=window.innerHeight-290;
  if(t<0)t=10;popup.style.left=l+'px';popup.style.top=t+'px';
}

function popFilter(){
  var sel=document.getElementById('bpFilter');
  for(var b=0;b<bpNames.length;b++){
    var bp=bpNames[b],evts=allBps[bp],ec=0,best=0,worst=100;
    for(var i=0;i<evts.length;i++){if(evts[i].score!=null){ec++;if(evts[i].score>best)best=evts[i].score;if(evts[i].score<worst)worst=evts[i].score;}}
    if(ec===0){best='-';worst='-';}
    var opt=document.createElement('option');
    opt.value=bp;opt.textContent=bp+' ('+ec+' evals, '+best+'/'+worst+')';
    sel.appendChild(opt);
  }
}

function updDisp(){
  var pct=curScrub/1000,t=globalMin+(globalMax-globalMin)*pct;
  document.getElementById('timeDisplay').textContent=new Date(t).toISOString().slice(0,19).replace('T',' ');
}

document.getElementById('scrubber').addEventListener('input',function(){curScrub=parseInt(this.value);updDisp();render();});
document.getElementById('playBtn').addEventListener('click',function(){
  isPlaying=!isPlaying;this.textContent=isPlaying?'pause':'play';this.classList.toggle('active',isPlaying);
  if(isPlaying){
    if(curScrub>=1000){curScrub=0;document.getElementById('scrubber').value=0;updDisp();render();}
    var self=this;
    playInt=setInterval(function(){
      curScrub+=3;if(curScrub>1000){curScrub=1000;self.textContent='play';self.classList.remove('active');clearInterval(playInt);isPlaying=false;}
      document.getElementById('scrubber').value=curScrub;updDisp();render();
    },70);
  }else clearInterval(playInt);
});
document.getElementById('resetBtn').addEventListener('click',function(){
  if(isPlaying){clearInterval(playInt);isPlaying=false;document.getElementById('playBtn').textContent='play';document.getElementById('playBtn').classList.remove('active');}
  curScrub=1000;document.getElementById('scrubber').value=1000;updDisp();render();
});
document.getElementById('bpFilter').addEventListener('change',render);
document.getElementById('stageFilter').addEventListener('change',render);
document.getElementById('popupClose').addEventListener('click',function(){document.getElementById('popup').style.display='none';});
document.addEventListener('click',function(e){if(!e.target.closest('.node')&&!e.target.closest('#popup'))document.getElementById('popup').style.display='none';});
document.addEventListener('keydown',function(e){if(e.key===' '||e.key==='Space'){e.preventDefault();document.getElementById('playBtn').click();}if(e.key==='Escape')document.getElementById('popup').style.display='none';});
init();
</script>
