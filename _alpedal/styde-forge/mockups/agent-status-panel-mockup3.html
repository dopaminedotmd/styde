<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Status Panel · Mockup 3 — Timeline Heatmap</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-bg:#0b0d15;--color-surface:#1a1a2e;--color-border:#2a2e45;--color-text:#c8cce0;--color-text2:#888cad;--color-accent:#6c5ce7;
  --heatmap-idle:rgba(108,92,231,0.08);
  --heatmap-warning:rgba(108,92,231,0.25);
  --heatmap-active:rgba(108,92,231,0.55);
  --heatmap-critical:rgba(108,92,231,0.85);
  --heatmap-no-data:rgba(42,46,69,0.4);
  --font-family-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;
  --font-family-mono:'JetBrains Mono','Fira Code',monospace;
  --font-size-headline:0.85rem;
  --font-size-name:0.8rem;
  --font-size-label:0.65rem;
  --font-weight-bold:700;
  --font-weight-semibold:600;
  --font-weight-regular:400;
  --space-xs:0.2rem;--space-sm:0.4rem;--space-md:0.7rem;--space-lg:1rem;--space-xl:1.2rem;--radius-card:10px;--radius-cell:2px;
  --ease-default:0.25s ease;--ease-enter:0.35s cubic-bezier(0.16,1,0.3,1);--ease-exit:0.2s cubic-bezier(0.55,0.06,0.68,0.19);--ease-spring:0.5s cubic-bezier(0.34,1.56,0.64,1);
  --heatmap-stops:linear-gradient(90deg,var(--heatmap-idle),var(--heatmap-warning),var(--heatmap-active),var(--heatmap-critical));
}
html{font-size:15px}
body{font-family:var(--font-family-sans);background:var(--color-bg);color:var(--color-text);min-height:100vh;padding:2rem}
.heatmap-panel{max-width:960px;margin:0 auto}
.heatmap-panel h2{font-size:var(--font-size-headline);font-weight:var(--font-weight-semibold);text-transform:uppercase;letter-spacing:0.5px;color:var(--color-text2);margin-bottom:var(--space-xl);padding-bottom:var(--space-lg);border-bottom:1px solid var(--color-border)}

/* hour labels */
.hour-labels{display:grid;grid-template-columns:60px repeat(24,1fr);gap:2px;margin-bottom:var(--space-sm);padding-left:0}
.hour-labels .spacer{min-width:60px}
.hour-labels .hour{font-size:var(--font-size-label);color:var(--color-text2);text-align:center;font-family:var(--font-family-mono)}

/* agent heatmap strip */
.agent-strip{display:grid;grid-template-columns:60px repeat(24,1fr);gap:2px;align-items:center;margin-bottom:3px;padding:var(--space-xs) 0;border-radius:var(--radius-card);background:var(--color-surface);border:1px solid var(--color-border);transition:var(--ease-default)}
.agent-strip:hover{border-color:var(--color-accent);background:rgba(108,92,231,0.03)}
.agent-strip .alabel{font-size:var(--font-size-name);font-weight:var(--font-weight-semibold);color:var(--color-text);padding-left:var(--space-md);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.heat-cell{height:22px;border-radius:var(--radius-cell);position:relative;cursor:pointer;transition:var(--ease-default)}
.heat-cell:hover{transform:scaleY(1.4);z-index:2}
.heat-cell:hover::after{content:attr(data-tasks) ' tasks';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--color-text);color:var(--color-bg);font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;z-index:10;pointer-events:none;font-weight:var(--font-weight-semibold)}

/* 4 gradient stops */
.heat-cell.l0{background:var(--heatmap-no-data)}
.heat-cell.l1{background:var(--heatmap-idle)}
.heat-cell.l2{background:var(--heatmap-warning)}
.heat-cell.l3{background:var(--heatmap-active)}
.heat-cell.l4{background:var(--heatmap-critical)}

/* legend */
.legend{display:flex;align-items:center;gap:var(--space-lg);margin-top:var(--space-lg);padding:var(--space-md) var(--space-lg);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-card)}
.legend-item{display:flex;align-items:center;gap:var(--space-xs);font-size:var(--font-size-label);color:var(--color-text2)}
.legend-swatch{width:14px;height:14px;border-radius:3px}

@media(prefers-color-scheme:light){
  :root{
    --color-bg:#f5f5fa;--color-surface:#ffffff;--color-border:#e0e0ec;--color-text:#1a1a2e;--color-text2:#6b6f8a;--color-accent:#5a4bd1;
    --heatmap-idle:rgba(90,75,209,0.06);--heatmap-warning:rgba(90,75,209,0.2);--heatmap-active:rgba(90,75,209,0.5);--heatmap-critical:rgba(90,75,209,0.8);--heatmap-no-data:rgba(224,224,236,0.5);
  }
}
</style>
</head>
