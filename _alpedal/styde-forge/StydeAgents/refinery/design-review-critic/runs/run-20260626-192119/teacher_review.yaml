diagnosis:
  root_cause: Verbose evidence blocks with per-line commentary bloat the output, and
    missing at-a-glance comparison table forces readers to manually cross-reference
    five mockup scores.
  severity: medium
  weakest_dimension: efficiency
improvements:
- change: 'Add evaluation_output: {max_evidence_lines: 3, require_comparison_table:
    true} to the judge-agent schema to cap evidence verbosity and mandate a summary
    table.'
  expected_impact: high
  reason: Constraining verbose evidence while requiring a cross-mockup comparison
    table addresses both the self-eval's inefficiency and the judge-eval's structural
    gap in one rule.
  target: config.yaml
pattern:
  description: The agent evaluates each dimension independently, backs every score
    with specific line references from the mockup files, and flags inaccuracies candidly
    without letting a single error dominate the overall assessment — producing grounded,
    trustworthy evaluations that survive judge review.
  name: dimensional-breakdown-with-line-references
  reusable: 'yes'
summary: Composite 88 is production-ready; efficiency can be upgraded from 83.5 to
