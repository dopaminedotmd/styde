  target: BLUEPRINT.md
pattern:
  description: 'Running both a self-evaluation (intra-agent introspection) and a separate
    judge evaluation (external review) on the same artifact catches different blind
    spots: the agent self-reported its efficiency weakness and completeness gaps,
    while the judge confirmed the omissions were real but rated overall quality higher.
    This dual-lens approach produces higher-confidence scores and actionable improvement
    targets.'
  name: Multi-validator quality pipeline
  reusable: 'yes'
stage: refinery
summary: Strong reference document (92/100) with a well-understood efficiency weakness
