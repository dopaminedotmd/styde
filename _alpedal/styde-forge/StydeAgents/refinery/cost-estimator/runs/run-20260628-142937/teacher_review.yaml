    a decision tree'
  expected_impact: high
  reason: Both self-eval (45) and known Teacher Agent analysis identify abort-on-missing-input
    as the primary usefulness killer
  target: BLUEPRINT.md
- change: 'Add an explicit rule: ''Execute first, confirm only on irreversible side-effects.
