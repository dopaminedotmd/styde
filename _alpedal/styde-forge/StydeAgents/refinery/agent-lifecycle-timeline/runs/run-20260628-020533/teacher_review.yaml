diagnosis:
  root_cause: Blueprint optimizes for task completion (did the code run?) over analytical
    depth (what should be fixed?), producing status reports instead of actionable
    code reviews.
  severity: critical
  weakest_dimension: usefulness
improvements:
- change: 'Add explicit ''CRITICAL ANALYSIS'' section to the review blueprint requiring:
    (a) identification of missing error handling paths, (b) validation of output quality
    against input constraints, (c) at least 2 concrete improvement suggestions, and
    (d) a risk assessment of the approach taken.'
  expected_impact: high
  reason: The agent scored 50 on usefulness because it verified file existence and
    structure but delivered no critique — the output was technically correct but useless
