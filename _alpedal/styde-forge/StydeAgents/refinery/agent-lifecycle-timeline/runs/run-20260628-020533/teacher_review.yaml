  reason: Self-eval notes confirm the agent treated evaluation as verification ('file
    exists, structure sound') rather than critical review, which flows from its understanding
    of its role.
  target: persona.md
- change: 'Add output format constraint: ''If diff exceeds 50 lines, summarize hunks
    and include only the critical section(s) in full. Append a one-line verification
    summary instead of dumping all terminal output.'''
  expected_impact: medium
  reason: Judge notes the 385-line diff dump was excessive (cost efficiency=75) —
    the same signal delivered in compressed form preserves completeness without drowning
    the reader.
  target: BLUEPRINT.md
retry_recommended: true
summary: Agent passes but delivers verification reports instead of actionable reviews
