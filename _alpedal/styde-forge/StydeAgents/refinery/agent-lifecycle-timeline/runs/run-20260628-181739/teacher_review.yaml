    summary (pass/fail count, key metrics, top issues) BEFORE any raw detail, and
    keep raw terminal dumps in a collapsible section or separate output block.'
  expected_impact: high
  reason: The agent's verification is exhaustive and correct (39/39), but the user
    must scroll through verbose diffs to find the verdict — this tanks clarity despite
    high accuracy and completeness.
  target: BLUEPRINT.md
