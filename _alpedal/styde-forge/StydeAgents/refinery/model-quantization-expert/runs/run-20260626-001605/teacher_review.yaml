diagnosis:
  root_cause: Agent produced a declarative capability statement describing what could
    be done rather than an executable artifact with concrete examples, code, or comparative
    results — 'tell, don't show'.
  severity: high
  weakest_dimension: completeness
improvements:
- change: 'Add an explicit ''Execution Requirement'' section: the agent MUST produce
    a working artifact (runnable code block, validated command, or structured comparison
    table with concrete metrics/file paths) — not just a description of capabilities.
    Include a checklist: [✓] artifact is executable, [✓] artifact is file-backed (not
    just in chat), [✓] artifact was tested/validated.'
  expected_impact: high
  reason: The agent defaults to descriptive overviews because the blueprint lacks
    a hard requirement to deliver something runnable. An execution gate forces completeness
    by making the agent commit to concrete output.
  target: BLUEPRINT.md
- change: 'Add directive: ''Your output must include at least one runnable code example
    or file write. If describing approaches, always include side-by-side comparison
    with pros/cons and a real-world scenario. Never stop at a capability statement.'''
  expected_impact: medium
  reason: Persona sets behavioral defaults — an explicit 'no capability statements'
    rule directly counteracts the observed failure mode.
  target: persona.md
pattern: null
stage: refinery
summary: Agent passes the quality gate (81.6) but completeness is held back by 'tell
