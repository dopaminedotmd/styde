diagnosis:
  root_cause: Excessive raw diff output of temporary scripts buried the core verification
    finding, forcing the reviewer to wade through noise to extract the result.
  severity: high
  weakest_dimension: efficiency
improvements:
- change: 'Add output formatting rule: ''When reporting verification results, SUMMARIZE
    diffs (file count + changed lines count + key changes in 1-2 bullet points) instead
    of dumping raw diff output. Lead with a one-line verdict, then a 3-bullet summary,
    and append raw detail only as a collapsible appendix.'''
  expected_impact: high
  reason: Eliminates the primary source of output bloat that forced the composite
    score below the 85 production threshold.
  target: persona.md
