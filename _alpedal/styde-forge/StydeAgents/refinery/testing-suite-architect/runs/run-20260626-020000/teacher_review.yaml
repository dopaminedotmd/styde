diagnosis:
  root_cause: Agent output was truncated mid-Section 2 of 5, losing sections 3–5 entirely
    — a token budget / output length limit rather than a knowledge gap, as accuracy
    (94–95) and clarity (85–90) remain strong.
  severity: critical
  weakest_dimension: completeness
improvements:
- change: 'Reduce context window headroom: set model max_tokens to 4096 and add ''Progressive
    disclosure: give concise examples with cross-references instead of full reproductions,
    and break any content exceeding ~3000 tokens into separate consecutive responses''
    to the system prompt constraint section.'
  expected_impact: high
  reason: The agent has the knowledge but runs out of output budget. Shorter per-response
    target with cross-reference strategy prevents truncation while preserving completeness.
  target: config.yaml
- change: 'Add a ''Response Structure'' section that mandates a checklist header (Section
    1/5, 2/5, …) and a final ''All 5 sections delivered: YES/NO'' self-check the agent
    must fill before finishing.'
  expected_impact: high
  reason: A visible progress tracker makes the agent aware of truncation in real time
    and lets it prioritize thin-but-complete over fat-and-half-done.
  target: BLUEPRINT.md
- change: Add a paragraph forcing the agent to strip redundant full-code blocks —
    if a concept was shown once, refer back by file:line instead of reprinting. Target
    ≤350 words per section.
  expected_impact: medium
  reason: Self-eval already flagged 'redundant full-code repetitions'; cutting verbosity
    directly frees token budget for the missing sections.
  target: skills/teacher-agent.md
stage: refinery
summary: Completeness at 45–55 is a critical failure caused by output truncation,
  not lack of knowledge — tighten per-response budgets, enforce progressive disclosure,
  and add a delivery checklist to guarantee all promised sections arrive.
