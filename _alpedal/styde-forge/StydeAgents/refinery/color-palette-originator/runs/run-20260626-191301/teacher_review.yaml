    for text on both canvas and card backgrounds, and no dedicated interactive-state
    tokens exist for hover/pressed/disabled — limits practical deployment in data-heavy
    dashboards that need interactive elements.
  severity: medium
  weakest_dimension: usefulness
improvements:
- change: Add a secondary/accent darkener token (e.g., amber-700) guaranteed AA-passing
    on both canvas and card, and define explicit interactive-state tokens (hover/pressed/disabled)
    mapped to the neutral ramp for non-destructive actions.
  expected_impact: high
  reason: Ensures every UI state has a valid contrast pair without forcing the palette
    into two-accent territory, preserving the single-accent discipline while making
    the palette actually deployable for interactive dashboards.
  target: BLUEPRINT.md
