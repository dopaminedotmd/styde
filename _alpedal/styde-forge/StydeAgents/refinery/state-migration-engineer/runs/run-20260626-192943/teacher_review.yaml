diagnosis:
  root_cause: Blueprint produces zero migration artifacts — all 10+ execution checklist
    items are unchecked, making it a specification document that contradicts its own
    NO META-WORK GUARD.
  severity: critical
  weakest_dimension: usefulness
improvements:
- change: Replace the 10+ item Execution Checklist with a single, concrete, checkable
    deliverable target (e.g. 'all migrated files committed in /output/agents/'). Remove
    the NO META-WORK GUARD; the blueprint IS meta-work by definition.
  expected_impact: high
  reason: Eliminates the self-contradiction that made the output useless — a blueprint
    whose own rule forbids its existence produces zero value.
  target: BLUEPRINT.md
- change: Embed at least one executable step with a verifiable artifact (file path,
    commit hash, or command output) that the agent must produce, not just 'write X'
    instructions.
  expected_impact: high
  reason: Without a forced artifact the agent naturally defaults to producing more
    specs instead of deliverables.
  target: BLUEPRINT.md
- change: 'Define a ''stopping condition'' rule: agent MUST prove at least one migration
    output file exists before marking itself complete. Remove the Skills section that
    duplicates BLUEPRINT.md Rules.'
  expected_impact: medium
  reason: Prevents the 'complete but empty' outcome — the agent will be forced to
    materialize something or report failure.
  target: persona.md
- change: Add a MUST or SHALL verb for the first checklist item and pin it as the
    minimum viable deliverable (e.g. 'Agent MUST produce at minimum the Fauna entity
    model file'). Lift the rest into a 'stretch goals' section.
  expected_impact: high
  reason: Gives an unambiguous floor — the agent can't declare completion without
    at least one real file.
  target: BLUEPRINT.md
retry_recommended: true
summary: Blueprint is functionally useless — a self-contradicting spec document with
  zero checkable deliverables. The single highest-leverage fix is replacing the unchecked
  checklist with one forced artifact and removing the NO META-WORK GUARD.
