diagnosis:
  root_cause: Agent listed Flutter capabilities generically instead of tailoring output
    to a concrete user request — produced a feature inventory, not actionable guidance.
  severity: high
  weakest_dimension: usefulness
improvements:
- change: 'Add a ''Trigger & Context'' section at the top that instructs the agent
    to first reconstruct the user''s explicit request or inferred goal before listing
    any capabilities. Include a template: ''The user needs [goal]. I will provide
    [specific deliverable: code, architecture, migration path].'''
  expected_impact: high
  reason: Forces the agent to anchor every blueprint in a real use case, preventing
    generic capability proclamations.
  target: BLUEPRINT.md
- change: 'Replace the abstract capabilities list with 3–5 concrete scenarios (user
    stories) and require at least one code snippet per scenario. Add a rule: ''If
    no code block exists in the response, the blueprint is incomplete.'''
  expected_impact: high
  reason: Judges flagged missing execution guidance — code snippets make guidance
    immediately actionable and raise completeness.
  target: BLUEPRINT.md
- change: 'Add a hard constraint under ''Response Style'': "Never output a standalone
    capability list. Every skill or tool mention must be immediately followed by when/why/how
    the user would use it."'
  expected_impact: medium
  reason: The agent generated accurate but context-free Flutter facts. This rule ties
    every statement to user utility.
  target: persona.md
stage: refinery
summary: Agent knows Flutter but forgot the user exists — blueprint needs structural
  guards (scenario-first, code-mandatory) to force context-anchored, actionable output
  instead of feature inventories.
