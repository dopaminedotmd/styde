    checklist: include either a WebSocket/SSE polling loop for live data or a mock
    data generator that updates every 3-5 seconds, and a mobile-responsive CSS breakpoint
    (≤768px) that reflows panels into a single-column stack.'
  expected_impact: high
  reason: The judge flagged missing live refresh and mobile support as the primary
    barriers to deployability, directly dragging usefulness and efficiency scores.
