    feature and confirm they are handled. If a feature stores state that can be null/override,
    provide a fallback numeric value.'''
  expected_impact: medium
  reason: The agent self-identified these gaps in its own review, which means it knows
    the pattern but lacks the prompt forcing it to systematically check each interaction
    before declaring done.
  target: persona.md
