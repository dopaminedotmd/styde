    (keyboard restore on Enter/Space), defensive fallbacks (null rank on locked panels),
    and state-machine correctness (single-cycle flip vs proper toggle).
  severity: medium
  weakest_dimension: completeness
improvements:
- change: 'Add an ''Edge Cases & Accessibility'' section requiring: keyboard handlers
    for all interactive elements, null-safe fallbacks for any serializable state that
    can hold override values, and explicit toggle state machines with defined transitions.'
  expected_impact: high
  reason: All three completeness gaps share the same pattern — the agent wrote the
    happy path (visual layout works) but did not enumerate boundary conditions for
    each interactive feature.
  target: BLUEPRINT.md
