diagnosis:
  root_cause: patchElement DOM diffing is overly complex for the use case and 2s polling
    rerenders all panels unconditionally, causing redundant work and a potential infinite-loop
    edge case
  severity: medium
  weakest_dimension: efficiency
improvements:
- change: Replace custom patchElement with simple innerHTML or targeted DOM updates
    per panel; remove the recursive diff loop entirely
  expected_impact: high
  reason: patchElement's complexity introduces performance drag and a correctness
    bug (infinite loop when newKids > oldKids); a simpler replace-or-skip approach
    is faster and correct for a compact dashboard
  target: BLUEPRINT.md
- change: Change polling refresh to only re-render panels whose underlying data changed
    (e.g. track last-update timestamps or use a dirty-flag pattern)
  expected_impact: high
  reason: 2s full rerender polls every panel regardless of change, wasting cycles;
    targeted updates would cut repaint cost and improve perceived performance
  target: BLUEPRINT.md
- change: 'Add a static checklist for common accuracy pitfalls: verify aria-pressed
    toggles match visual state, confirm CSS class references exist (e.g. sr-only),
    and test the edge case where DOM child counts differ'
  expected_impact: medium
  reason: Two of the three judge-flagged bugs are accuracy misses that a lightweight
    QA checklist would catch; adding it raises accuracy without architectural rework
  target: BLUEPRINT.md
