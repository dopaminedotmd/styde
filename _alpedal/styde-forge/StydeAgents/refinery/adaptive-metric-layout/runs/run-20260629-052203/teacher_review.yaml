    cell from mouse position relative to grid origin, not a hardcoded colSpan=3/rowSpan=1.
    Provide the grid-pick algorithm as a reference snippet.'
  expected_impact: medium
  reason: The current simplistic override always produces a 3×1 layout regardless
    of drop target, making the feature functionally broken for non-trivial grid positions.
  target: BLUEPRINT.md
