    with a single write, and intersection observers must be created once per tile
    lifecycle, not re-attached on every React render. Specify a stable callback pattern
    (useCallback + ref-based observer store).'
  expected_impact: high
  reason: Eliminates the root O(n) recomputation per frame and prevents double-counting,
    directly addressing the 70/100 self-eval efficiency score.
