    debounced or throttled (requestAnimationFrame or 100ms debounce)'' to the performance
    section.'
  expected_impact: high
  reason: Prevents unbounded handler firing that the self-eval correctly flagged as
    the weakest point.
  target: BLUEPRINT.md
- change: 'Add a validation step: ''Run the output in a real browser and verify no
    console errors, no layout jank, and pointer-events work on touch surfaces'' before
    marking complete.'
  expected_impact: high
  reason: Self-eval notes confirm the agent built a dashboard but never validated
    it outside static/headless context, creating blind spots in all dimensions.
  target: BLUEPRINT.md
