diagnosis:
  root_cause: Dashboard does a full DOM re-render every 30 seconds instead of incremental
    targeted updates, and the save-to-localStorage fires unnecessarily often.
  severity: medium
  weakest_dimension: efficiency
improvements:
- change: 'Add an efficiency requirement: ''Use requestAnimationFrame or debounced
    targeted DOM patches for periodic data refresh — no full re-render on every tick.'''
  expected_impact: high
  reason: Forces blueprint-constrained agents to think about incremental updates instead
    of defaulting to full rebuilds every interval.
  target: BLUEPRINT.md
- change: 'Add a principle: ''Optimize hot paths — periodic refreshes must patch only
    changed DOM nodes, not replace the entire tree.'''
  expected_impact: high
  reason: Embed performance-consciousness into the agent's character so it doesn't
    need to be rediscovered across runs.
  target: persona.md
- change: Set a max auto-refresh frequency (e.g. 60s minimum interval) with a hint
    to batch persistence writes.
  expected_impact: medium
  reason: Restricts unnecessarily aggressive intervals at the config layer so agents
    don't default to wasteful timings.
  target: config.yaml
