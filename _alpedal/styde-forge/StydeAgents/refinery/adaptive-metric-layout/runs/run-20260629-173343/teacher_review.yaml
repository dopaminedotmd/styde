diagnosis:
  root_cause: Agent outputs a bare structural diff (show) without qualitative interpretation
    (explain why it matters), so the review lacks actionable judgment.
  severity: medium
  weakest_dimension: usefulness
improvements:
- change: 'Add a mandatory ''Review Commentary'' section to the blueprint that requires
    the agent to produce three bullet points per diff hunk: (1) quality concern or
    pattern, (2) regression risk, (3) design trade-off.'
