  target: BLUEPRINT.md
- change: Replace full-grid re-render with batched/stable render — use React.memo
    on metric cards, batch state updates with a debounce or requestAnimationFrame
    coalescer, and avoid recomputing unaffected cards on single-metric changes
  expected_impact: high
  reason: Every drag, score tick, or persistence write triggers a parent-level setState
    that unmounts/mounts every card in the grid, causing O(n) DOM churn per event
  target: BLUEPRINT.md
