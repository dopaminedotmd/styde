diagnosis:
  root_cause: Property table column count varies across mockups (3 vs 4 columns) and
    dashboard 'Load more…' placeholder lacks detail, forcing consumers to pause and
    interpret inconsistent structures.
  severity: low
  weakest_dimension: efficiency
improvements:
