    footnotes to one line max per mockup, and flag any mockup whose spec is less than
    60%% of the median spec length for mandatory depth review.'
  expected_impact: medium
  reason: Eliminates the low-value verbosity (memos, long compatibility notes) while
    enforcing baseline coverage on thinner entries, directly raising efficiency without
    harming accuracy or completeness.
  target: BLUEPRINT.md
