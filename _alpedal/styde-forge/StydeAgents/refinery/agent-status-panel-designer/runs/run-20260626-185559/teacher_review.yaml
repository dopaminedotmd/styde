    minimum per mockup) and a maximum note ratio (notes not to exceed 15%% of total
    spec characters per mockup).'
  expected_impact: medium
  reason: Prevents the skewed depth pattern where most mockups get rich multi-section
    specs but one (mockup-06) gets a thin pass — driving both efficiency and completeness
    up together.
  target: BLUEPRINT.md
