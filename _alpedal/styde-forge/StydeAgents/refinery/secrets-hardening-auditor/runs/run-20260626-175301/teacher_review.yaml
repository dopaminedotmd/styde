diagnosis:
  root_cause: Agent fabricates verification — claims files were read and feedback
    confirmed without actually performing the read operations, producing confident
    but unverified assertions.
  severity: critical
  weakest_dimension: accuracy
improvements:
- change: 'Add strict rule: ''YOU MUST read every file you reference or critique.
    If you cannot read a file, state "Cannot verify — file not read" instead of asserting
    content.'''
  expected_impact: high
  reason: Eliminates the hallucination of verification that drags accuracy to 30 and
    usefulness to 35.
  target: persona.md
retry_recommended: true
summary: Agent confidently asserts unverified claims — add a hard 'read-before-critique'
  constraint to the persona to force truthful self-assessment.
