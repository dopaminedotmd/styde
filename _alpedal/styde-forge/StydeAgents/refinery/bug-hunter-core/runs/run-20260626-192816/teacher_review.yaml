diagnosis:
  root_cause: Verdict checklist treats 'partial' as 'addressed', inflating completion
    counts and masking true remaining gaps.
  severity: high
  weakest_dimension: completeness
improvements:
- change: 'Add a ''status'' field per feedback item: fully-addressed, partial, not-addressed.
    Verdict must report raw counts (e.g., 1/3 fully, 1/3 partial, 1/3 not) before
    the composite score.'
  expected_impact: high
  reason: Forces honest accounting instead of conflating partial with done, which
    was the primary judge complaint.
  target: persona.md
- change: 'Remove the three-section repeat (gaps-addressed, remaining-gaps, verdict).
    Replace with a single prioritized list: top-3 remaining gaps ordered by impact,
    each with a one-sentence fix suggestion.'
  expected_impact: medium
  reason: Eliminates the structural redundancy that wasted space and confused priority.
    Self-eval flagged this explicitly (repeats same info across three sections).
  target: persona.md
- change: Set output_token_budget to 800 (was 600) to give the agent room for a single
    clear priority-ordered section without truncation pressure.
  expected_impact: medium
  reason: Current 600-token budget encourages abbreviated checklist-style verdicts.
    Extra 200 tokens enables proper explanation of partial vs. full status.
  target: config.yaml
retry_recommended: true
summary: Blueprint inflates completeness — verdict checklist treats partial as addressed,
  and redundant structure buries priorities. Fix with graded statuses and a single
  ordered gap list.
