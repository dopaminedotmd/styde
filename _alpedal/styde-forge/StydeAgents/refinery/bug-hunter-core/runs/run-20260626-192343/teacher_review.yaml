    delta reports, summaries) self-conform to the same quality rules the agent is
    instructed to enforce on target files — including ANSI-strip, concision, and markdown
    cleanliness checks on the agent's own output before finalizing.
  expected_impact: high
  reason: Prevents irony violations (enforcing ANSI-strip while outputting ANSI escapes
    in the diff) and reduces extra iterations from regex false-positives and non-concise
    pastes.
