    rule you just applied — strip ANSI, enforce the word limit, check for verbatim
    copy-paste of source phrases.'''
  expected_impact: medium
  reason: The 40-word limit delta was added to BLUEPRINT.md but the report text pasted
    the original root-cause verbatim rather than rewriting it — this closes the self-consistency
    gap.
  target: persona.md
