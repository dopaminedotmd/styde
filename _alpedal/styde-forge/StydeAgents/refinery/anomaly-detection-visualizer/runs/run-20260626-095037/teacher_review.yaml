diagnosis:
  root_cause: Blueprint relies on external CDN dependency (Chart.js) and monolithic
    897-line file structure, undermining self-containment and maintainability.
  severity: low
  weakest_dimension: efficiency
improvements:
- change: Bundle Chart.js or vendor it directly within the project instead of referencing
    a CDN; add a modularization section that splits the single file into separate
    concerns (data, rendering, state, config).
  expected_impact: medium
  reason: Removes runtime dependency on external network, ensures offline/air-gapped
    operation, and makes the codebase easier to navigate and test.
  target: BLUEPRINT.md
pattern:
