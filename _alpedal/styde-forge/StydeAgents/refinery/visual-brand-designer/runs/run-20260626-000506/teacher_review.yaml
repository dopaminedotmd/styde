diagnosis:
  root_cause: Blueprint produces a solid base style guide but lacks coverage of interactions
    (hover/focus/disabled states), responsive breakpoints, dark mode, form validation,
    and motion guidelines — the agent treats 'done' as the first complete pass rather
    than iterating to fill known gaps.
  severity: medium
  weakest_dimension: completeness
improvements:
- change: 'Add a mandatory ''Coverage checklist'' step to persona instructions: after
    the main design output, the agent must explicitly enumerate and address responsive
    breakpoints, dark mode, interactive states (hover/focus/disabled/active), form
    validation styles, and motion/animation guidelines before marking the task complete.'
  expected_impact: high
  reason: The agent self-reported a 15-point gap in accuracy, clarity, and completeness
    vs judge — meaning it knows what's missing but doesn't enforce filling those gaps.
    A structural checklist turns tacit knowledge into required output.
  target: BLUEPRINT.md
- change: 'Add a persona rule: ''Do not deliver a partial design. Before finishing,
    review against the five completeness dimensions: responsive, dark/interaction
    states, forms, motion, and accessibility. If any are missing, add them.'''
  expected_impact: medium
  reason: Reinforces the checklist at the persona level so the agent internalizes
    completeness as a quality bar, not an afterthought.
  target: persona.md
pattern:
  description: Agent produced accurate, clean, verified CSS custom property syntax
    with actionable component specs and strong accessibility ratios — the structural
    elements (color tokens, typography, spacing) were thorough and judge-validated.
    The gap was only in interaction/state coverage, not core quality.
  name: brand-guide-foundation
  reusable: 'yes'
stage: refinery
summary: Composite 90 — production-ready with a known completeness gap in interaction
  states and responsive coverage; add a mandatory checklist step to close the gap
  consistently.
