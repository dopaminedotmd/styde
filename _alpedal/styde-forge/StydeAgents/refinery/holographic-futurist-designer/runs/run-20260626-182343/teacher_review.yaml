    a terse summary table of all mockups with pointers, then (2) full specs only when
    explicitly requested or flagged as ''core'' asset'
  expected_impact: high
  reason: Reduces token overhead for consuming agents and eliminates the parsing bottleneck
    identified by both self-eval and judge-eval
  target: BLUEPRINT.md
- change: 'Add a hard rule: ''Output language MUST be English throughout — no mixed-language
    tokens (e.g., Swedish phrases like "Fas 0.5") even in structured fields'''
  expected_impact: low
  reason: Eliminates the judge-detected language consistency error and prevents downstream
    parsing failures
  target: persona.md
- change: Instruct the agent to defer inline CSS/animation details to a separate appendix
    or linked artifact rather than embedding them in the primary response body
  expected_impact: medium
  reason: Keeps the main output lean while preserving the thoroughness that drives
    accuracy and completeness scores
  target: BLUEPRINT.md
pattern:
  description: Agent systematically produces 10 cohesive mockups with per-component
    CSS properties, animation tokens, responsive breakpoints, and explicit fallback
    strategies — achieving high accuracy and completeness by treating the output as
    a consumable design kit rather than isolated wireframes
  name: multi-mockup design kit with fallback scaffolding
