diagnosis:
  root_cause: Mockup exceeded viewport width constraint (72 chars vs ~64 at 12px/480px)
    and box-drawing alignment drifted at NAV/MAIN-PANEL row boundaries, indicating
    insufficient constraint enforcement during rendering.
  severity: low
  weakest_dimension: efficiency
improvements:
- change: 'Add explicit viewport-width guard: ''Before emitting any mockup, verify
    total character width (including borders) ≤ NNN at given font-size; truncate or
    reflow if violated.'''
  expected_impact: high
  reason: Prevents the self-identified width violation from recurring — a hard post-composition
    check is cheaper than manual review.
  target: BLUEPRINT.md
- change: 'Add a row-boundary alignment step: after drawing each horizontal section
    separator, verify that box-drawing characters on the following line align with
    their counterparts above.'
  expected_impact: medium
  reason: Fixes the NAV/MAIN-PANEL alignment drift without restricting layout flexibility.
  target: BLUEPRINT.md
