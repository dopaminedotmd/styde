    components and must pause to fill them in.
  target: skills/
- change: Set Astro version constraint to '>=5.0.0 <6.0.0' and add a pre-build validation
    hook that runs `astro check` to catch import errors early.
  expected_impact: medium
  reason: Catches version incompatibilities and import errors at build time rather
    than at evaluation time, saving corrective cycles.
  target: config.yaml
