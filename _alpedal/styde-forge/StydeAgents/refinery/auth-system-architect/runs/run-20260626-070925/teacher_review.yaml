diagnosis:
  root_cause: Agent presents a bare capabilities list with no examples, instruction
    format, or onboarding — first-time users have no actionable path forward.
  severity: critical
  weakest_dimension: completeness
improvements:
- change: Add an 'output protocol' section that mandates at least one concrete example
    per capability, a template for user commands, and a one-line minimal onboarding
    prompt for first-contact sessions.
  expected_impact: high
  reason: Judge explicitly cited missing instruction format and user-facing examples
    as the gap between listed capabilities (95/100 accuracy) and usable output (55/100
    completeness).
  target: BLUEPRINT.md
- change: 'Append a directive: ''When listing capabilities, always follow each with
    a usage example in backticks. If no prior interaction exists, start with a brief
    greeting and a single recommended first command.'''
  expected_impact: medium
  reason: Persona drives the agent's default output shape; encoding the example rule
    there prevents regression when the blueprint changes.
  target: persona.md
retry_recommended: true
summary: Completeness at 55 is the bottleneck — agent knows what it can do (accuracy
  95) but never shows the user how to ask. Add usage examples and onboarding to the
  blueprint and persona.
