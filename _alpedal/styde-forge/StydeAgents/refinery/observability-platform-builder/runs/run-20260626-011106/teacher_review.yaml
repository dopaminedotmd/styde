diagnosis:
  root_cause: Agent produced a deeply comprehensive blueprint (OTel/Tempo/Loki/Mimir)
    but output truncation caused some sections to appear cut off or hard to parse,
    making the deliverable feel incomplete to the judge despite solid substance.
  severity: medium
  weakest_dimension: completeness
improvements:
- change: 'Add a ''Truncation Mitigation'' section in output instructions: prioritize
    most critical config blocks first, add a summary table of all sections with status
    indicators (✓/⚠/✗), and enforce self-diagnostics checklist at end of every response.'
  expected_impact: high
  reason: Blueprint depth is high but truncation penalizes completeness readability.
    A section-anchored summary lets the judge see all intended parts even when output
    is clipped.
  target: BLUEPRINT.md
- change: 'Add behavioral rule: ''If your response would exceed 80% of available token
    budget, emit a rollup table with section headers and a status column first, then
    expand the highest-priority sections.'''
  expected_impact: medium
  reason: Makes truncation visible and explicit rather than leaving the judge to guess
    what was cut. Turns a weakness into a structured affordance.
  target: persona.md
