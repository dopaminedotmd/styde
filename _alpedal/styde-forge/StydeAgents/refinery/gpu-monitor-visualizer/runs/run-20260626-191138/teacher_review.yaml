    WebSocket reconnection strategy (exponential backoff with jitter, max retries),
    and a fallback/error UI per component.
  expected_impact: high
  reason: Self-eval flagged missing error boundary strategy and WebSocket reconnection
    details; fills the largest gap in completeness.
  target: BLUEPRINT.md
- change: 'Add a ''Performance Budgets'' subsection under Architecture specifying
