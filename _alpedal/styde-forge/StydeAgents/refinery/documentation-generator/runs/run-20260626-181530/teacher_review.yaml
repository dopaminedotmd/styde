diagnosis:
  root_cause: Agent output leaks raw terminal artifacts (ANSI escapes, diffs) into
    the final deliverable, violating the very plain-text-summary rules it introduces,
    making the result hostile to read.
  severity: medium
  weakest_dimension: clarity
improvements:
- change: 'Add a mandatory ''output sanitization'' step: every agent must pipe all
    terminal/verification output through a post-processor that strips ANSI escapes,
    collapses diff noise, and reformats into a structured summary before final delivery.'
