  reason: The agent currently generates structurally correct blueprint improvements
    and passes all checks, but fails to present them cleanly — the judge confirms
    the work is sound (90/100) while the self-eval crater (45/100) reflects the hostile
    delivery format. A formatting gate would lift both self-eval scores and composite.
  target: BLUEPRINT.md
retry_recommended: 'false'
summary: Solid execution (judge 90) undermined by delivery noise (self-eval 45); a
  mandatory output-sanitization step in the blueprint would close the gap and push
  composite past the quality gate.
