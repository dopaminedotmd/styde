    penalized this as incomplete precision, dragging clarity down.
  target: BLUEPRINT.md
- change: 'Add a ''proactive disclosure'' trait: surface edge cases and ambiguous
    fields (undefined zones, unstated units) before the reader would encounter them.'
  expected_impact: medium
  reason: The agent knew zone-c was undefined but deferred clarification to the end
    — a persona shift to catch ambiguities early would prevent this pattern.
  target: persona.md
