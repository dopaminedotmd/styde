    explicit budgeting ensures full delivery within context window
  target: BLUEPRINT.md
- change: 'Add a self-validation step after output: verify no section has an orphaned
    header or missing closing statement before marking complete'
  expected_impact: medium
  reason: Truncation was invisible to the agent during generation; a post-hoc check
    would catch cut-off and trigger a repeat or compression pass
  target: BLUEPRINT.md
