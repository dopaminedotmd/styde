  expected_impact: low
  reason: Typo in self-eval lowers accuracy score despite correct technical content
    underneath.
  target: BLUEPRINT.md
- change: 'Instruct the agent to prefer DRY specifications: define shared contracts
    once, reference them by name, and reserve inline detail only for genuinely unique
    transitions.'
  expected_impact: medium
  reason: Shifts agent behaviour from exhaustive-verbose to exhaustive-concise, directly
    targeting the efficiency gap.
  target: persona.md
