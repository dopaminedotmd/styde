appId: com.yourapp
---
- launchApp:
    stopApp: true
- assertVisible: "login-screen"
- tapOn: "email-input"
- inputText: "test@example.com"
- tapOn: "password-input"
- inputText: "password123"
- tapOn: "login-button"
- assertVisible: "home-screen"
- tapOn: "create-item-fab"
- assertVisible: "create-item-modal"
- tapOn: "item-title-input"
- inputText: "New Item Created via Maestro"
- tapOn: "save-item-button"
- assertVisible: "home-screen"
- assertVisible: "success-toast"
- extendedWaitUntil:
    visible: "home-list-item-0"
    timeout: 10000
- stopApp
