appId: com.yourapp
---
- launchApp:
    delete: true
- assertVisible: "login-screen"
- tapOn: "login-button"
- assertVisible: "error-email-required"
- tapOn: "email-input"
- inputText: "invalid"
- tapOn: "password-input"
- inputText: "abc"
- tapOn: "login-button"
- assertVisible: "error-invalid-email"
- tapOn: "email-input"
- clearText: true
- inputText: "valid@email.com"
- tapOn: "password-input"
- clearText: true
- inputText: "short"
- tapOn: "login-button"
- assertVisible: "error-password-length"
