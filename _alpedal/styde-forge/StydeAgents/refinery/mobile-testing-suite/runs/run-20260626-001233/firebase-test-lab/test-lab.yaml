steps:
- name: Build Android APK
  artifact: android/app/build/outputs/apk/debug/app-debug.apk
  devices:
  - model: Pixel_6_API_34
    version: '30'
    locale: en_US
    orientation: portrait
  testTimeout: 300s
  testTargets:
  - fastIntegrationTest
  directoriesToPull:
  - /sdcard/Download

- name: Build iOS IPA
  artifact: ios/build/YourApp.ipa
  devices:
  - model: iphone-15-pro
    version: '17.2'
    locale: en_US
    orientation: portrait
  testTimeout: 300s
  testTargets:
  - fastIntegrationTest
