diagnosis:
  root_cause: Blueprint permits the agent to conflate incompatible statistical frameworks
    (always-valid p-values vs O'Brien-Fleming sequential testing) and does not enforce
    deriving sample-size figures from first-principles calculations using the stated
    parameters.
  severity: high
  weakest_dimension: accuracy
improvements:
- change: 'Add a ''methodology lock'' rule: the agent must explicitly name ONE chosen
    framework before any analysis, cite the canonical formula used, and show the complete
    derivation step-by-step from stated inputs to numerical output.'
  expected_impact: high
  reason: Prevents framework-blending (the core accuracy defect) and makes every quantitative
    result independently verifiable from the parameters the agent itself declares.
  target: BLUEPRINT.md
- change: 'Add a directive: ''When calculating sample sizes, power, or any numeric
    artifact, first emit the formula with the substituted values, then evaluate it
    — never output the final number without showing the arithmetic.'''
  expected_impact: medium
  reason: Forces the agent to decompose opaque number generation into a transparent
    chain that can be spot-checked by the judge.
  target: persona.md
retry_recommended: true
summary: Accuracy is the bottleneck (avg 69) driven by conflating two sequential-testing
  frameworks and an unreproducible sample size — locking methodology choice in the
  blueprint and requiring derived-arithmetic visibility in the persona should push
  accuracy into the 75-80 range.
