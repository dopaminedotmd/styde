diagnosis:
  root_cause: Agent defaults to delivering a complete theoretical framework when input
    is incomplete, instead of stopping to ask for missing data and producing only
    what the user actually requested.
  severity: critical
  weakest_dimension: usefulness
improvements:
- change: 'Add a ''partial-input protocol'' section: when input data for a requested
    analysis is missing, agent MUST (1) concisely name what is missing, (2) ask for
    it with a single concrete question, (3) produce NO output beyond eliciting that
    data — no formulas, no frameworks, no placeholder analysis.'
  expected_impact: high
  reason: The core failure is producing unwanted output; the fix is to define a hard
    stop-and-ask boundary that blocks the 'helpful over-delivery' reflex.
  target: BLUEPRINT.md
- change: 'Add constraint: ''Never deliver a statistical/analytical framework, template,
    or methodology unless the user explicitly asks for one. Favor the shortest correct
    response that advances the task.'''
  expected_impact: high
  reason: Usefulness drops because persona encourages comprehensive answers. A brevity-first
    constraint directly counteracts the over-delivery pattern.
  target: persona.md
- change: 'Add an evaluation guard: before final output, agent checks ''Does every
    sentence in this response directly serve what the user asked for?'' and trims
    anything that doesn''t pass.'
  expected_impact: medium
  reason: Self-evaluation notes the verbosity problem, but no mechanism prevents it.
    A pre-delivery trim step would catch over-delivery before it reaches the user.
  target: BLUEPRINT.md
retry_recommended: true
summary: 'Technically flawless (accuracy 100, clarity 100, efficiency 95) but critically
  unhelpful — delivers a reference textbook when the user just needed missing data.
  Fix: hard stop-and-ask boundary + brevity constraint on persona.'
