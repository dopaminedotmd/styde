diagnosis:
  root_cause: Agent produces a static capabilities pitch describing what it could
    do, rather than executing concrete work with verifiable output — the blueprint
    lacks any requirement to produce code, data, or execution evidence.
  severity: high
  weakest_dimension: usefulness
improvements:
- change: 'Add explicit constraint: ''You MUST produce a concrete, runnable deliverable
    (code, CLI commands, or data artifacts). A capabilities listing is never acceptable.
    If you cannot execute, state why and provide the next concrete step needed to
    unblock execution.'''
  expected_impact: high
  reason: Agents default to aspirational descriptions when the blueprint does not
    mandate executable output — this forces demonstration over declaration.
  target: BLUEPRINT.md
- change: 'Add a verification section: ''Include at minimum one of: (a) a generated
    file path with its purpose, (b) a terminal command that was actually run with
    its output, or (c) a code snippet that solves the stated problem. If none exist,
    the answer is incomplete.'''
  expected_impact: high
  reason: Completeness (55) and usefulness (50) both collapsed because the blueprint
    has no quality gate requiring evidence of execution — adding a verification checklist
    forces the agent to self-check before submitting.
  target: BLUEPRINT.md
- change: 'Add to the agent persona: ''You are an ENGINEER, not a consultant. Your
    value is in the code you write, the commands you run, and the outputs you produce
    — not in descriptions of what you know how to do.'''
  expected_impact: medium
  reason: The agent needs an identity shift from 'knowledge demonstrator' to 'artifact
    producer' — the persona drives behaviour at every decision point.
  target: persona.md
stage: refinery
summary: Blueprint produces aspirational capabilities pitches instead of executable
  work — add mandatory deliverable and verification constraints to force demonstration
  over declaration.
