diagnosis:
  root_cause: Blueprint's process tree/decomposition section lacks explicit structural
    templates for complex hierarchical mockups, causing vague descriptions in edge
    cases
  severity: low
  weakest_dimension: completeness
improvements:
- change: Add a 'process_tree_template' field with explicit named-node-pattern (parent::child::variant)
    and a minimum-3-level depth requirement for any mockup with more than 5 visual
    elements
  expected_impact: high
  reason: The self-eval notes that Mockup 6's process tree description was vague and
    dotted-path naming was inconsistent — a structural template eliminates both by
    enforcing a uniform depth and naming convention across all mockups
  target: config.yaml
pattern:
  description: Define one canonical baseline configuration in YAML, then each mockup
    declares only its deviations from that baseline, eliminating ~63% redundant specification
    while making unique design choices instantly visible
  name: baseline-plus-deviations
  reusable: 'yes'
summary: 93.4 composite — production-ready YAML structure with a reusable baseline/deviations
  pattern; minor completeness gap in complex mockup descriptions fixable with a named-node-process-tree
  template
