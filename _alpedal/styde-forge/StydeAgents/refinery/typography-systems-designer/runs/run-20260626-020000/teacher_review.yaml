diagnosis:
  root_cause: Agent treated the task as a design-documentation exercise (spec + rationale)
    rather than a build-and-verify exercise — it never opened the HTML in a browser
    or captured a screenshot, so the deliverable reads as untested theory.
  severity: high
  weakest_dimension: completeness
improvements:
- change: 'Add a mandatory ''Verification Trace'' step after the build phase: the
    agent must open the generated HTML in a headless browser (or equivalent), capture
    a timestamped screenshot/console log, and confirm no JS errors or rendering glitches
    before declaring completion.'
  expected_impact: high
  reason: Forces agents to empirically validate their deliverable works instead of
    stopping at 'here is the code I wrote.' Closes the gap between writing output
    and proving output functions.
  target: BLUEPRINT.md
- change: 'Add a persona constraint: ''You must verify your own work. After generating
    any deliverable (HTML, script, config), run it or open it and report what you
    see — never submit untested output.'''
  expected_impact: medium
  reason: Changes the agent's mental model from documentation-writer to builder-tester,
    making verification a non-negotiable part of the task.
  target: persona.md
pattern:
  description: The agent produced a technically thorough, well-reasoned typography
    engine spec with accurate CSS feature coverage, clear rationale for each design
    choice, and real deliverable files — strong documentation discipline that made
    the design trustworthy even before testing.
  name: technical-justification-with-interactive-spec
  reusable: 'yes'
stage: refinery
