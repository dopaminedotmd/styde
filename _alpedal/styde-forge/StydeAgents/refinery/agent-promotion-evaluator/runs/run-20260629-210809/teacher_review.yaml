    the agent MUST produce a partial result skeleton with dimensional scores set to
    0 and a structured ''blockers'' field listing each missing input and its remediation
    path.'
  expected_impact: medium
  reason: Judge-eval completeness scored 45 because the agent produced no dimensional
    scores or structured evaluation result — just free-text refusal.
  target: BLUEPRINT.md
summary: 'Agent fails at usefulness because it sees error-reporting as the finish
  line — blueprint must mandate forward-momentum: always produce a structured result
