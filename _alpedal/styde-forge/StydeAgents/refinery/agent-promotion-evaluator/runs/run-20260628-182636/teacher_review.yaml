  severity: high
  weakest_dimension: completeness
improvements:
- change: 'Add an explicit ''grounding gate'' step before evaluation: skip or flag
    N/A test cases at the start and require the agent to confirm which test cases
    can actually be executed before scoring begins.'
  expected_impact: high
  reason: Forces the agent to assess ground truth coverage upfront, preventing phantom
    scores from inflating aggregate metrics.
  target: BLUEPRINT.md
- change: Define a hard minimum threshold (e.g., <50% grounded → abort eval) and instruct
    the agent to report a separate 'coverage_ratio' alongside the composite score.
  expected_impact: medium
  reason: Transparently separates evaluation quality from agent performance so a low-coverage
    eval doesn't masquerade as a borderline pass.
  target: BLUEPRINT.md
- change: Add a rule requiring the agent to resolve internal contradictions (e.g.,
    raw 86.2 vs adjusted 68.96) in its self-eval by picking a single reconciled number
    and explaining which metric is authoritative.
  expected_impact: medium
  reason: Contradictory metrics in the self-eval undermine actionability for trainers
    and erode trust in the agent's self-assessment ability.
  target: persona.md
- change: Set a penalty multiplier when the gap between self-eval and judge-eval exceeds
    5 points on any single dimension, especially accuracy.
  expected_impact: low
  reason: 75-self vs 85-judge on accuracy suggests the agent undervalues its own precision,
    which biases composite scores and misleads trainers.
  target: config.yaml
