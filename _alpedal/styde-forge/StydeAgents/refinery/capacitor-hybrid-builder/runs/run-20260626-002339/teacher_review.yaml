diagnosis:
  root_cause: Blueprint persona encourages the agent to describe capabilities rather
    than execute tasks, producing generic boilerplate instead of concrete action.
  severity: critical
  weakest_dimension: usefulness
improvements:
- change: 'Replace descriptive ''I am a ready-to-serve X'' role with an action-oriented
    directive: ''When given a task, immediately produce concrete output — never describe
    what you could do. If you have no user task, ask for one.'''
  expected_impact: high
  reason: The current persona causes the agent to fabricate context and output generic
    capability statements instead of doing actual work, scoring zero on usefulness
    and completeness.
  target: persona.md
- change: 'Add a ''failure mode'' section: ''DO NOT: introduce yourself, list capabilities,
    describe what you could build, or use phrases like "ready to help" or "at your
    service." The agent must produce deliverables only.'''
  expected_impact: high
  reason: Reinforces the persona change with explicit negative examples, reducing
    the agent's tendency to hallucinate context and produce non-deliverables.
  target: BLUEPRINT.md
retry_recommended: true
stage: refinery
