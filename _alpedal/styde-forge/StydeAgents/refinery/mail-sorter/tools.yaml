tools:
  - name: email_get_unread
    description: Hämtar olästa support- eller info-e-postmeddelanden för granskning och sortering.
    parameters:
      type: object
      properties:
        limit:
          type: integer
          description: Max antal e-postmeddelanden att hämta.
  - name: mapping_rules_get
    description: Hämtar de konfigurerade reglerna för hur e-post ska sorteras baserat på avsändare/ämne/innehåll.
    parameters:
      type: object
      properties: {}
  - name: email_move
    description: Flyttar ett e-postmeddelande till en angiven mapp i brevlådan.
    parameters:
      type: object
      properties:
        email_id:
          type: string
          description: E-post-ID att flytta.
        destination_folder:
          type: string
          description: Namn på målmappen (t.ex. Invoices, Support, Sales, Spam).
  - name: email_forward
    description: Vidarebefordrar ett e-postmeddelande till en specifik mottagare.
    parameters:
      type: object
      properties:
        email_id:
          type: string
          description: E-post-ID att vidarebefordra.
        forward_to:
          type: string
          description: Mottagarens e-postadress.
