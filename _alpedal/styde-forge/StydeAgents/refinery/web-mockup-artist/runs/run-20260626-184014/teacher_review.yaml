  expected_impact: high
  reason: The agent produced excellent content but self-penalized to 62/100 on completeness
    because the truncation boundary cut the artifact mid-JS. A hard size constraint
    in the blueprint would force the agent to compress effectively or flag when it
    can't fit, preventing broken delivery.
