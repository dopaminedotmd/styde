diagnosis:
  root_cause: Agent foregrounds open-ended clarification questions instead of proposing
    a concrete default direction the user can approve or tweak.
  severity: medium
  weakest_dimension: usefulness
improvements:
- change: 'Add a blueprint instruction: ''When input is ambiguous or underspecified,
    always propose a concrete default (with rationale) first, then offer alternatives
    or ask for refinements — never start by asking open-ended questions without a
    proposal.'''
  expected_impact: high
  reason: Users want a draft they can react to, not a blank 'what do you want?' conversation
    starter. A concrete default feels useful even when it's wrong — it narrows the
    decision space.
  target: config.yaml
pattern:
  description: When input lacks detail, the agent correctly identifies the gap, confirms
    what was understood, and asks precise structured questions covering all decision
    dimensions — without leaving ambiguity about what is missing.
  name: structured-clarification-probe
  reusable: 'yes'
stage: refinery
summary: Agent identifies the gap correctly and asks structured questions, but would
  be more useful if it led with a concrete default proposal instead of open-ended
  clarification.
