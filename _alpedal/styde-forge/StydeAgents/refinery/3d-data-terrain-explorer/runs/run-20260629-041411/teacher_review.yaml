diagnosis:
  root_cause: Eval diff truncated at 856 lines — agent could not see its own full
    output to self-assess completeness, dragging self-eval to 75 despite judge scoring
    93.
  severity: medium
  weakest_dimension: completeness
improvements:
- change: For artifacts exceeding ~500 lines, read the actual output file via read_file
    instead of relying on the truncated diff, and report file size + line count +
    first/last 50 lines.
  expected_impact: high
  reason: The 856-line diff truncation is the sole cause of the self-eval completeness
    deficit (75 vs judge's 93). Fixing the eval harness gives the agent truthful signal.
  target: eval/score.py
- change: 'Add a final verification step: ''After writing the output file, stat it
    with terminal(wc -l) and confirm it is non-empty and line count matches expectations
    before declaring completion.'''
  expected_impact: medium
  reason: A self-contained file-size sanity check prevents the agent from relying
    on truncated diffs to judge its own work, independently of eval-harness fixes.
  target: BLUEPRINT.md
pattern:
