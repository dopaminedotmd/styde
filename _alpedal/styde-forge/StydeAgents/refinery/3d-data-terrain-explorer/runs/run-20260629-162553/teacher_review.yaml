    data to users.
  target: BLUEPRINT.md
- change: Require flood-fill river pathfinding to cache computed paths indexed by
    source/time-step so repeated access across time indices reuses results instead
    of recomputing.
  expected_impact: medium
  reason: Judge flagged per-time-index recompute as an efficiency gap; caching paths
    at the time-step granularity closes the gap with minimal memory cost.
  target: BLUEPRINT.md
