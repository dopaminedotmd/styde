    frame with no LOD, no view-frustum culling, and particle height sampling against
    a flat 2D array without spatial indexing.
  severity: medium
  weakest_dimension: efficiency
improvements:
- change: 'Add a performance requirements section: target frame rate (≥30fps), mandatory
    LOD for terrain meshes, view-frustum culling, and spatial index (grid or quadtree)
