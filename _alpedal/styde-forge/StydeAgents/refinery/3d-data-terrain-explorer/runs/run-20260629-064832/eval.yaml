  notes: Accurate overall but the river pathfinding has a JS array-comparison bug
    (dirs.indexOf([dx,dy]) compares by reference, always returns -1), rendering the
    gradient-ascent optimization dead code; the value noise and FBM are correct but
    use a simple hash rather than true Perlin; structure is clean with section headers
    and consistent naming, though several complex blocks (river tracing, terrain coloring
    math) lack inline comments; feature set is very complete with terrain, rivers,
    particles, bookmarks, tooltips, stats panel, legend, keyboard shortcuts, and wireframe
    toggle; river rebuilding on every time step is O(N²) with inner flood-fill that
    revisits many cells, and the random-direction fallback prevents reproducible traces;
    as a production monitoring dashboard this immediately conveys multi-layer temporal
    data with intuitive physical metaphor — only the broken river routing and uncommented
    coloring formula hold it back from a higher usefulness score.
  score: 86
