    diff lines to 50 with remainder written to a .diff artifact.'
  expected_impact: medium
  reason: Caps the noise floor automatically so large diffs never dominate the response
    again.
  target: config.yaml
- change: 'Add clarity directive: ''After delivering output, always precede raw tool
    output with a 3-5 line executive summary covering what was built, key metrics,
    and pass/fail status. Never let raw diffs be the opening content.'''
  expected_impact: high
  reason: Reinforces the structural constraint at the persona level as a fallback
    if the BLUEPRINT.md rule is missed.
  target: persona.md
retry_recommended: true
summary: Agent produces correct, verified results (26/26 checks) but buries them in
