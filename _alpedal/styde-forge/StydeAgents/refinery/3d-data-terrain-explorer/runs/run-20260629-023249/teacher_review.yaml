diagnosis:
  root_cause: Terrain explorer is locked to synthetic procedural data with no support
    for loading external elevation models (DEM/GeoTIFF/CSV), making it a tech demo
    rather than a practical tool.
  severity: high
  weakest_dimension: usefulness
improvements:
- change: Add a requirement to support loading external elevation data from at least
    one real-world format (e.g., CSV grid, GeoTIFF via geotiff.js, or a REST elevation
    API). Include acceptance criteria for the data-to-visual pipeline using a real
    dataset.
  expected_impact: high
  reason: Forces the agent to implement external data ingestion, shifting from a purely
    synthetic demo to a useful tool that solves an actual problem.
  target: BLUEPRINT.md
- change: 'Add a constraint: ''You must provide a working mechanism to load user-provided
    elevation data. If the spec does not specify a data format, you must proactively
    choose and document at least one real-world input format.'''
  expected_impact: medium
  reason: Prevents the agent from defaulting to 100% procedural generation when the
    spec is ambiguous about data sources.
  target: persona.md
retry_recommended: true
summary: Agent produces visually polished terrain explorer but fails on usefulness
  because it cannot consume external data — add real-world data loading to push past
  the production gate.
