    skipped on day transitions, and dead code (TRUNCATION_PASS) runs per tick without
    effect
  severity: medium
  weakest_dimension: efficiency
improvements:
- change: 'Add a performance rubric to the requirements section: prohibit full-geometry
    rebuilds (prefer bufferAttribute updates), require frame-interpolated particle
    transitions, and ban unresolved hardcoded booleans or dead code'
  expected_impact: high
  reason: Makes efficiency a first-class requirement the agent checks against at design
    time, not a post-hoc penalty
  target: BLUEPRINT.md
- change: 'Insert ''Profile: Efficiency-Conscious — before implementing any animation
    loop, identify per-frame allocations and either cache or avoid them'' into the
    engineering archetypes list'
