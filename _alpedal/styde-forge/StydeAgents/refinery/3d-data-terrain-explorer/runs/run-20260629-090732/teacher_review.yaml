diagnosis:
  root_cause: CPU-per-particle animation with material cloning without disposal causes
    memory leaks and per-frame allocation churn
  severity: high
  weakest_dimension: efficiency
improvements:
- change: Add 'profile before optimizing — profile after' mandate with specific WebGPU/WebGL
    profiling tools (Spector.js, browser DevTools Performance tab)
  expected_impact: high
  reason: Self-eval correctly identified the leak but did not detect it during development,
    meaning no lifecycle/GPU benchmarking was run
  target: persona.md
- change: Insert a 'Resource Lifecycle' subsection under constraints demanding all
    GPU objects (materials, geometries, textures) use create-or-dispose patterns via
    a registry; forbid per-frame allocations in animation loops
  expected_impact: high
  reason: setHour cloning a material every call without disposal is a textbook memory
    leak that a lifecycle policy catches at review time
  target: BLUEPRINT.md
