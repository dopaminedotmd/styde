diagnosis:
  root_cause: Blueprint allowed voluntary deferral of known features (raycaster tooltips,
    data import, mobile layout) into a TODO section instead of enforcing them as acceptance
    criteria.
  severity: medium
  weakest_dimension: completeness
improvements:
- change: Add a required-features checklist with explicit pass/fail gates — raycaster
    tooltips, data import, mobile layout — and forbid marking a blueprint complete
    if any required feature is deferred to TODO.
  expected_impact: high
  reason: 'The agent knew what was missing (self-eval completeness: 80) but the blueprint
    didn''t require those items as mandatory, so they were deferred rather than built.'
  target: BLUEPRINT.md
- change: Add a judge-rubric rule that docks completeness for deferring interactive
    features (raycaster, tooltip, hover state) to a future milestone without a concrete
    implementation path.
  expected_impact: medium
  reason: Judge completeness (93) was generous — docking deferrals would align the
    rubric with production standards and raise the floor for future runs.
  target: config.yaml
pattern:
  description: Pre-computed geometry caching combined with event-driven particle/animation
    systems (flow field, river, bookmarks) produced a performant 3D explorer that
    scored high on accuracy (94) and clarity (97) from the judge.
  name: pre-cached-geo-plus-events
  reusable: 'yes'
retry_recommended: 'false'
summary: Strong interactive 3D explorer with pre-cached geometry and particle systems;
  completeness gap is the only thing blocking production readiness at 89.4 — enforce
  required-features gates to close it.
