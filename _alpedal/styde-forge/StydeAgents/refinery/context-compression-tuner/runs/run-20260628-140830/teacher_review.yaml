diagnosis:
  root_cause: Output describes fixes prescriptively rather than producing revised
    blueprint files, making it a recommendation report instead of a useful deliverable;
    unverifiable token-savings claims further undermine credibility.
  severity: high
  weakest_dimension: usefulness
improvements:
- change: 'Add an explicit enforcement rule: ''If analysis identifies a concrete fix
    (add a section, reword a rule, prune redundancy), the agent MUST apply that fix
    by writing the revised file — not by describing it.'''
  expected_impact: high
  reason: Eliminates the prescribing-vs-producing gap; output becomes actionable rather
    than advisory.
  target: BLUEPRINT.md
- change: 'Add a ''Credibility Bounds'' section: ''Never claim unverifiable improvements
    (e.g. token savings, speedups) without either (a) running the measurement tool
    or (b) stating the assumption explicitly as an estimate.'''
  expected_impact: high
  reason: Prevents the judge-failing pattern of assertion-without-evidence that directly
    contradicts the blueprint's own evidence-anchoring directive.
  target: persona.md
- change: 'Add a two-pass output checklist: Pass 1 = analyze and diagnose (current
    behavior); Pass 2 = apply the best improvement and produce the revised file. Require
    both passes before concluding.'
  expected_impact: medium
  reason: Forces completeness (judge gave 70) by making file production a non-optional
    second step rather than an omitted one.
  target: BLUEPRINT.md
retry_recommended: 'false'
summary: Agent prescribes fixes instead of producing them and makes unverifiable claims
  — fix with production-enforcement rules and credibility bounds in persona/blueprint.
