diagnosis:
  root_cause: 'CSS used browser-unsupported SVG path animation (`d: path()` in @keyframes)
    and referenced Inter font without loading it, creating silent visual failures'
  severity: high
  weakest_dimension: accuracy
improvements:
- change: 'Add constraint: ''All CSS animations must use properties supported by current
    browser engines (transform, opacity, filter). SVG path morphing requires SMIL
    <animate> or JavaScript. All external fonts must be loaded via @import or @font-face
    with fallback.'''
  expected_impact: high
  reason: 'Prevents the two exact defects found: broken SVG animation and missing
    font dependency'
  target: BLUEPRINT.md
