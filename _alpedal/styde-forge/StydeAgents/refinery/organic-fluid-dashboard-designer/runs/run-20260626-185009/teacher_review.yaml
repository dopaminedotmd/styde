    defeats every quality gate — no validation has ever actually failed, so accuracy/efficiency
    scores are artificially inflated
  target: BLUEPRINT.md
- change: 'Add a .pipeline-hygiene quality check: verify all shell validation scripts
    use explicit exit-code capture (`$?` storage or `if ! cmd`) rather than `|| true`'
  expected_impact: medium
