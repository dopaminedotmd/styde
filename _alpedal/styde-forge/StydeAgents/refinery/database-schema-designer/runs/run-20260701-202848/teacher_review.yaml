diagnosis:
  root_cause: Agent stops at diagnosis — correctly identifies the missing task body
    but offers no fallback action, alternative resolution paths, or proactive next
    step beyond 'please resend'.
  severity: medium
  weakest_dimension: completeness
improvements:
- change: 'Add a ''fallback protocol'' rule: when the agent detects incomplete input
    (missing task body, truncated message, ambiguous reference), it MUST propose at
    least one concrete fallback action — e.g. guess the intent from context, ask a
    clarifying multiple-choice question, or offer to proceed with a reasonable default
    — before defaulting to ''resend''.'
  expected_impact: high
  reason: Judge penalized completeness 15 points because the agent provided zero fallback.
    A single proactive option would close that gap.
  target: BLUEPRINT.md
- change: 'Add a ''state dump discipline'' rule: when surfacing internal state (caveman
    mode, version info, config flags), filter to only items that directly affect the
    response. Omit cosmetic/internal-only fields like ''caveman_ultra'' and version
    strings that add no value to the user.'
  expected_impact: low
  reason: Self-eval notes state dump is 'slightly noisy' — trimming irrelevant fields
    improves clarity and usefulness without losing accuracy.
  target: persona.md
pattern:
  description: Agent correctly identifies the root problem (missing task body) before
    attempting any response, and provides actionable, concrete examples in its reply.
    This 'diagnose then exemplify' flow keeps accuracy high (90) even when input is
    incomplete.
  name: R1-Diagnosis-First
  reusable: 'yes'
retry_recommended: 'false'
summary: Strong diagnosis and example quality — add exactly one fallback branch to
  the blueprint and this pattern becomes production-grade.
