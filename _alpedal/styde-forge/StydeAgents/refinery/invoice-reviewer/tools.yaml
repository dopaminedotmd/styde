tools:
  - name: fortnox_invoice_list
    description: Listar historiska fakturor från Fortnox för att upptäcka dubbletter.
    parameters:
      type: object
      properties:
        limit:
          type: integer
          description: Max antal fakturor att hämta.
  - name: fortnox_invoice_get
    description: Hämtar detaljerad information om en specifik faktura från Fortnox.
    parameters:
      type: object
      properties:
        invoice_id:
          type: string
          description: Faktura-ID.
  - name: order_history_get
    description: Hämtar inköpsorderhistorik för att matcha mot fakturabeloppet.
    parameters:
      type: object
      properties:
        order_id:
          type: string
          description: Order-ID att söka efter.
  - name: flag_invoice_for_review
    description: Flaggar en faktura för manuell granskning vid upptäckta avvikelser.
    parameters:
      type: object
      properties:
        invoice_id:
          type: string
          description: Faktura-ID.
        reason:
          type: string
          description: Orsak till flaggningen.
  - name: mark_invoice_as_ready
    description: Godkänner fakturan och markerar den som redo för betalning.
    parameters:
      type: object
      properties:
        invoice_id:
          type: string
          description: Faktura-ID.
