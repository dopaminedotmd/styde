diagnosis:
  root_cause: Specen är pixel-exakt och strukturerad men utelämnar alla state-variationer
    (mörkt läge, laddning, tomt tillstånd), typografiregler och konkret kortinnehåll.
  severity: medium
  weakest_dimension: completeness
improvements:
- change: 'Lägg till en ''## State Coverage Mandate''-sektion: kräv att varje spec
    täcker minst mörkt läge, laddningstillstånd (skeleton/spinner), tomt tillstånd
    (empty state), felläge och hover/focus för varje interaktiv komponent.'
  expected_impact: high
  reason: Self-evalens completeness 78 och judge-anteckningen om mörkt läge/laddning
    visar att state-täckning är den primära completeness-bristen — agenten bygger
    'happy path'-spec utan kantfall.
  target: BLUEPRINT.md
- change: 'Lägg till ''## Typography Specification Requirement'': kräv font-familj,
    font-storlekar (minst h1-h4 + body + caption), line-height, font-weight-hierarki
    och letter-spacing för varje spec.'
  expected_impact: medium
  reason: Judge påpekar att typografiregler är det enda som hindrar perfekt score
    (95 på efficiency, 90 på usefulness men completeness 85 pga saknad typografi).
  target: BLUEPRINT.md
- change: 'Lägg till ''## Content Completeness Rule'': specen måste innehålla minst
    3 konkreta exempel på innehåll per komponenttyp (t.ex. faktiska tidslinjehändelser,
    sessionsrubriker, datum) — inte bara struktur/layout.'
  expected_impact: medium
  reason: Self-eval noterar 'saknar konkret innehåll för tidslinje- och sessionskorten'
    — agenten specificerade layout men inte vad som faktiskt ska stå i korten.
  target: BLUEPRINT.md
pattern:
  description: Agenten producerade en spec med explicita constraint-verifikationer,
    konkreta pixel-mått och organiserade sektioner för visuell hierarki och övergångar.
    Detta gav 95 på efficiency och 92 på clarity — mönstret 'mät och verifiera varje
    constraint' är återanvändbart för alla spec-blueprints.
  name: constraint-verified-spec
  reusable: 'yes'
summary: Produktionsklar spec (88.8) med utmärkt struktur och constraint-verifiering
  — åtgärda state-täckning, typografi och konkret innehåll så når den 95+.
