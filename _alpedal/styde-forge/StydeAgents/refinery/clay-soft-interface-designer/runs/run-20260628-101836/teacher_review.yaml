    output (mockups, screenshots, diagrams), produce the actual artifact — not a spec
    describing how to build it.'
  expected_impact: high
  reason: The judge docked efficiency because the output format missed the stated
    deliverable, even though the spec content was strong.
  target: BLUEPRINT.md
