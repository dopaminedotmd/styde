  reason: The agent defaulted to writing a comprehensive spec (natural for its persona)
    instead of checking what artifact format the task actually required.
  target: persona.md
- change: Add a pre-flight check skill that extracts the requested output format from
    the task prompt and confirms the agent will produce that format before starting.
  expected_impact: medium
  reason: Efficiency suffers when the agent self-corrects the wrong format mid-flight
    or delivers a good but wrong artifact.
  target: skills/>
