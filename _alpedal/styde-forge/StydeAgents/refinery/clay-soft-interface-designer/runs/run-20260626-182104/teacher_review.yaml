diagnosis:
  root_cause: CSS values duplicated across selectors and chart bars use hardcoded
    inline styles instead of data-driven rendering, making the output non-maintainable
    and non-reusable.
  severity: high
  weakest_dimension: efficiency
improvements:
- change: Add an 'Efficiency Standards' section requiring CSS custom properties for
    all repeated values (shadows, colors, spacing) and data-driven rendering for any
    chart/bar/visualization element.
  expected_impact: high
  reason: Ensures the agent generates reusable, maintainable code from the start rather
    than producing one-shot throwaway output.
  target: BLUEPRINT.md
- change: 'Add a directive: ''Extract all repeated CSS values (shadows, colors, radii,
    spacing) into :root custom properties before writing any selector. For charts
    and data visualizations, compute bar heights from a data array, never use hardcoded
    inline pixel values.'''
  expected_impact: medium
  reason: Persona-level instruction aligns the agent's coding habits with production-quality
    standards, reducing duplicate shadow declarations and inline style anti-patterns.
  target: persona.md
