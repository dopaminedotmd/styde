  target: BLUEPRINT.md
- change: Add a blueprint-level integration check — before shipping a blueprint, programmatically
    run `python -c "import <blueprint>"` on its verify test to catch unresolved imports.
  expected_impact: medium
  reason: Catches the import-path class of bug before the agent attempts the task,
    reducing accuracy regressions introduced during blueprint authoring.
  target: BLUEPRINT.md
