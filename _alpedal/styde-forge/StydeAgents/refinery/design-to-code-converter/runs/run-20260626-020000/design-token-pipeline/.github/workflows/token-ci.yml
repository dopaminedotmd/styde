name: Design Token CI

on:
  push:
    paths:
      - 'tokens/**'
      - 'style-dictionary/**'
      - '.github/workflows/token-ci.yml'
    branches: [main, develop]
  pull_request:
    paths:
      - 'tokens/**'
      - 'style-dictionary/**'
    branches: [main]
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Comma-separated platforms to build (e.g., css,json,ts,figma)'
        required: false
        default: 'css,json,ts,scss,tailwind,figma'
      sync_figma:
        description: 'Sync tokens from Figma before build'
        type: boolean
        required: false
        default: false
      release:
        description: 'Create a release with built artifacts'
        type: boolean
        required: false
        default: false
  schedule:
    # Daily token freshness check at 8am UTC
    - cron: '0 8 * * 1-5'

env:
  NODE_VERSION: '20'
  BUILD_PLATFORMS: ${{ inputs.platforms || 'css,json,ts,scss,tailwind,figma' }}

jobs:
  # ─── Validate token source files ──────────────────────────────────────
  validate:
    name: Validate Tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint token files
        run: npm run lint:tokens

      - name: Validate JSON schema
        run: node scripts/validate-schema.js

      - name: Check for duplicate token names
        run: node scripts/check-duplicates.js

      - name: Verify token naming convention
        run: node scripts/check-naming.js

  # ─── Build tokens for all platforms ───────────────────────────────────
  build:
    name: Build Tokens
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [css, json, ts, scss, less, tailwind, figma]
      # Don't fail all platforms if one fails
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.platform }}
        run: |
          npx style-dictionary build \
            --config style-dictionary/config.json \
            --platform ${{ matrix.platform }}

      - name: Upload ${{ matrix.platform }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tokens-${{ matrix.platform }}
          path: dist/${{ matrix.platform }}/
          retention-days: 7

  # ─── Optional: Sync from Figma ───────────────────────────────────────
  sync-figma:
    name: Sync from Figma
    if: ${{ inputs.sync_figma || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    environment: figma-tokens
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pull tokens from Figma
        env:
          FIGMA_PERSONAL_ACCESS_TOKEN: ${{ secrets.FIGMA_PERSONAL_ACCESS_TOKEN }}
          FIGMA_FILE_KEY: ${{ secrets.FIGMA_FILE_KEY }}
          FIGMA_NODE_ID: ${{ secrets.FIGMA_NODE_ID }}
        run: node figma-tokens/sync.js pull

      - name: Check for token diffs
        id: diff
        run: |
          if [[ -n $(git status --porcelain tokens/) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "## 🔄 Token Changes Detected" >> $GITHUB_STEP_SUMMARY
            git diff --stat tokens/ >> $GITHUB_STEP_SUMMARY
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "## ✅ No token changes" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create PR with Figma sync
        if: steps.diff.outputs.changes == 'true' && github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'fix(tokens): sync design tokens from Figma'
          title: '🔄 Sync design tokens from Figma'
          body: |
            Automated token sync from Figma.

            This PR was automatically generated by the Design Token CI workflow.
            Please review the changes and merge if valid.

            - **Build Status:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          branch: figma-token-sync
          base: main
          labels: tokens, automated
          delete-branch: true

  # ─── Test built outputs ──────────────────────────────────────────────
  test:
    name: Test Outputs
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: tokens-*
          merge-multiple: true

      - name: Validate CSS output
        run: |
          echo "Checking CSS output..."
          if [ -f dist/css/tokens.css ]; then
            echo "✅ CSS tokens generated"
            # Verify OKLCH colors are present
            if grep -q "oklch" dist/css/tokens.css; then
              count=$(grep -c "oklch" dist/css/tokens.css)
              echo "✅ Found ${count} OKLCH color values"
            fi
            # Verify rem values are present
            if grep -q "rem" dist/css/tokens.css; then
              count=$(grep -c "rem" dist/css/tokens.css)
              echo "✅ Found ${count} rem values"
            fi
          else
            echo "❌ CSS tokens missing"
            exit 1
          fi

      - name: Validate JSON output
        run: |
          if [ -f dist/json/tokens.json ]; then
            echo "✅ JSON tokens (nested) generated"
            cat dist/json/tokens.json | python3 -m json.tool > /dev/null && echo "✅ Valid JSON"
          fi
          if [ -f dist/json/tokens-flat.json ]; then
            echo "✅ JSON tokens (flat) generated"
            cat dist/json/tokens-flat.json | python3 -m json.tool > /dev/null && echo "✅ Valid JSON"
          fi

      - name: Validate TypeScript output
        run: |
          if [ -f dist/ts/tokens.ts ]; then
            echo "✅ TypeScript const generated"
            if grep -q "as const" dist/ts/tokens.ts; then
              echo "✅ TypeScript uses 'as const' for literal types"
            fi
          fi
          if [ -f dist/ts/tokens.d.ts ]; then
            echo "✅ TypeScript declarations generated"
          fi

      - name: Validate SCSS output
        run: |
          if [ -f dist/scss/_tokens.scss ]; then
            echo "✅ SCSS variables generated"
            count=$(grep -c '\$' dist/scss/_tokens.scss)
            echo "✅ Found ${count} SCSS variables"
          fi

      - name: Validate Tailwind output
        run: |
          if [ -f dist/tailwind/tokens.tailwind.js ]; then
            echo "✅ Tailwind theme extension generated"
          fi

      - name: Validate Figma output
        run: |
          if [ -f dist/figma/tokens-figma.json ]; then
            echo "✅ Figma Tokens Studio JSON generated"
          fi

  # ─── Build summary ───────────────────────────────────────────────────
  summary:
    name: Pipeline Summary
    needs: [validate, build, test, sync-figma]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          echo "## 🔁 Design Token CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.validate.result }}" == "success" ]]; then
            echo "✅ **Validate:** Token source files are valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Validate:** Token validation failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "✅ **Build:** All platforms built successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️  **Build:** Some platforms failed to build" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.test.result }}" == "success" ]]; then
            echo "✅ **Test:** All output formats verified" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Test:** Output verification failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.sync-figma.result }}" == "success" ]]; then
            echo "✅ **Figma Sync:** Successfully synced" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.sync-figma.result }}" == "skipped" ]]; then
            echo "➖ **Figma Sync:** Skipped" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Notify on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Scheduled token CI run failed',
              body: `The daily token CI run failed. [View run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              labels: ['tokens', 'ci', 'bug']
            });

  # ─── Optional: Release built tokens ──────────────────────────────────
  release:
    name: Create Release
    needs: [test]
    if: ${{ inputs.release || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: tokens-*
          merge-multiple: true

      - name: Create token archive
        run: |
          cd dist
          zip -r ../design-tokens.zip css/ json/ ts/ scss/ less/ tailwind/

      - name: Generate release tag
        id: tag
        run: |
          echo "tag=tokens-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: 'Design Tokens — ${{ steps.tag.outputs.tag }}'
          body: |
            ## 📦 Design Token Release

            Automated release of design tokens built from `tokens/*.json`.

            ### Included Formats

            - **CSS** — Custom properties (light + dark theme)
            - **JSON** — Nested and flat formats
            - **TypeScript** — `const` objects + type declarations
            - **SCSS** — SCSS variables
            - **Less** — Less variables
            - **Tailwind** — Theme extension object

            ### How to Use

            ```bash
            # Install via npm registry (if published)
            npm install @styde/design-tokens

            # Or download and reference directly
            curl -L <this release url>/design-tokens.zip -o tokens.zip
            unzip tokens.zip -d ./src/styles/tokens
            ```
          files: design-tokens.zip
          draft: false
          prerelease: false

      - name: Publish to npm (optional)
        if: false # Set to true if you have an npm token configured
        run: |
          echo "//registry.npmjs.org/:_authToken=\${NPM_TOKEN}" > .npmrc
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
