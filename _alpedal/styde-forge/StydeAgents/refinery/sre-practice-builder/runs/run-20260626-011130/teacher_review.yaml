diagnosis:
  root_cause: Agent provides comprehensive SRE coverage but lacks depth on specific
    implementation details — monitoring instrumentation, SLI collection methods, and
    load-testing methodology remain generic rather than system-specific.
  severity: medium
  weakest_dimension: completeness
improvements:
- change: Add a 'Depth Requirements' section after each domain block mandating at
    least 3 concrete instrumentation examples (e.g. specific metric name, source,
    collection cadence) and 1 methodology detail per recommendation.
  expected_impact: high
  reason: Pushes the agent past high-level valid observations into implementable specifics,
    directly addressing the gap the judges flagged on SLI instrumentation detail and
    generic roadmap items.
  target: BLUEPRINT.md
- change: 'Insert an explicit persona instruction: ''After every recommendation, append
    exactly one sentence specifying how to implement or measure it in practice.'''
  expected_impact: medium
  reason: Makes the depth constraint a character trait rather than a floating instruction,
    increasing adherence during generation.
  target: persona.md
pattern:
  description: Agent systematically anchored every recommendation to the full SRE
    lifecycle (SLIs→SLOs→error budgets→alerting→runbooks→postmortems), producing an
    internally consistent roadmap where each section built on prior ones rather than
    listing isolated findings.
  name: SRE-full-lifecycle-anchoring
  reusable: 'yes'
retry_recommended: false
stage: refinery
summary: Agent produces thorough, lifecycle-anchored SRE assessments with high accuracy
  and usefulness, but needs guardrails to deepen implementation specifics and eliminate
  generic roadmap items.
