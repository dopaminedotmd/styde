- change: 'Inject a post-completion task block: ''After creating a blueprint, read
    back the file and print: (1) its absolute path, (2) file size, (3) first 10 lines,
    (4) blueprint registry entry.'''
  expected_impact: high
  reason: Attaches a concrete verification ritual that the agent follows automatically,
    raising completeness from inferred to proven.
  target: skills/default_review.md
