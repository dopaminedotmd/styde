tools:
  - name: email_get_unread
    description: Hämtar olästa support-e-postmeddelanden för granskning.
    parameters:
      type: object
      properties:
        limit:
          type: integer
          description: Max antal e-postmeddelanden att hämta.
  - name: knowledge_base_search
    description: Söker i företagets interna kunskapsdatabas efter svar på supportärenden.
    parameters:
      type: object
      properties:
        query:
          type: string
          description: Söksträng för supportfrågan.
  - name: save_email_draft
    description: Sparar ett utkast till svar på ett support-e-postmeddelande.
    parameters:
      type: object
      properties:
        email_id:
          type: string
          description: Det inkommande e-postmeddelandets ID.
        reply_content:
          type: string
          description: Det föreslagna svarsinnehållet.
  - name: route_to_department
    description: Dirigerar och eskalerar ett supportärende till en specifik mänsklig avdelning.
    parameters:
      type: object
      properties:
        email_id:
          type: string
          description: E-post-ID att dirigera.
        department:
          type: string
          description: Avdelningsnamn (t.ex. Finance, Technical, Sales, Complaints).
        reason:
          type: string
          description: Anledning till dirigeringen.
