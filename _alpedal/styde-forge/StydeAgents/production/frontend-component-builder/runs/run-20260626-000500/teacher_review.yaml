diagnosis:
  root_cause: Multiple implementation bugs (stale closures in DragAndDrop, non-standard
    document.removeAllListeners, deprecated execCommand, O(n²) indexOf in BreadcrumbNav)
    and stubbed features (RichTextEditor undoDepth/redoDepth always 0, missing image
    action) left the deliverable functionally incomplete despite strong architectural
    foundations.
  severity: medium
  weakest_dimension: completeness
improvements:
- change: Add a pre-submission checklist step requiring closure audits for event handlers,
    verification that all public API methods return real values (not stubs), and a
    browser-compatibility lint pass for deprecated DOM APIs like execCommand.
  expected_impact: high
  reason: Catches the stale-closure, stub, and deprecated-API pattern before submission;
    addresses the root cause of all three bug categories.
  target: BLUEPRINT.md
- change: Add a 'DragAndDrop cleanup' skill that teaches the agent to use refs + functional
    updates to avoid stale closures, and to use standard removeEventListener paired
    with AbortController instead of non-standard removeAllListeners.
  expected_impact: high
  reason: Directly prevents the two most severe bugs identified in the DragAndDrop
    component.
  target: skills/
- change: Mandate O(n) data structures (Map/Set) for lookup-heavy operations and prohibit
    indexOf inside render-path loops without explicit performance justification.
  expected_impact: medium
  reason: Eliminates O(n²) patterns like the one found in BreadcrumbNav, improving
    efficiency scores in future runs.
  target: BLUEPRINT.md
