    health check, service discovery, and route/service definitions, leaving the blueprint
    non-operational without manual filling.
  severity: medium
  weakest_dimension: completeness
improvements:
- change: Add mandatory 'Operational Checklist' section with explicit subsections
    for circuit breaker config, health check endpoints, service discovery integration,
    and upstream routing definitions — each with concrete Kong CLI or declarative
    config examples.
  expected_impact: high
  reason: The agent scored high on accuracy/clarity but low on completeness because
    no structural guardrails forced it to include operational wiring. A checklist
    section acts as a template prompt the agent must fill, preventing omission.
  target: BLUEPRINT.md
- change: 'Strengthen completeness directive: replace ''be thorough'' with ''produce
    a blueprint that can be deployed from the output alone without manual additions.
    Every referenced component must have a configuration snippet.'''
  expected_impact: medium
  reason: The current persona phrasing is too vague. Explicit 'deployable from output
    alone' constraint raises the agent's bar for what counts as complete.
  target: persona.md
pattern:
  description: Strong structural tiering (rate limiting, auth, monitoring) with clear
    separation of concerns, backed by accurate Kong 3.x specific config and solid
    clarity. The agent's architectural decomposition approach is reusable across infrastructure
    blueprints.
  name: kong-hybrid-deployment-template
  reusable: 'yes'
