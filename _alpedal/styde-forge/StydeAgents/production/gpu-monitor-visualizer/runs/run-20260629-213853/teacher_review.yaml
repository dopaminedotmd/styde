diagnosis:
  root_cause: Spec excels at ideal-state design but omits error/offline/loading states
    and accessibility, reducing real-world deployability.
  severity: low
  weakest_dimension: usefulness
improvements:
- change: Add mandatory section requiring explicit error states (GPU offline, data
    stale, API timeout), loading skeletons, and WCAG 2.1 AA accessibility checklist.
  expected_impact: high
  reason: Both evaluators flagged missing error/loading states as the primary gap;
    codifying them as required output ensures every spec is production-hardened.
  target: BLUEPRINT.md
- change: 'Add a ''minimum viable completeness'' gate: spec must cover at least 3
    states per component (ideal, loading, error/empty) before self-eval can score
    completeness >= 90.'
  expected_impact: medium
  reason: Self-eval completeness scored 90 despite the agent itself noting missing
    states — a structural gate prevents overoptimistic self-scoring.
  target: BLUEPRINT.md
