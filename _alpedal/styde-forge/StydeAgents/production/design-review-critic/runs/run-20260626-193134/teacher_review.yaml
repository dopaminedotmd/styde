diagnosis:
  root_cause: Self-evaluation is verbose — oversized evidence blocks and unexplained
    composite math obscure key findings and inflate token usage.
  severity: medium
  weakest_dimension: efficiency
improvements:
- change: 'Add a ''Formatting Discipline'' directive: limit evidence blocks to 1-2
    lines per claim, move extended context to footnotes, and require a brief ''Why
    This Matters'' header before each dimension.'
  expected_impact: high
  reason: Directly targets the 18-point efficiency gap between self-eval and judge-eval
    by enforcing concision standards that the judge already demonstrates.
  target: BLUEPRINT.md
pattern:
  description: Both evaluators anchor every claim to specific line numbers, making
    verdicts falsifiable and actionable. The judge additionally filters irrelevant
    content (stale thresholds, hardware noise), which kept clarity at 92.
  name: line-referenced evidence
  reusable: 'yes'
retry_recommended: 'false'
summary: Production-ready composite (86.8) held back by self-eval verbosity — blueprint
