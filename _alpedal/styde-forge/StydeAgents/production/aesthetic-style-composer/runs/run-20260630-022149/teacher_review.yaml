diagnosis:
  root_cause: Separate per-template font imports and duplicated CSS rules across five
    templates cause unnecessary HTTP requests and maintenance overhead
  severity: low
  weakest_dimension: efficiency
improvements:
- change: Require a single shared base CSS file with common styles (reset, typography,
    utilities, font imports) loaded once across all templates, with per-template overrides
    kept minimal and scoped
