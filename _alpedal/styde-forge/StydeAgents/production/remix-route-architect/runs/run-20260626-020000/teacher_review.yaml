diagnosis:
  root_cause: Agent produced technically excellent content but was truncated at roughly
    50% delivery due to output length limits, losing sections 5-9 and the conclusion.
  severity: high
  weakest_dimension: completeness
improvements:
- change: Add a 'Compression strategy' section requiring the agent to front-load essential
    content, use hierarchical summaries for later sections, and include a table-of-contents
    checkpoint at 30% output length to decide what to trim or abbreviate.
  expected_impact: high
  reason: The agent had no awareness of output budget and no fallback plan for truncation.
    Teaching it to budget space proactively prevents half-finished deliverables.
  target: BLUEPRINT.md
- change: Increase max_output_tokens (or equivalent) for completion-critical agent
    tasks to at least 4x the estimated document size, or enable streaming/chunked
    output.
  expected_impact: medium
  reason: The truncation was purely a capacity issue — the agent had more to say than
    the channel allowed. Raising the ceiling removes the bottleneck directly.
  target: config.yaml
- change: 'Add a directive: ''Before writing, estimate total output length and flag
    if it exceeds safe limits. Split into multiple responses or produce a condensed
    version that covers every required section.'''
  expected_impact: medium
  reason: Teaches the agent to self-assess output budget during planning rather than
    discovering truncation mid-delivery.
  target: persona.md
pattern:
  description: Agent delivered precise, well-structured technical writing with 95%
    accuracy across all delivered sections. Clear sectioning, correct terminology,
    and high usefulness ratings (85/95) show the content strategy works when the agent
    has enough room to execute it.
  name: structured-technical-exposition
  reusable: 'yes'
stage: refinery
summary: High-quality technical exposition crippled by output truncation — the fix
  is output budget awareness and capacity planning, not content quality improvement.
