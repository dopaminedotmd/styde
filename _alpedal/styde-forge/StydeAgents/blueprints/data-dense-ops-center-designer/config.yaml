eval:
  benchmarks: []
  judge_model: deepseek-v4-pro
  min_pass_score: 70
test_phases:
- description: Validate bar-fill rendering algorithm before mockup generation
  phase: pre_render_validation
  steps:
  - action: generate_ascii_resource_bars
    assertion: count_returned_fills
    fail_condition: any_mismatch_exceeds_1
    fail_message: 'Bar-fill mismatch detected: expected {expected_fills} fills for
      {resource} at {percentage}% in {total_chars}-char bar, got {actual_fills}'
    params:
      test_cases:
      - expected_fills: 16
        percentage: 78
        resource: MEM
        total_chars: 20
      - expected_fills: 18
        percentage: 88
        resource: DSK
        total_chars: 20
      - expected_fills: 14
        percentage: 72
        resource: CPU
        total_chars: 20
      - expected_fills: 9
        percentage: 45
        resource: NET
        total_chars: 20
      - expected_fills: 7
        percentage: 33
        resource: GPU
        total_chars: 20
      - expected_fills: 8
        percentage: 78
        resource: MEM
        total_chars: 10
      - expected_fills: 9
        percentage: 88
        resource: DSK
        total_chars: 10
    step: render_mock_resource_panel
  - action: render_full_mockup_and_extract_bars
    assertion: parse_rendered_bars_from_output
    fail_condition: any_rendered_bar_differs_from_expected_by_more_than_1
    fail_message: Rendered bar in mockup output differs from computed expected value
      by >1 fill unit
    params:
      included_resources:
      - MEM
      - DSK
      - CPU
      - NET
      - GPU
      total_chars: 20
    step: verify_bar_in_output
- description: Validate mockup output meets all structural requirements
  phase: post_render_validation
  steps:
  - action: count_log_entries_in_output
    assertion: log_entry_count_gte_threshold
    fail_condition: log_entry_count < 5
    fail_message: Log pane contains {actual} entries, minimum is 5
    params:
      minimum_entries: 5
    step: check_log_count
  - action: verify_alert_detail_backing
    assertion: every_alert_has_detail_section
    fail_condition: any_alert_badge_missing_detail_section
    fail_message: Alert badge {badge_label} has no corresponding detail section
    params:
      required_fields:
      - timestamp
      - severity
      - description
    step: check_alert_detail_sections
  - action: extract_metric_refs_from_logs
    assertion: each_log_row_refers_to_visible_panel
    fail_condition: any_log_row_without_metric_ref
    fail_message: Log row "{log_row}" does not reference a visible dashboard metric
    params: {}
    step: check_log_metric_references
