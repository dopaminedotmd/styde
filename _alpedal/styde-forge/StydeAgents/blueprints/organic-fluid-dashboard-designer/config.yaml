agent:
  max_iterations: 10
  timeout_seconds: 300
  retry_on_failure: true
  toolsets:
  - terminal
  - file
  - web
eval:
  benchmarks: []
  judge_model: deepseek-v4-pro
  min_pass_score: 70
  post_generation_lint:
    enabled: true
    steps:
    - name: minification-check
      tool: esbuild
      action: verify all JS bundles minify without syntax errors
    - name: eff-lint
      rule: flag inline script blocks >50 lines
    - name: pipeline-hygiene
      rule: verify all shell validation scripts use explicit exit-code capture ($?
        storage or if ! cmd) rather than || true or any exit-code-silencing pipe pattern
