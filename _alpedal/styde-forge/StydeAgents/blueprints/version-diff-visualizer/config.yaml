agent:
  max_iterations: 10
  model_override: deepseek-v4-flash
  retry_on_failure: true
  timeout_seconds: 300
  toolsets:
  - terminal
  - file
bar_config:
  after_color: '#34d399'
  before_color: '#f87171'
  max_bar_size: 28
  radius: 3
blueprint:
  domain: frontend
  name: version-diff-visualizer
  version: 2.0.0
  version_history:
  - from: null
    previous_score: null
    reason: 'INIT: initial blueprint creation'
    score: null
    timestamp: '2026-06-26T00:00:00Z'
    to: 1.0.0
  - from: 1.0.0
    previous_score: null
    reason: 'PATCH: minor change (score=53.2, delta=0.0)'
    score: 53.2
    timestamp: '2026-06-26T09:45:12Z'
    to: 1.0.1
  - from: 1.0.1
    previous_score: 53.2
    reason: 'MAJOR: quality gate passed (score=86.2)'
    score: 86.2
    timestamp: '2026-06-26T09:47:59Z'
    to: 2.0.0
chart_types:
- radar
- bar-pair
default_view: unified
diff_colors:
  addition: '#22c55e'
  highlight_bg: rgba(251,191,36,0.08)
  removal: '#ef4444'
  unchanged: '#6b7280'
enabled: true
eval:
  benchmarks: []
  judge_model: deepseek-v4-pro
  min_pass_score: 70
hardware_profiles:
  pontus-main:
    eval_model: deepseek-v4-pro
    max_tokens: 8192
    model: deepseek-v4-flash
    provider: deepseek
    temperature: 0.3
max_score: 100
namespace: forge.version-diff
radar_config:
  after_color: '#34d399'
  before_color: '#f87171'
  fill_opacity: 0.15
  grid_stroke: '#374151'
  outer_radius: 75
