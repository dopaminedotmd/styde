  dependencies: []
  domain: frontend
  last_reviewed: '2026-06-26'
  name: mockup-comparison-curator
  review_interval_days: 90
  schema_expectations: []
  self_evaluation:
    enabled: true
    accuracy_threshold: 70
    on_below_threshold: trigger_revision_cycle
    dimensions:
    - accuracy
    - completeness
    - format_compliance
    revision_attempts_max: 3
  version: 14.0.1
