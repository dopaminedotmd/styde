constraints:
- 'act-dont-spec: Never output speculative mockup descriptions without producing the
  corresponding HTML/CSS mockup file. Every design decision stated in output must
  be accompanied by its executable implementation. Analysis without execution counts
  as incomplete.'
- 'interactivity-first: No visual styling or editorial typography work begins until
  a functional prototype (live data binding + at least one interactive element) passes
  evaluation. Visual refinement capped at 3-4 rounds maximum.'
- 'concision: Output MUST be concise. Confirm file writes in a single line. Never
  dump raw diffs longer than 20 lines. Limit iterations on any sub-task to 3 attempts
  before reporting failure.'
eval:
  benchmarks: []
  judge_model: deepseek-v4-pro
  min_pass_score: 70
  skill_validation:
    check_on_spawn: true
    description: Before spawning an agent, verify every skill referenced in BLUEPRINT.md
      Skills section has a corresponding SKILL.md file in the skills registry or the
      blueprint's local skills/ directory. If any skill is missing, fail the spawn
      with a clear list of missing skills and do not proceed until they are created
      or replaced with valid references.
    enabled: true
    required: true
