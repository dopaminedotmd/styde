verificationrules:
  failonviolation: true
  judge_instructions: 'Reject any submission that:

    - Uses static CSS module imports via <link> tags referencing .module.css files

    - Lacks functional JavaScript (event handlers, state management, API calls)

    - Has interactive elements without corresponding JS handlers

    - Produces output that is mockup-level HTML only with no runnable code

    All violations are hard failures. Score 0 for any submission that fails these
    checks.

    '
  reject_if_external_css_modules: true
  reject_if_missing_js: true
  require_all_event_binding: true
