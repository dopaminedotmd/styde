agent:
  max_iterations: 10
  model_override: deepseek-v4-flash
  retry_on_failure: true
  timeout_seconds: 300
alerts:
  error_rate:
    critical_percent: 15.0
    warn_percent: 5.0
  latency:
    p95_critical_ms: 2000
    p95_warn_ms: 500
    p99_warn_ms: 2000
  spawn_rate:
    idle_threshold: 0.01
    spike_threshold: 10.0
  throughput:
    critical: 5000
    max_warn: 1000
    min_warn: 0.1
blueprint:
  domain: data-science
  name: realtime-analytics
insight_cache:
  max_stored: 100
  ttl_seconds: 300
logging:
  backup_count: 3
  file: logs/realtime-analytics.log
  level: INFO
  max_size_mb: 10
metrics:
  buckets:
    latency_window: 300
    spawn_window: 120
    throughput_window: 60
  percentiles:
  - 50
  - 95
  - 99
output:
  batch_interval_ms: 500
  batch_size: 10
  format: json
  stream_endpoint: /ws/metrics
polling:
  interval_seconds: 2
  state_path: state.yaml
  timeout_seconds: 5
trend:
  long_window: 180
  medium_window: 30
  min_confidence: 0.6
  short_window: 5
  zscore_threshold: 2.5
