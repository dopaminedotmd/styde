agent:
  max_iterations: 15
  model_override: deepseek-v4-flash
  retry_on_failure: true
  timeout_seconds: 300
  toolsets:
  - terminal
  - file
  - process
blueprint:
  dependencies:
  - caddy (optional, for reverse proxy)
  - nginx (optional, for reverse proxy)
  domain: devops
  last_reviewed: '2026-06-26'
  name: deploy-pilot
  review_interval_days: 90
  schema_expectations:
  - config must include environments.dev, environments.staging, environments.prod
  - each environment must specify host, port, and health_check_path
  version: 1.0.0
  version_history:
  - from: null
    previous_score: null
    reason: 'INIT: initial blueprint creation for dashboard deployment pilot'
    score: null
    timestamp: '2026-06-26T00:00:00Z'
    to: 1.0.0
eval:
  benchmarks:
  - description: Start server, verify health, stop server, confirm process terminated
    min_pass_score: 80
    name: start-stop-cycle
  - description: Kill server process, verify auto-restart within 5 seconds
    min_pass_score: 80
    name: crash-recovery
  - description: Occupy target port, start server, verify conflict reported and alternative
      offered
    min_pass_score: 70
    name: port-conflict-detection
  - description: Switch between dev/staging/prod, verify correct config applied each
      time
    min_pass_score: 80
    name: environment-switch
  judge_model: deepseek-v4-pro
  min_pass_score: 70
hardware_profiles:
  pontus-main:
    eval_model: deepseek-v4-pro
    max_tokens: 8192
    model: deepseek-v4-flash
    provider: deepseek
    temperature: 0.3
