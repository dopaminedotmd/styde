agent:
  max_iterations: 15
  retry_on_failure: true
  timeout_seconds: 300
  toolsets:
  - terminal
  - file
  - process
blueprint:
  dependencies:
  - caddy (optional, for reverse proxy)
  - nginx (optional, for reverse proxy)
  domain: devops
  last_reviewed: '2026-06-26'
  name: deploy-pilot
  review_interval_days: 90
  schema_expectations:
  - config must include environments.dev, environments.staging, environments.prod
  - each environment must specify host, port, and health_check_path
  version: 1.0.0
  version_history:
  - from: null
    to: 1.0.0
    reason: 'INIT: initial blueprint creation for dashboard deployment pilot'
    score: null
    previous_score: null
    timestamp: '2026-06-26T00:00:00Z'
eval:
  benchmarks:
  - name: start-stop-cycle
    description: Start server, verify health, stop server, confirm process terminated
    min_pass_score: 80
  - name: crash-recovery
    description: Kill server process, verify auto-restart within 5 seconds
    min_pass_score: 80
  - name: port-conflict-detection
    description: Occupy target port, start server, verify conflict reported and alternative offered
    min_pass_score: 70
  - name: environment-switch
    description: Switch between dev/staging/prod, verify correct config applied each time
    min_pass_score: 80
  judge_model: deepseek-v4-pro
  min_pass_score: 70
hardware_profiles:
  pontus-main:
    eval_model: deepseek-v4-pro
    max_tokens: 8192
    model: deepseek-v4-flash
    provider: deepseek
    temperature: 0.3
