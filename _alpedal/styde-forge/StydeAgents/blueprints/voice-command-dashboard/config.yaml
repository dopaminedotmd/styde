agent:
  max_iterations: 10
  retry_on_failure: true
  timeout_seconds: 300
  toolsets:
  - terminal
  - file
  - web
blueprint:
  dependencies: []
  domain: dashboard
  last_reviewed: '2026-06-26'
  name: voice-command-dashboard
  review_interval_days: 90
  schema_expectations: []
  quality_criteria:
    efficiency:
      dom_update_rule: prefer_incremental_over_innerhtml
      severity: warning
  version: 3.0.0
  version_history:
  - from: 1.0.0
    to: 2.0.0
    reason: 'MAJOR: quality gate passed (score=88.0)'
    score: 88.0
    previous_score: null
    timestamp: '2026-06-26T08:27:01Z'
  - from: 2.0.0
    to: 2.0.1
    reason: 'PATCH: minor change (score=82.8, delta=-5.2)'
    score: 82.8
    previous_score: 88.0
    timestamp: '2026-06-26T08:29:18Z'
  - from: 2.0.1
    to: 3.0.0
    reason: 'MAJOR: quality gate passed (score=91.0)'
    score: 91.0
    previous_score: 82.8
    timestamp: '2026-06-26T08:30:38Z'
eval:
  benchmarks: []
  judge_model: deepseek-v4-pro
  min_pass_score: 70
hardware_profiles:
  pontus-main:
    eval_model: deepseek-v4-pro
    max_tokens: 8192
    model: deepseek-v4-flash
    provider: deepseek
    temperature: 0.3
