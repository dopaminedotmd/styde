eval:
  post_process:
    ellipsis_marker: ..
    max_line_width: 100
    strip_ansi: true
    terminal_output: sed 's/\x1b\[[0-9;]*m//g' | sed 's/\x1b\]8;;[^\x1b]*\x1b\\//g'
      | sed 's/.\{100\}/&\n/g'
    truncate_long_lines: true
