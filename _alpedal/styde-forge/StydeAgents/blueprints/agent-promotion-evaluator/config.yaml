eval:
  functional_verification:
    accuracy_penalty_unverified: 30
    require_element_tags: true
    status_legend: W=working S=simulated M=mock/non-functional
    statuses:
    - working
    - simulated
    - non-functional
  output_validation:
    enforce_template: true
    reject_missing_field: true
    require_feature_status_table: true
    required_fields:
    - artifactname
    - artifactpath
    - verdict
    - evidence
  precheck:
    reject_meta_commentary: true
    reject_no_target: true
    require_functional_verification: true
    validate_artifact_path: true
    verify_first_sentence_pattern: ^(Evaluating|Reviewing|Analyzing|Checking|Auditing)\s+\S+
  requiretarget: true
