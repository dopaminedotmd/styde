agent:
  max_iterations: 10
  model_override: deepseek-v4-flash
  retry_on_failure: true
  timeout_seconds: 300
baseline:
  auto_capture: true
  store: localStorage
blueprint:
  domain: monitoring
  name: perf-tracker
environments:
  development:
    thresholds:
      first_paint:
        critical: 5000
        warning: 3000
  production:
    thresholds: {}
recommendations:
  bundle_optimization:
    enabled: true
    size_threshold_mb: 1.0
  caching:
    enabled: true
    min_repeat_calls: 5
regression:
  check_interval_sec: 60
  cooldown_sec: 300
  notify_on_critical: true
thresholds:
  api_response_time:
    critical: 2000
    warning: 500
  dom_load:
    critical: 5000
    warning: 2500
  first_paint:
    critical: 3000
    warning: 1500
  gpu_utilization_bump:
    critical: 50
    warning: 20
