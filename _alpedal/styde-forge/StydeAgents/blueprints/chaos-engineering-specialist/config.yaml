eval:
  benchmarks: []
  judge_model: deepseek-v4-pro
  min_pass_score: 70
hardware_profiles:
  pontus-main:
    eval_model: deepseek-v4-pro
    max_tokens: 8192
    model: deepseek-v4-flash
    provider: deepseek
    temperature: 0.3
loop_control:
  early_exit:
    conditions:
    - guardrail_status: all_pass
    - score_threshold: 85
    - no_pending_changes: true
    enabled: true
  max_iterations: 5
  warning_window: 2
validation:
  artifact_check:
    enabled: true
    min_artifact_size_bytes: 10
    required_extensions:
    - .md
    - .yaml
    - .json
  on_empty:
    action: retry
    max_retries: 2
    prompt: DELIVERABLE MISSING - produce output
