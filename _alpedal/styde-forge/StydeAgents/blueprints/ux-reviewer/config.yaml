agent:
  max_iterations: 10
  model_override: deepseek-v4-flash
  retry_on_failure: true
  timeout_seconds: 300
  toolsets:
  - terminal
  - file
  - web
blueprint:
  dependencies: []
  description: Reviews HTML/CSS/JS for UX issues, accessibility, and performance
  domain: design
  last_reviewed: '2026-06-26'
  name: ux-reviewer
  review_interval_days: 90
  schema_expectations: []
  version: 1.0.0
  version_history:
  - from: null
    previous_score: null
    reason: 'INITIAL: created from code-reviewer blueprint template'
    score: null
    timestamp: '2026-06-26T12:00:00Z'
    to: 1.0.0
eval:
  benchmarks:
  - ux-review-basic
  judge_model: deepseek-v4-pro
  min_pass_score: 70
hardware_profiles:
  pontus-main:
    eval_model: deepseek-v4-pro
    max_tokens: 8192
    model: deepseek-v4-flash
    provider: deepseek
    temperature: 0.3
