agent:
  load_all_skills: false
  max_iterations: 10
  model_override: deepseek-v4-flash
  retry_on_failure: true
  skills:
  - skill-analyzer
  - pipeline-designer
  - error-boundary-designer
  - state-contract-designer
  - pipeline-composer
  - pipeline-validator
  - pipeline-tester
  timeout_seconds: 600
  toolsets:
  - terminal
  - file
  - web
blueprint:
  dependencies: []
  domain: skills-opt
  last_reviewed: '2026-06-26'
  name: skill-pipeline-architect
  version: 3.0.0
  version_history:
  - from: 1.0.0
    previous_score: null
    reason: 'MAJOR: skill pipeline engine with parallel execution, error boundaries,
      state contracts'
    score: null
    timestamp: '2026-06-26T00:00:00Z'
    to: 2.0.0
  - from: 2.0.0
    previous_score: null
    reason: 'MAJOR: quality gate passed (score=87.2)'
    score: 87.2
    timestamp: '2026-06-26T01:56:05Z'
    to: 3.0.0
eval:
  benchmarks: []
  judge_model: deepseek-v4-pro
  min_pass_score: 70
hardware_profiles:
  pontus-main:
    eval_model: deepseek-v4-pro
    max_tokens: 8192
    model: deepseek-v4-flash
    provider: deepseek
    temperature: 0.3
pipeline:
  blueprint: skill-pipeline-architect
  description: Multi-skill pipeline for designing, composing, and testing skill pipelines
  error: halt
  name: skill-pipeline-architect
  steps:
  - error: halt
    id: analyze-skills
    skill: skill-analyzer
  - error: halt
    id: design-pipeline
    skill: pipeline-designer
  - parallel:
    - depends_on:
      - design-pipeline
      error: skip
      id: design-error-boundaries
      skill: error-boundary-designer
    - depends_on:
      - design-pipeline
      error: retry
      id: design-state-contracts
      max_retries: 2
      skill: state-contract-designer
  - depends_on:
    - design-error-boundaries
    - design-state-contracts
    error: halt
    id: compose-pipeline
    skill: pipeline-composer
  - depends_on:
    - compose-pipeline
    error: halt
    id: validate-pipeline
    skill: pipeline-validator
  - depends_on:
    - validate-pipeline
    error: retry
    fallback_step: validate-pipeline
    id: integration-test
    max_retries: 1
    skill: pipeline-tester
  timeout: 600
  version: '2.0'
