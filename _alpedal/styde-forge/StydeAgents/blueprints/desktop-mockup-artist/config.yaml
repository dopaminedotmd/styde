agent:
  max_iterations: 10
  retry_on_failure: true
  timeout_seconds: 300
  toolsets:
  - terminal
  - file
blueprint:
  dependencies: []
  domain: frontend
  last_reviewed: '2026-06-26'
  name: desktop-mockup-artist
  review_interval_days: 90
  schema_expectations: []
  validation:
    pre_submit_lint: true
    lint_rules:
    - no_var_declarations
    - no_function_keyword_in_js
    - no_string_concat_with_plus
    - css_custom_properties_for_repeated_values
    - unambiguous_labels_and_units
    pre_submit_commands:
    - grep -n 'function ' generated/*.html || true
    - grep -nE '"[a-zA-Z]+\s*\+\s*[a-zA-Z]' generated/*.html || true
    - grep -nw 'var' generated/*.html || true
    postverify:
      enabled: true
      format: compact_table
      header: FILENAME | STATUS | REASON
      separator: '|'
      rules:
      - check: diff_output
        action: exit_code_only
        strip_ansi: true
        max_lines: 0
      - check: summary_rollup
        action: count_pass_fail
        output: single_line
  version: 13.0.1
