csv:
  delimiter: ','
  include_header: true
  line_ending: "\r\n"
  quote_char: '"'
formats:
  defaults:
    filename_prefix: export_
    format: json
    include_timestamp: true
    max_rows: 10000
  enabled:
  - csv
  - json
  - html
  - markdown
html:
  embed_mode: true
  include_kpis: true
  template: default_report.html
  theme: light
json:
  date_format: iso8601
  indent: 2
  sort_keys: false
kpi_summary:
  enabled: true
  metrics:
  - total_count
  - average_value
  - min_value
  - max_value
  - trend_direction
markdown:
  include_toc: false
  kpi_section: true
  max_columns: 8
service:
  name: data-exporter
  version: 0.1.0
storage:
  cleanup_on_export: false
  max_file_age_days: 7
  output_dir: exports/
