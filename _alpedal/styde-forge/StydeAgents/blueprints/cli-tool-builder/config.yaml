eval:
  benchmarks: []
  judge_model: deepseek-v4-pro
  min_pass_score: 70
hardware_profiles:
  pontus-main:
    eval_model: deepseek-v4-pro
    max_tokens: 8192
    model: deepseek-v4-flash
    provider: deepseek
    temperature: 0.3
validation:
  context_preflight:
    description: Agent must list unverifiable rubric items before scoring
    enforced_by: rubric_validator.py::check_context_preflight
  detection_heuristics:
    description: Each fix level includes explicit detection heuristics
    enforced_by: template_validator.py::check_detection_heuristics
  enforce_grounding_in_output:
    description: Every output diff must reference a file path verified by stat/search
    enforced_by: template_validator.py::check_diff_grounding
  grounding:
    description: All file references verified via read_file/search_files before use
    enforced_by: template_validator.py::check_path_grounding
  self_eval_override:
    description: Meta-task YAML-only outputs clamp completeness/usefulness to min
      80
    enforced_by: rubric_validator.py::check_meta_task_override
