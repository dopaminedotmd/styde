agent:
  max_iterations: 15
  maxsubagentrecursion: 2
  model_override: deepseek-v4-flash
  post_apply_validation:
    enabled: true
    hooks:
    - command: "import sys, re\ntext = sys.stdin.read()\nansi = re.findall(r'\\x1b\\\
        [[0-9;]*[a-zA-Z]', text)\nif ansi:\n  print(f'REJECTED: {len(ansi)} ANSI escape\
        \ sequences found')\n  sys.exit(1)\nprint('PASS: no ANSI escape sequences')\n"
      failure_action: reject_response
      name: ansi_escape_detector
      trigger: before_final_output
  retry_on_failure: true
  self_review:
    language_consistency: true
    preamble_stripping: true
    section_depth_limit: 3
    troubleshooting_required: true
  timeout_seconds: 600
  tool_constraints:
    patch: every fix target must have a corresponding patch() call before report submission
    terminal: readfile required for all content claims -- no synthetic line numbers.
      Every line number, code snippet, or module count must be preceded by a readfile()
      call.
  toolsets:
  - terminal
  - file
blueprint:
  dependencies: []
  domain: devops
  last_reviewed: '2026-06-26'
  name: documentation-generator
  review_interval_days: 30
  schema_expectations:
  - file_io_check_before_claims
  - fix_before_report_completion_gate
  - max_section_depth_3
  - troubleshooting_required
  - language_consistency_review
  - preamble_stripping_required
  version: 11.0.0
  version_history:
  - from: 4.0.0
