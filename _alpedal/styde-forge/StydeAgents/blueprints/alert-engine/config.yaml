global:
  default_cooldown_minutes: 10
  evaluation_interval_seconds: 60
  max_alerts_per_agent_per_hour: 10
  recovery_notifications: true
rules:
- condition:
    operator: '>'
    value: 85
  cooldown_minutes: 5
  description: Fires when any GPU temperature exceeds the threshold
  enabled: true
  id: gpu-temp
  message_template: 'GPU temperature is {value}°C (threshold: 85°C) on {agent_name}'
  metric: gpu.temperature_celsius
  name: GPU Temperature Alert
  severity: critical
- condition:
    operator: '>'
    value: 90
  cooldown_minutes: 10
  description: Fires when system RAM utilization exceeds the threshold
  enabled: true
  id: ram-usage
  message_template: 'RAM usage at {value}% (threshold: 90%) on {agent_name}'
  metric: system.ram_percent
  name: High RAM Usage Alert
  severity: warning
- condition:
    operator: '>'
    value: 10
  cooldown_minutes: 15
  description: Fires when agent failure rate exceeds the threshold over the evaluation
    window
  enabled: true
  id: agent-failure
  message_template: 'Agent failure rate at {value}% (threshold: 10%) for {agent_name}'
  metric: agent.failure_rate_percent
  name: Agent Failure Rate Alert
  severity: critical
- condition:
    operator: <
    value: -15
  cooldown_minutes: 30
  description: Fires when agent performance score drops by more than the threshold
    in a window
  enabled: true
  id: score-drop
  message_template: 'Score dropped by {delta} points on {agent_name} (threshold: 15
    points)'
  metric: agent.score_delta
  name: Agent Score Drop Alert
  severity: warning
