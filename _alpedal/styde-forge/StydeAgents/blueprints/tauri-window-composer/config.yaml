platform:
  targets:
  - x86_64-pc-windows-msvc
  - aarch64-pc-windows-msvc
  min_windows_version: 10.0.19041
  build_flags:
    release:
    - --features tray
    - --features devtools
    debug:
    - --features devtools
  dpi:
    policies:
    - scaling: 100%
      logical_factor: 1.0
      physical: native
    - scaling: 125%
      logical_factor: 1.25
      physical: ceil(native * 1.25)
    - scaling: 150%
      logical_factor: 1.5
      physical: ceil(native * 1.5)
    - scaling: 200%
      logical_factor: 2.0
      physical: ceil(native * 2.0)
    fallback_profile:
      enabled: true
      default_scale: 1.0
      detect_os: true
      reapply_on_monitor_change: true
    monitor_change_behavior: reapply_scale
    font_rendering: ClearType
  snap_layout:
    enabled: true
    zone_allocation: grid_3x3
    restore_on_wake: true
    multi_monitor_preservation: true
    zone_types:
    - left_half
    - right_half
    - top_left_quadrant
    - top_right_quadrant
    - bottom_left_quadrant
    - bottom_right_quadrant
    - full
  keyboard_shortcuts:
    window_management:
    - combo: Win+Arrow
      action: snap_window
      description: Snap window to quadrant or half of screen
    - combo: Win+Up
      action: maximize
      description: Maximize active window
    - combo: Win+Down
      action: restore_minimize
      description: Restore or minimize active window
    - combo: Win+Left
      action: snap_left
      description: Snap to left half
    - combo: Win+Right
      action: snap_right
      description: Snap to right half
    - combo: Alt+Space
      action: window_menu
      description: Open system window menu (move, size, minimize, maximize, close)
    - combo: Win+Z
      action: snap_layout_picker
      description: Open snap layout zone picker overlay
    - combo: Alt+F4
      action: close_window
      description: Close active window
    global_hotkeys:
    - combo: Ctrl+Alt+N
      action: new_window
      description: Create a new Forge window from anywhere
    - combo: Ctrl+Alt+T
      action: toggle_tray
      description: Show or hide the Forge window from system tray
  accessibility:
    defaults:
      high_contrast_support: true
      screen_reader_compatible: true
      aria_labels_required: true
      keyboard_navigable: true
      focus_indicators: visible_ring
      reduced_motion: os_preference
      font_scaling: follow_os
      min_touch_target: 48px
      color_contrast_ratio: 4.5:1
output:
  directory: $WORKSPACE/output/tauri-window-composer/{task_name}/{timestamp}
  artifacts:
  - source: src-tauri/src/main.rs
  - source: src-tauri/Cargo.toml
  - source: src-tauri/tauri.conf.json
  - source: src-tauri/capabilities/default.json
  - report: output/{task_name}/build_log.txt
  - report: output/{task_name}/test_report.md
lifecycle:
  evaluate:
    enabled: true
    gates:
    - compile_check: cargo check
    - lint: cargo clippy -- -D warnings
    - test: cargo test --lib
    - dpi_check: verify renders at 100%, 125%, 150%, 200%
    - snap_check: verify snap zone allocation on multi-monitor
  improve:
    enabled: true
    max_cycles: 3
    trigger: eval_score < 80
  production:
    enabled: true
    gates:
    - release_build: cargo tauri build
    - smoke_test: run binary, verify window chrome, tray icon, snap behavior
