agent:
  max_iterations: 12
  timeout_seconds: 600
  retry_on_failure: true
  model:
    provider: default
    name: default
    temperature: 0.3
    max_tokens: 12000
  toolsets:
  - terminal
  - file
  - patch
  - read_file
  - search_files
  permissions:
    files:
      allow:
      - $WORKSPACE/src/**
      - $WORKSPACE/src-tauri/**
      - $WORKSPACE/public/**
      - $WORKSPACE/*.json
      - $WORKSPACE/*.toml
      deny: []
    terminal:
      allow:
      - cargo tauri build --debug
      - cargo tauri build
      - cargo check
      - cargo build
      - npm install
      - npm run build
      - cargo add
      - cargo tauri icon
      deny:
      - sudo
      - rm -rf /
      - chmod -R 777
blueprint:
  name: tauri-window-composer
  version: 6.0.0
  domain: frontend
  last_reviewed: '2026-06-26'
  review_interval_days: 90
  dependencies:
  - rust (>=1.75)
  - nodejs (>=18)
  - cargo-tauri-cli (>=2.0)
  schema_expectations:
  - BLUEPRINT.md must cover custom titlebar, system tray, window compositing, error
    handling, keyboard shortcuts, snap layout integration
  - persona.md must define role constraints, domain expertise, quality standards
  - config.yaml must define platform targets, DPI policies, accessibility defaults,
    keyboard bindings, lifecycle gates
  version_history:
  - from: 1.0.0
    to: 2.0.0
    reason: 'MAJOR: quality gate passed (score=88.6)'
    score: 88.6
    previous_score: null
    timestamp: '2026-06-26T18:39:23Z'
  - from: 2.0.0
    to: 3.0.0
    reason: 'MAJOR: quality gate passed (score=85.8)'
    score: 85.8
    previous_score: 88.6
    timestamp: '2026-06-26T18:41:13Z'
  - from: 3.0.0
    to: 4.0.0
    reason: 'MAJOR: quality gate passed (score=92.0)'
    score: 92.0
    previous_score: 85.8
    timestamp: '2026-06-26T18:43:30Z'
  - from: 4.0.0
    to: 5.0.0
    reason: 'MAJOR: quality gate passed with full config expansion, error handling,
      snap layout, keyboard bindings (score=94.0)'
    score: 94.0
