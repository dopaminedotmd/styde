eval:
  completeness_check:
    enabled: true
    required_elements:
    - verification_step
    - methodology_section
    - contrast_calculation
    - full_code_block_for_changes
  weights:
    accuracy: 0.2
    clarity: 0.2
    completeness: 0.25
    efficiency: 0.15
    usefulness: 0.2
fallback_model:
  model: deepseek-v4-flash
  provider: deepseek
output:
  directory: ./output/audits
  format: yaml
  include_timestamps: true
retry:
  backoff: 2.0
  max_retries: 3
  retryable_errors:
  - timeout
  - connection_error
  - rate_limit
