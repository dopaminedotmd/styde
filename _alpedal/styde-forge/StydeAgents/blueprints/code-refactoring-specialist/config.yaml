agent:
  max_iterations: 10
  retry_on_failure: true
  timeout_seconds: 300
  toolsets:
  - terminal
  - file
  color: never
  postprocessing:
    strip_ansi: true
    clean_version_history: true
    exclude_temp_patterns:
    - tmp/
    - verify
    - /temp/
    output_format_validator:
      mode: strict
      single_yaml_document_per_file: true
      no_prose_interleaving: true
      reject_mixed_format: true
  pipeline:
  - step: analyze
  - step: validate
    validate: true
    validation_config:
      type: lightweight
      checks:
      - syntax_test
      - import_check
      - smoke_test
      report_before_after: true
