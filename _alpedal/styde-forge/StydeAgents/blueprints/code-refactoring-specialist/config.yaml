agent:
  color: never
  max_iterations: 10
  model_override: deepseek-v4-flash
  pipeline:
  - step: analyze
  - step: validate
    validate: true
    validation_config:
      checks:
      - syntax_test
      - import_check
      - smoke_test
      report_before_after: true
      type: lightweight
  postprocessing:
    clean_version_history: true
    exclude_temp_patterns:
    - tmp/
    - verify
    - /temp/
    output_format_validator:
      mode: strict
      no_prose_interleaving: true
      reject_mixed_format: true
      single_yaml_document_per_file: true
    strip_ansi: true
  retry_on_failure: true
  timeout_seconds: 300
  toolsets:
  - terminal
  - file
blueprint:
  dependencies: []
  domain: infrastructure
  last_reviewed: '2026-06-26'
  name: code-refactoring-specialist
  priority: persona.md > BLUEPRINT.md for behavioral/identity/format-fidelity questions;
    BLUEPRINT.md > persona.md for implementation/how-to questions. When conflict arises,
    persona.md wins on output format and tone, BLUEPRINT.md wins on technical methodology.
  review_interval_days: 90
  schema_expectations: []
