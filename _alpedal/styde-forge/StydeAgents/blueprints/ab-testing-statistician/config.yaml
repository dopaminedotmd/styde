eval:
  benchmarks: []
  judge_model: deepseek-v4-pro
  min_pass_score: 70
hardware_profiles:
  pontus-main:
    eval_model: deepseek-v4-pro
    max_tokens: 8192
    model: deepseek-v4-flash
    provider: deepseek
    temperature: 0.3
missing_input:
  best_effort_completion: true
  max_retry_on_missing_input: 2
pre_deployment:
  validation_hooks:
  - check: perform numeric cross-check on all derived values — plug results back into
      canonical formula, verify identity within 1% relative error
    fail_action: reject
    name: formula_sanity
  - check: verify that exactly one statistical method was selected and defended, and
      that O'Brien-Fleming and Pocock are not conflated
    fail_action: reject
    name: method_disambiguation
  - check: scan output for 'TODO', 'future work', 'this section is incomplete', or
      similar placeholders — reject if any found
    fail_action: reject
    name: no_todo_in_output
