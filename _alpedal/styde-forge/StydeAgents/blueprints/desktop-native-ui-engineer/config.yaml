agent:
  max_iterations: 20
  model:
    max_tokens: 8000
    name: default
    provider: default
    temperature: 0.3
  model_override: deepseek-v4-flash
  permissions:
    files:
      allow:
      - $WORKSPACE/src/**
      - $WORKSPACE/src-tauri/**
      - $WORKSPACE/public/**
      - $WORKSPACE/*.json
      - $WORKSPACE/*.toml
      deny: []
    terminal:
      allow:
      - cargo tauri build --debug
      - cargo tauri build
      - cargo check
      - cargo build
      - npm install
      - npm run build
      - cargo add
      - cargo tauri icon
      deny:
      - sudo
      - rm -rf /
      - chmod -R 777
  retry_on_failure: true
  timeout_seconds: 600
  toolsets:
  - terminal
  - file
  - patch
  - read_file
  - search_files
