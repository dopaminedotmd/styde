blueprint:
  name: chart-generator
  domain: visualization
  version: 1.0.1
  version_history:
  - from: 0.0.0
    to: 0.0.1
    reason: 'PATCH: minor change (score=74.4, delta=0.0)'
    score: 74.4
    previous_score: null
    timestamp: '2026-06-26T07:55:46Z'
  - from: 0.0.1
    to: 0.1.0
    reason: 'MINOR: score improved by 5.6 points (prev=74.4, new=80.0)'
    score: 80.0
    previous_score: 74.4
    timestamp: '2026-06-26T07:57:05Z'
  - from: 0.1.0
    to: 0.1.1
    reason: 'PATCH: minor change (score=71.0, delta=-9.0)'
    score: 71.0
    previous_score: 80.0
    timestamp: '2026-06-26T08:25:51Z'
  - from: 0.1.1
    to: 1.0.0
    reason: 'MAJOR: quality gate passed (score=86.2)'
    score: 86.2
    previous_score: 71.0
    timestamp: '2026-06-26T08:26:55Z'
  - from: 1.0.0
    to: 1.0.1
    reason: 'PATCH: minor change (score=53.0, delta=-33.2)'
    score: 53.0
    previous_score: 86.2
    timestamp: '2026-06-26T08:28:21Z'
enabled: true
namespace: forge.charts
default_width: 400
default_height: 200
renderers:
  svg:
    enabled: true
    template_dir: templates/svg/
  chartjs:
    enabled: true
    version: 4.x
charts:
  score-history:
    type: line
    title: Score History
    options:
      x_label: Time
      y_label: Score
      y_min: 0
      y_max: 100
      smooth: true
      show_legend: true
      colors:
      - '#4f8cf7'
      - '#f7654f'
      - '#4fcf8c'
      - '#f7d34f'
  agent-distribution:
    type: pie
    title: Agent Distribution
    options:
      donut: true
      inner_radius: 40
      show_percent: true
      colors:
      - '#4f8cf7'
      - '#f7654f'
      - '#4fcf8c'
      - '#f7d34f'
      - '#b07cf7'
  timeline:
    type: bar
    title: Timeline
    options:
      orientation: horizontal
      x_label: Duration (s)
      stacked: false
      colors:
      - '#4f8cf7'
  gpu-sparkline:
    type: sparkline
    title: GPU Utilization
    options:
      width: 120
      height: 30
      stroke_width: 1.5
      stroke_color: '#4fcf8c'
      fill_color: rgba(79, 207, 140, 0.15)
      show_tooltip: true
      samples: 60
themes:
  light:
    background: '#ffffff'
    text_color: '#1a1a1a'
    grid_color: '#e5e5e5'
    font_family: Inter, system-ui, sans-serif
  dark:
    background: '#1a1a2e'
    text_color: '#e0e0e0'
    grid_color: '#2a2a3e'
    font_family: Inter, system-ui, sans-serif
output_preference: svg
cache_ttl: 30
