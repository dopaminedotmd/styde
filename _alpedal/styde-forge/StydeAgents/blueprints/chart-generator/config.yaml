cache_ttl: 30
charts:
  agent-distribution:
    options:
      colors:
      - '#4f8cf7'
      - '#f7654f'
      - '#4fcf8c'
      - '#f7d34f'
      - '#b07cf7'
      donut: true
      inner_radius: 40
      show_percent: true
    title: Agent Distribution
    type: pie
  gpu-sparkline:
    options:
      fill_color: rgba(79, 207, 140, 0.15)
      height: 30
      samples: 60
      show_tooltip: true
      stroke_color: '#4fcf8c'
      stroke_width: 1.5
      width: 120
    title: GPU Utilization
    type: sparkline
  score-history:
    options:
      colors:
      - '#4f8cf7'
      - '#f7654f'
      - '#4fcf8c'
      - '#f7d34f'
      show_legend: true
      smooth: true
      x_label: Time
      y_label: Score
      y_max: 100
      y_min: 0
    title: Score History
    type: line
  timeline:
    options:
      colors:
      - '#4f8cf7'
      orientation: horizontal
      stacked: false
      x_label: Duration (s)
    title: Timeline
    type: bar
default_height: 200
default_width: 400
enabled: true
namespace: forge.charts
output_preference: svg
renderers:
  chartjs:
    enabled: true
    version: 4.x
  svg:
    enabled: true
    template_dir: templates/svg/
themes:
  dark:
    background: '#1a1a2e'
    font_family: Inter, system-ui, sans-serif
    grid_color: '#2a2a3e'
    text_color: '#e0e0e0'
  light:
    background: '#ffffff'
    font_family: Inter, system-ui, sans-serif
    grid_color: '#e5e5e5'
    text_color: '#1a1a1a'
