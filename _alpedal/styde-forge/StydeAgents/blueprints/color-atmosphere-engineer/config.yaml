eval:
  benchmarks:
  - description: Compare produced CSS tokens against blueprint declared token list.
      Fail if any required token missing or any non-spec token present.
    enabled: true
    name: spec-audit
    required_tokens:
    - --color-primary
    - --color-surface
    - --color-text
    - --color-border
    - --color-accent
    - --color-success
    - --color-warning
    - --color-error
    type: token-coverage
  - description: Secondary check that at least one computed numeric claim references
      a tool execution log (not formula alone).
    enabled: true
    name: verify-numeric
    require_tool_log_reference: true
    type: numeric-verification
  judge_model: deepseek-v4-pro
  min_pass_score: 70
hardware_profiles:
  pontus-main:
    eval_model: deepseek-v4-pro
    max_tokens: 8192
    model: deepseek-v4-flash
    provider: deepseek
    temperature: 0.3
