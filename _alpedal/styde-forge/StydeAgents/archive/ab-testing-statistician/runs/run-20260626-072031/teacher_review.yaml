diagnosis:
  root_cause: Agent prioritizes explaining what it cannot do over producing actual
    task output, stopping after identifying missing data rather than assuming reasonable
    defaults and delivering a usable result.
  severity: critical
  weakest_dimension: completeness
improvements:
- change: 'Replace the ''refuse to hallucinate'' blanket directive with: ''When input
    data is incomplete, make reasonable assumptions, produce the fullest output possible,
    and append a single assumptions section listing what was assumed. Never deliver
    zero output.'''
  expected_impact: high
  reason: The current ethical guardrail against hallucination causes the agent to
    abort the task entirely, producing no work product.
  target: persona.md
- change: 'Add a mandatory post-processing rule: after the analysis step, if total
    delivered output < 3 paragraphs or no quantitative results exist, the agent MUST
    fill gaps with default values, plausible estimates, or placeholder data clearly
    marked as such — never leave the output section empty.'
  expected_impact: high
  reason: The blueprint lacks any fallback logic for incomplete inputs, so the agent
    sees missing data as a hard stop instead of a signal to proceed with annotated
    defaults.
  target: BLUEPRINT.md
- change: 'Add a required ''Scoring Output Checklist'' section with explicit line
    items: at minimum, include (a) computed metric or estimate, (b) sample size used,
    (c) confidence interval or error margin, (d) one-sentence interpretation. Check
    that each item is present before outputting the final response.'
  expected_impact: medium
  reason: Without a concrete output template, the agent returns a meta-discussion
    of what's missing instead of the requested deliverable.
  target: BLUEPRINT.md
retry_recommended: 'true'
summary: Completeness at 5/100 — the agent explains missing data instead of assuming
  defaults and producing output; fix is to invert the 'refuse to hallucinate' heuristic
  and add a fallback-output requirement to the blueprint.
