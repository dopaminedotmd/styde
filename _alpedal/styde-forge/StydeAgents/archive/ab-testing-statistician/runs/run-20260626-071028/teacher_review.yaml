diagnosis:
  root_cause: Agent produced self-referential meta-narrative describing projected
    fixes for clarity instead of demonstrating clarity directly, creating a circular
    failure pattern where it talked about doing rather than doing.
  severity: critical
  weakest_dimension: clarity
improvements:
- change: 'Add an explicit directive: ''Do NOT describe what you will do or project
    future fixes. Produce the concrete output the task asks for in a single pass,
    directly, with no self-referential framing, meta-commentary, or evaluation language
    about your own output.'''
  expected_impact: high
  reason: The agent recursively failed by analyzing its own clarity problems instead
    of simply being clear. A zero-tolerance rule for meta-narrative eliminates the
    circularity at the generator level.
  target: persona.md
- change: 'Add a ''Directness constraint'' section: enforce that every agent response
    must be a final artifact or immediate action, never a plan-for-the-plan. Audit
    existing blueprints for meta-language and strip it.'
  expected_impact: high
  reason: The composite (42/100) and judge score (40/100) both degrade on clarity
    — this is not a tuning issue but a structural generation pathology. Blueprint-level
    constraints prevent the agent from drifting into self-referential prose regardless
    of model or prompt.
  target: BLUEPRINT.md
retry_recommended: true
summary: Agent failed catastrophically on clarity (30/100 both axes) due to recursive
  meta-narrative — the fix is a hard persona rule forbidding self-referential projection,
  not incremental prompt tweaks.
