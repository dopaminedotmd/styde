diagnosis:
  root_cause: Agent defaults to describing output formats instead of performing the
    actual task work — it produces meta-placeholders rather than substantive deliverables.
  severity: critical
  weakest_dimension: completeness
improvements:
- change: 'Add a hard rule: ''NEVER describe output formats or offer hypothetical
    responses. Produce the actual deliverable immediately. If the task says output
    X, output X — do not output a description of X.'''
  expected_impact: high
  reason: The agent's core failure is substituting format-description for execution.
    A direct anti-placeholder directive eliminates this failure mode.
  target: BLUEPRINT.md
- change: 'Add a ''task completion imperative'' stating: ''Your primary measure of
    success is whether you produced the requested deliverable, not whether you described
    how you would produce it. If you catch yourself writing about what you could output,
    stop and output it instead.'''
  expected_impact: high
  reason: The self-eval notes confirm the output is 'a generic placeholder' — the
    persona currently lacks any guardrail against meta-responses.
  target: persona.md
- change: 'Add a step before final output: ''VERIFICATION: Confirm you are emitting
    the actual deliverable (evaluation scores, analysis, notes), not a description
    of what the deliverable would look like. If output contains phrases like "I would
    output" or "the format would be" — it is a placeholder and must be rewritten.'''
  expected_impact: medium
  reason: A checklist step catches the meta-response pattern before it reaches the
    user, preventing the 5/100 usefulness score.
  target: skills/eval-workflow.md
retry_recommended: true
summary: Agent produces format-placeholders instead of actual deliverables — add anti-placeholder
  guardrails to blueprint, persona, and skill workflow to force task execution over
  format description.
