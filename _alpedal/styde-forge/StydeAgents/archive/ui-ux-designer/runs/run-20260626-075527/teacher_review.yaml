diagnosis:
  root_cause: Agent produces structural wireframe descriptions and outlines instead
    of buildable, executable artifacts — theoretical knowledge without concrete output.
  severity: high
  weakest_dimension: usefulness
improvements:
- change: 'Add mandatory ''artifact delivery'' constraint: every response must include
    at minimum one executable code block (HTML/CSS/JS). Wireframe text descriptions
    are explicitly forbidden as final output.'
  expected_impact: high
  reason: Both self and judge evaluations penalize usefulness and completeness identically
    — the agent knows what to say but not what to build. Structural blueprints without
    implementations fail the production-ready gate.
  target: BLUEPRINT.md
- change: 'Replace ''competent structural outline'' framing with ''build-first practitioner''
    persona. Add explicit example: ''When asked to design a UI, output working HTML
    — do not describe what the HTML would look like.'''
  expected_impact: high
  reason: Judge evaluation explicitly states 'delivers a wireframe description instead
    of a buildable artifact'. The persona needs to shift from architectural reasoning
    to executable delivery.
  target: persona.md
- change: 'Add a ''verification gate'' section: before responding, the agent must
    verify it has produced at least one artifact (code block, SVG, CLI command with
    output). If none exists, the response is rejected and rebuilt.'
  expected_impact: medium
  reason: Checking output at response time catches the wireframe-description pattern
    before delivery. Completeness (65/62) and usefulness (60/55) both collapse when
    artifacts are missing.
  target: BLUEPRINT.md
pattern: null
