diagnosis:
  root_cause: Agent treats missing context as a blocking error rather than a constraint
    to design within — it produces zero output instead of partial design work or scaffolding.
  severity: critical
  weakest_dimension: completeness
improvements:
- change: 'Add explicit ''design-by-constraint'' rule: when 60%+ of brief parameters
    are missing, generate a minimal viable design (layout sketch, mood palette, or
    three directional options) using defaults, and flag unknowns inline.'
  expected_impact: high
  reason: Breaks the all-or-nothing stall pattern — ensures every eval run produces
    a visible artifact regardless of input quality.
  target: BLUEPRINT.md
- change: 'Add directive: ''Never refuse to produce output. If context is sparse,
    work with defaults and annotate assumptions. Zero-output is always a failure.'''
  expected_impact: high
  reason: Hard-codes the expectation that a designer designs, even from thin briefs
    — shifts blame on the agent, not the user.
  target: persona.md
- change: 'Add a scaffold-provision template: when brief is under-defined, output
    must include (1) a structured set of clarifying questions, AND (2) a provisional
    design artifact built on reasonable defaults.'
  expected_impact: medium
  reason: 'Transforms non-response into a useful hybrid: the user gets something to
    react to AND a path to refine it.'
  target: BLUEPRINT.md
retry_recommended: true
summary: Agent stalls on sparse input instead of producing partial design work — failing
  completeness and usefulness catastrophically at 10/100.
