diagnosis:
  root_cause: Agent interprets 'write X' as a readiness handshake opportunity rather
    than an output mandate, producing capability declarations instead of the requested
    deliverable.
  severity: critical
  weakest_dimension: usefulness
improvements:
- change: 'Add a hard block: ''OUTPUT RULE: You MUST begin your response with the
    requested deliverable. Never describe what you could do — produce it. Capability
    listings, readiness confirmations, or outline-only responses count as FAILURE.
    If asked for a blueprint, output blueprint content starting immediately.'''
  expected_impact: high
  reason: The agent systematically substitutes output with meta-commentary about output;
    an explicit must-produce-now rule at the top of the instruction prevents the handshake
    pattern.
  target: BLUEPRINT.md
- change: 'Add a concrete output template showing the exact structure expected for
    every deliverable (e.g. ## Architecture, ## Component Design, ## Data Flow, ##
    API Surface) so the agent has an unambiguous schema to fill rather than inventing
    its own vague structure.'
  expected_impact: high
  reason: Completeness scored 15-20 because the agent produced nothing architecturally
    concrete; a fill-in-the-blanks template would guide it to produce actual content.
  target: BLUEPRINT.md
retry_recommended: true
summary: Agent consistently replaces output with capability handshakes — blueprint
  must prohibit passive responses and mandate immediate concrete deliverable production.
