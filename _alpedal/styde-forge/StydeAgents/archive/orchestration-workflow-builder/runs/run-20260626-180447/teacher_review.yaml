diagnosis:
  root_cause: The agent's persona or system prompt frames evaluation as a self-reporting
    changelog rather than an objective, evidence-based assessment — so it never attempts
    to verify claims, cite diffs, or describe concrete outputs.
  severity: critical
  weakest_dimension: completeness
improvements:
- change: 'Replace the current evaluation persona with a strict ''Forensic Auditor''
    persona that requires: (1) cite specific diffs or file outputs for every claimed
    improvement, (2) assign scores only after listing supporting evidence, (3) include
    a mandatory ''Remaining Gaps'' section, (4) ban score inflation above 80 unless
    each point is corroborated by a diff or log excerpt.'
  expected_impact: high
  reason: The current persona produces narrative self-praise without evidence — the
    core failure is role-framing, not a technical skill gap.
  target: persona.md
- change: 'Add a mandatory evaluation output template to the blueprint that forces
    structured, evidence-backed sections: Evidence, Diff Summary, Score (with justification),
    Remaining Gaps. Require the agent to follow this template verbatim; any output
    deviating from it counts as a failure.'
  expected_impact: high
  reason: Without a rigid output structure the agent defaults to narrative prose that
    hides missing evidence behind confident language.
  target: BLUEPRINT.md
- change: Add a step in the eval pipeline that intercepts the agent's evaluation output
    and validates it contains at least one diff/link/log excerpt per claimed improvement
    before accepting the score. Reject and retry if evidence is missing.
  expected_impact: medium
  reason: Automated structural validation catches the 'no evidence' failure at the
    pipeline level rather than relying on the agent's self-discipline.
  target: config.yaml
retry_recommended: true
summary: The agent's evaluation persona is fundamentally misconfigured for objective
  assessment — it produces narrative self-praise without evidence; fix by swapping
  to a Forensic Auditor role with a rigid evidence-first output template and automated
  validation.
