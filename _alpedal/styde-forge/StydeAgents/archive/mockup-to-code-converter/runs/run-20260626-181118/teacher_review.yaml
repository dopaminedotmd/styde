diagnosis:
  root_cause: Agent treats code review as a diff-logging exercise — dumps structural
    verification without any qualitative analysis, design feedback, or actionable
    review commentary.
  severity: critical
  weakest_dimension: completeness
improvements:
- change: 'Replace ''output: diff summary + structural verification'' directive with
    a structured review template requiring: (1) diff overview with risk assessment,
    (2) per-file code quality notes, (3) design/architecture observations, (4) correctness
    and edge-case analysis, (5) specific actionable suggestions with line references.'
  expected_impact: high
  reason: The current persona tells the agent to output diffs and verify structure,
    which produces a build log — not a review. A template forces analytical depth.
  target: persona.md
- change: 'Add a ''Review Standards'' section that defines minimum review depth: each
    modified file must receive at least one qualitative comment about logic, style,
    or correctness. State that raw diff dumps without analysis score <= 40 in the
    judge evaluation.'
  expected_impact: high
  reason: Explicit quality gates in the blueprint prevent the agent from falling into
    shallow output patterns. Without them, the agent defaults to 'diff + valid = done'.
  target: BLUEPRINT.md
- change: 'Set an output constraint: disable truncated diff previews (max_omitted_lines:
    0 or equivalent) and require full inline review commentary instead of file-creation
    logs.'
  expected_impact: medium
  reason: The truncated preview (1277 omitted lines) signals the agent thinks a partial
    diff is acceptable output. Full commentary replaces raw diffs with analysis.
  target: config.yaml
retry_recommended: true
summary: Agent outputs build logs instead of code reviews — needs persona template,
  blueprint gates, and output constraints to force analytical depth.
