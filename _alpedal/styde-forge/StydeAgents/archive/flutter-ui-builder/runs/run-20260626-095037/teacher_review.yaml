diagnosis:
  root_cause: Agent outputs bare assertions (e.g. 'blueprint registered') with zero
    supporting evidence, rubric, or deliverables — no verification trace for any claimed
    work.
  severity: critical
  weakest_dimension: completeness
improvements:
- change: 'Add a mandatory output structure: (1) summary of what was done, (2) evidence
    block listing file paths, key decisions, or generated artifacts, (3) rubric with
    scores per dimension, (4) justification sentence per score.'
  expected_impact: high
  reason: Sparse output is the root failure — forcing a structured template prevents
    the agent from returning a one-liner and forces demonstrable evidence.
  target: persona.md
- change: Append a 'Self-Evaluation Requirements' section that requires the agent
    to include both an evidence trace and a completed rubric table in every response.
  expected_impact: medium
  reason: The blueprint governs the agent's task format; embedding the requirement
    there ensures it cannot be skipped or overridden by persona instructions.
  target: BLUEPRINT.md
- change: Add a post-generation validation step that checks output length and rubric
    completeness, rejecting responses that fall below a 50-word threshold or lack
    a rubric.
  expected_impact: medium
  reason: Automated guardrails catch the failure at generation time rather than relying
    on the agent's self-discipline.
  target: config.yaml
retry_recommended: true
summary: Agent returns assertion-only output with zero evidence — enforce structured
  templates and post-generation validation to fix completeness and usefulness.
