<!DOCTYPE html>

<title>Styde Forge Agent Lifecycle Timeline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI',system-ui,sans-serif;padding:20px}
h1{font-size:18px;color:#58a6ff;margin-bottom:4px;font-weight:400}
.subtitle{color:#8b949e;font-size:12px;margin-bottom:20px}
#timeline-container{position:relative;overflow-x:auto;overflow-y:visible;padding-bottom:100px}
#svg-canvas{display:block;min-width:1200px}
#controls{position:sticky;bottom:0;background:#161b22;border-top:1px solid #30363d;padding:12px 20px;display:flex;align-items:center;gap:16px;z-index:100}
#controls button{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px}
#controls button:hover{background:#30363d}
#controls button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
#time-label{font-size:12px;color:#8b949e;min-width:140px}
#scrubber{flex:1;height:6px;accent-color:#58a6ff;cursor:pointer}
#detail-popup{position:fixed;display:none;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;z-index:200;min-width:280px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
#detail-popup h3{font-size:14px;color:#58a6ff;margin-bottom:8px}
#detail-popup .row{display:flex;justify-content:space-between;margin:3px 0;font-size:12px}
#detail-popup .label{color:#8b949e}
#detail-popup .value{color:#c9d1d9;font-weight:500}
#detail-popup .close{position:absolute;top:8px;right:10px;color:#8b949e;cursor:pointer;font-size:16px}
#detail-popup .close:hover{color:#c9d1d9}
.tooltip{font-size:11px;color:#8b949e;pointer-events:none}
.legend{display:flex;gap:20px;margin-top:8px;font-size:11px;color:#8b949e}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.production-badge{fill:#3fb950;font-size:9px}
.null-score{opacity:0.4}
</style>
</head>

</div>

<div id="timeline-container">
<svg id="svg-canvas" xmlns="http://www.w3.org/2000/svg"></svg>

<div id="controls">
<button id="play-btn" onclick="togglePlay()">&#9654; Play</button>
<span id="time-label">Scrub from first to last event</span>
<input type="range" id="scrubber" min="0" max="100" value="100" oninput="scrub(this.value)">
<div class="legend">

<span class="legend-item"><span class="legend-dot" style="background:#8b949e;opacity:0.4"></span> No Score</span>

</div>

// Sort and index
ALL_EVENTS.sort(function(a,b){return a.t-b.t});
var t0 = ALL_EVENTS[0].t;
var t1 = ALL_EVENTS[ALL_EVENTS.length-1].t;
var tRange = t1-t0 || 1;

// Collect unique blueprints in display order (by first event time)
var bpMap = {};
ALL_EVENTS.forEach(function(e){
  if(!bpMap[e.bp]) bpMap[e.bp]={first:e.t,count:0,name:e.bp};
  bpMap[e.bp].count++;
});
var BLUEPRINTS = Object.keys(bpMap).sort(function(a,b){return bpMap[a].first-bpMap[b].first});

var currentFrame = 100; // 0..100
var playTimer = null;

function scoreColor(s) {
  if(s===null||s===undefined) return '#8b949e';
  if(s>=85) return '#ffd700';
  if(s>=70) return '#f0883e';
  return '#58a6ff';
}

function scoreLabel(s) {
  if(s===null||s===undefined) return 'No score';
  return s.toFixed(1);
}

function fmtTime(ts) {
  var d=new Date(ts*1000);
  return d.toISOString().replace('T',' ').substring(0,16)+'Z';
}

// Build event index per blueprint
var bpEvents={};
ALL_EVENTS.forEach(function(e){
  if(!bpEvents[e.bp]) bpEvents[e.bp]=[];
  bpEvents[e.bp].push(e);
});

function renderTimeline(framePct) {
  var cutTime = t0 + tRange * (framePct/100);
  var svg = document.getElementById('svg-canvas');
  var W = 1400;
  var margin = {left:220, right:60, top:30, bottom:20};
  var rowH = 40;
  var dotR = 7;
  var timelineY = margin.top;
  var trackW = W - margin.left - margin.right;

  var h = margin.top + BLUEPRINTS.length * rowH + 60;

  var html = '<defs>';
  // Glow filter for gold nodes
  html += '<filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  // Shadow for all nodes
  html += '<filter id="shadow"><feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.3"/></filter>';
  html += '</defs>';

  BLUEPRINTS.forEach(function(bp, idx){
    var y = timelineY + idx * rowH + rowH/2;
    var events = bpEvents[bp] || [];

    // Track line
    html += '<line x1="'+margin.left+'" y1="'+y+'" x2="'+(W-margin.right)+'" y2="'+y+'" stroke="#21262d" stroke-width="2"/>';

    // Label
    var label = bp.replace(/-/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase()});
    html += '<text x="'+(margin.left-12)+'" y="'+(y+4)+'" text-anchor="end" fill="#c9d1d9" font-size="11" font-family="inherit">'+label+'</text>';

    // Count badge
    html += '<text x="'+(W-margin.right+8)+'" y="'+(y+4)+'" text-anchor="start" fill="#8b949e" font-size="9">'+events.length+'</text>';

    events.forEach(function(e){
      var px = margin.left + ( (e.t - t0) / tRange ) * trackW;
      // Only show events up to current scrub time
      if(e.t > cutTime) return;

      var color = scoreColor(e.s);
      var isProduction = e.s!==null && e.s>=85;
      var isNull = e.s===null||e.s===undefined;
      var r = isProduction ? dotR+1 : dotR;
      var cls = isNull ? 'null-score' : '';

      // Node circle
      html += '<circle cx="'+px+'" cy="'+y+'" r="'+r+'" fill="'+color+'" stroke="'+(isProduction?'#fff':'none')+'" stroke-width="'+(isProduction?'1.5':'0')+'" filter="'+(isProduction?'url(#glow)':'url(#shadow)')+'" class="'+cls+'" style="cursor:pointer" onclick="showDetail(\''+e.bp+'\',\''+e.id+'\',\''+e.st+'\','+e.s+','+e.t+')" onmouseover="this.setAttribute(\'r\','+(r+3)+')" onmouseout="this.setAttribute(\'r\','+r+')"/>';

      // Score label if production
      if(isProduction) {
        html += '<text x="'+(px)+'" y="'+(y-12)+'" text-anchor="middle" fill="#ffd700" font-size="8" font-weight="bold">'+e.s.toFixed(1)+'</text>';
      }
    });
  });

  // Time axis
  var axisY = timelineY + BLUEPRINTS.length * rowH + 20;
  var ticks=6;
  for(var i=0;i<=ticks;i++){
    var t = t0 + (tRange*i)/ticks;
    var px = margin.left + (i/ticks)*trackW;
    html += '<line x1="'+px+'" y1="'+axisY+'" x2="'+px+'" y2="'+(axisY+5)+'" stroke="#30363d" stroke-width="1"/>';
    var d=new Date(t*1000);
    var label=d.toISOString().substring(11,16);
    html += '<text x="'+px+'" y="'+(axisY+16)+'" text-anchor="middle" fill="#8b949e" font-size="9">'+label+'</text>';
  }

  html += '<line x1="'+margin.left+'" y1="'+axisY+'" x2="'+(W-margin.right)+'" y2="'+axisY+'" stroke="#30363d" stroke-width="1"/>';

  // Scrubber indicator line
  var scrubX = margin.left + (framePct/100)*trackW;
  html += '<line x1="'+scrubX+'" y1="'+margin.top+'" x2="'+scrubX+'" y2="'+(axisY-5)+'" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>';

  svg.setAttribute('width',W);
  svg.setAttribute('height',h);
  svg.setAttribute('viewBox','0 0 '+W+' '+h);
  svg.setAttribute('style','background:#0d1117');
  svg.innerHTML=html;
}

function showDetail(bp, id, stage, score, ts) {
  var pop = document.getElementById('detail-popup');
  document.getElementById('pop-title').textContent = 'Run '+id;
  document.getElementById('pop-bp').textContent = bp.replace(/-/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase()});
  document.getElementById('pop-stage').textContent = stage;
  document.getElementById('pop-ver').textContent = '1';
  document.getElementById('pop-score').textContent = score!==null ? score.toFixed(1) : 'N/A (running/failed)';
  document.getElementById('pop-id').textContent = id.toLowerCase().startsWith('eval')||id.toLowerCase().startsWith('spawn')||id.toLowerCase().startsWith('improv') ? id : id;

  var e = window.event;
  pop.style.display = 'block';
  pop.style.left = Math.min(e.clientX+10, window.innerWidth-300)+'px';
  pop.style.top = Math.min(e.clientY+10, window.innerHeight-200)+'px';
}

function closePopup() {
  document.getElementById('detail-popup').style.display = 'none';
}
document.addEventListener('click',function(e){
  var pop=document.getElementById('detail-popup');
  if(pop.style.display==='block' && !e.target.closest('#detail-popup') && e.target.tagName!=='circle'){
    pop.style.display='none';
  }
});

function scrub(val) {
  currentFrame = parseInt(val);
  renderTimeline(currentFrame);
  var pct = (currentFrame/100).toFixed(2);
  var cutTime = t0 + tRange * pct;
  var d = new Date(cutTime*1000);
  document.getElementById('time-label').textContent = d.toISOString().substring(11,16)+'Z  |  '+Math.round(currentFrame)+'% through run';
}

function togglePlay() {
  var btn = document.getElementById('play-btn');
  if(playTimer) {
    clearInterval(playTimer);
    playTimer=null;
    btn.innerHTML='&#9654; Play';
    btn.classList.remove('active');
  } else {
    btn.innerHTML='&#9646;&#9646; Pause';
    btn.classList.add('active');
    playTimer = setInterval(function(){
      currentFrame = Math.min(100, currentFrame+1);
      document.getElementById('scrubber').value=currentFrame;
      renderTimeline(currentFrame);
      var cutTime = t0 + tRange*(currentFrame/100);
      var d = new Date(cutTime*1000);
      document.getElementById('time-label').textContent = d.toISOString().substring(11,16)+'Z  |  '+Math.round(currentFrame)+'% through run';
      if(currentFrame>=100) {
        clearInterval(playTimer);
        playTimer=null;
        btn.innerHTML='&#9654; Play';
        btn.classList.remove('active');
      }
    },120);
  }
}

document.addEventListener('DOMContentLoaded',function(){
  scrub(100);
});
</script>
