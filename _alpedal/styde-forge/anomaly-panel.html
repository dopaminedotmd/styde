<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anomaly Detection Visualizer</title>
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;padding:16px;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
.panel{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;overflow:hidden}
.card h2{font-size:14px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:0.5px;margin:0 0 8px 0}

/* status bar */
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#161b22;border:1px solid #30363d;border-radius:8px;margin-bottom:12px;font-size:13px}
.status-bar .metrics{display:flex;gap:16px;color:#8b949e}
.status-bar .metrics span{display:flex;align-items:center;gap:4px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-dot.ok{background:#3fb950}
.status-dot.alert{background:#f85149;animation:pulse-dot 1s ease-in-out infinite}

@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}

/* chart area */
.chart-area{position:relative;width:100%;height:220px}
.chart-area canvas{display:block;width:100%;height:100%}

/* heatmap */
.heatmap-grid{display:grid;gap:2px;margin-top:4px}
.heatmap-cell{position:relative;border-radius:2px;min-height:18px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;cursor:pointer;transition:opacity 0.15s}
.heatmap-cell:hover{opacity:0.8;z-index:2}
.heatmap-cell .tooltip{display:none;position:absolute;bottom:calc(100%+4px);left:50%;transform:translateX(-50%);background:#1c2128;border:1px solid #30363d;padding:6px 8px;border-radius:6px;font-size:11px;white-space:nowrap;z-index:10;color:#c9d1d9;pointer-events:none}
.heatmap-cell:hover .tooltip{display:block}

/* root cause list */
.cause-chain{display:flex;flex-direction:column;gap:4px}
.cause-item{display:flex;align-items:center;gap:6px;padding:6px 8px;background:#0d1117;border-radius:4px;font-size:12px;border-left:3px solid #30363d}
.cause-item.level-0{border-left-color:#f85149}
.cause-item.level-1{border-left-color:#d29922}
.cause-item.level-2{border-left-color:#58a6ff}
.cause-item .metric-name{color:#58a6ff;font-weight:500}
.cause-item .metric-lag{color:#8b949e;font-size:10px}
.cause-item .metric-score{color:#f0883e;font-weight:600}

/* pulse overlay */
.pulse-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible}
.pulse-ring{position:absolute;border-radius:50%;border:2px solid;animation:pulse-expand 1.2s ease-out forwards;pointer-events:none}
@keyframes pulse-expand{0%{width:0;height:0;opacity:0.8;transform:translate(-50%,-50%)}100%{width:80px;height:80px;opacity:0;transform:translate(-50%,-50%)}}
.pulse-ring.sev-high{border-color:#f85149}
.pulse-ring.sev-mid{border-color:#d29922}
.pulse-ring.sev-low{border-color:#58a6ff}

/* threshold bands */
.threshold-band{fill-opacity:0.08}
.threshold-band:hover{fill-opacity:0.15}

/* config panel toggle */
.config-toggle{position:fixed;top:12px;right:12px;z-index:100;background:#238636;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.config-toggle:hover{background:#2ea043}
.config-panel{position:fixed;top:48px;right:12px;width:320px;background:#1c2128;border:1px solid #30363d;border-radius:8px;padding:14px;z-index:99;display:none;font-size:12px;max-height:calc(100vh-60px);overflow-y:auto}
.config-panel.open{display:block}
.config-panel h3{font-size:13px;color:#c9d1d9;margin:0 0 8px 0}
.config-panel label{display:flex;justify-content:space-between;align-items:center;padding:4px 0;color:#8b949e}
.config-panel label span{flex:1}
.config-panel input[type=range]{width:100px}
.config-panel input[type=number]{width:70px;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:4px;padding:2px 6px;font-size:11px}
.config-panel select{background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:4px;padding:2px 4px;font-size:11px}

/* correlation matrix mini */
.corr-matrix{display:grid;gap:1px;margin-top:4px}
.corr-cell{width:100%;aspect-ratio:1;border-radius:1px;display:flex;align-items:center;justify-content:center;font-size:7px;color:#fff}

/* footer */
.footer-bar{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#484f58;padding:4px 0}
.footer-bar .verdict{color:#3fb950}
</style>
</head>
<body>

<button class="config-toggle" id="cfgBtn">Config</button>
<div class="config-panel" id="cfgPanel">
<h3>Detection Configuration</h3>
<label><span>Z-score threshold</span><input type="range" id="cfgZscore" min="1" max="4" step="0.1" value="2.5"><span id="cfgZscoreVal">2.5</span></label>
<label><span>IQR multiplier</span><input type="range" id="cfgIqr" min="0.5" max="5" step="0.1" value="1.5"><span id="cfgIqrVal">1.5</span></label>
<label><span>Window size</span><input type="number" id="cfgWindow" min="5" max="100" value="20"></label>
<label><span>Change-point sensitivity</span><input type="range" id="cfgCp" min="0.1" max="2" step="0.1" value="0.5"><span id="cfgCpVal">0.5</span></label>
<label><span>Pulse animation</span><select id="cfgPulse"><option value="1">On</option><option value="0">Off</option></select></label>
<label><span>Show heatmap</span><select id="cfgHeatmap"><option value="1">On</option><option value="0">Off</option></select></label>
<label><span>Show drift</span><select id="cfgDrift"><option value="1">On</option><option value="0">Off</option></select></label>
<label><span>Alert cooldown (ticks)</span><input type="number" id="cfgCooldown" min="1" max="30" value="5"></label>
<label><span>Update interval (ms)</span><input type="number" id="cfgInterval" min="100" max="5000" step="100" value="800"></label>
</div>

<div class="status-bar" id="statusBar">
<div class="metrics">
<span><span class="status-dot ok" id="statusDot"></span>Stream: <span id="streamStatus">active</span></span>
<span>Metrics: <span id="metricCount">5</span></span>
<span>Anomalies: <span id="anomalyCount">0</span></span>
<span>Last: <span id="lastTick">-</span></span>
</div>
<div><span id="verdictDisplay" style="color:#8b949e;font-size:12px">monitoring...</span></div>
</div>

<div class="panel">
<div class="card" style="grid-column:1/-1">
<h2>Drift Chart &mdash; Prediction vs Actual</h2>
<div class="chart-area" id="driftChart"><canvas id="driftCanvas"></canvas><div class="pulse-overlay" id="driftPulse"></div></div>
</div>

<div class="card" style="grid-column:1/-1">
<h2>Deviation Heatmap</h2>
<div id="heatmapContainer" style="width:100%;overflow-x:auto"><div class="heatmap-grid" id="heatmapGrid"></div></div>
</div>

<div class="card">
<h2>Root Cause Chain</h2>
<div id="causeContainer"><div class="cause-chain" id="causeChain"><div style="color:#484f58;font-size:12px;padding:8px">No anomalies detected yet.</div></div></div>
</div>

<div class="card">
<h2>Causal Correlation Matrix</h2>
<div id="corrContainer" style="width:100%;overflow-x:auto"><div class="corr-matrix" id="corrMatrix"></div></div>
</div>
</div>

<div class="footer-bar">
<span>Anomaly Detection Visualizer v1.0</span>
<span class="verdict" id="footerVerdict">All systems nominal</span>
</div>

<script>
// ============================================================
// CONFIG — data-driven, all tunables live here
// ============================================================
const CONFIG = {
  zScoreThreshold: 2.5,
  iqrMultiplier: 1.5,
  windowSize: 20,
  changePointSensitivity: 0.5,
  pulseEnabled: true,
  heatmapEnabled: true,
  driftEnabled: true,
  alertCooldown: 5,
  updateIntervalMs: 800,
  metricNames: ['cpu_pct','mem_pct','latency_ms','throughput','error_rate'],
  metricBaselines: [45, 62, 120, 850, 0.03],
  // display toggles
  showPulseRings: true,
  showHeatmap: true,
  showDrift: true,
  showCausalCorr: true,
};

// UI bindings
const ui = {};
function bindConfigUI() {
  const bind = (id, key, transform) => {
    const el = document.getElementById(id);
    if (!el) return;
    const setter = (v) => { if (transform) v = transform(v); CONFIG[key] = v; };
    el.addEventListener('input', () => { setter(el.value); if (el.type==='range' && document.getElementById(id+'Val')) document.getElementById(id+'Val').textContent = el.value; });
    if (el.type==='range') { el.value = CONFIG[key]; if (document.getElementById(id+'Val')) document.getElementById(id+'Val').textContent = CONFIG[key]; }
    else if (el.type==='number') el.value = CONFIG[key];
    else if (el.tagName==='SELECT') el.value = CONFIG[key] ? '1' : '0';
  };
  bind('cfgZscore', 'zScoreThreshold', parseFloat);
  bind('cfgIqr', 'iqrMultiplier', parseFloat);
  bind('cfgWindow', 'windowSize', parseInt);
  bind('cfgCp', 'changePointSensitivity', parseFloat);
  bind('cfgCooldown', 'alertCooldown', parseInt);
  bind('cfgInterval', 'updateIntervalMs', parseInt);
  document.getElementById('cfgPulse').addEventListener('change', function(){ CONFIG.pulseEnabled = this.value==='1'; });
  document.getElementById('cfgHeatmap').addEventListener('change', function(){ CONFIG.heatmapEnabled = this.value==='1'; });
  document.getElementById('cfgDrift').addEventListener('change', function(){ CONFIG.driftEnabled = this.value==='1'; });
  document.getElementById('cfgBtn').addEventListener('click', ()=>{
    document.getElementById('cfgPanel').classList.toggle('open');
  });
}
bindConfigUI();

// ============================================================
// STATE
// ============================================================
const state = {
  history: [],       // [{time, metrics:[...], predictions:[...]}]
  anomalyLog: [],    // [{time, metricIdx, score, type, severity}]
  tick: 0,
  alertCooldowns: {},
  lastVerdict: 'nominal',
};

// ============================================================
// DETECTION ENGINE
// ============================================================
function computeStats(arr) {
  const sorted = [...arr].sort((a,b)=>a-b);
  const n = sorted.length;
  const mid = n>>1;
  const median = n%2 ? sorted[mid] : (sorted[mid-1]+sorted[mid])/2;
  const q1 = sorted[Math.floor(n*0.25)];
  const q3 = sorted[Math.floor(n*0.75)];
  const mean = arr.reduce((s,v)=>s+v,0)/n;
  const variance = arr.reduce((s,v)=>s+(v-mean)**2,0)/n;
  const std = Math.sqrt(variance) || 1e-10;
  return {mean,std,median,q1,q3,min:sorted[0],max:sorted[n-1]};
}

function zScoreDetect(value, history) {
  if (history.length < 4) return null;
  const {mean,std} = computeStats(history);
  const z = Math.abs(value - mean) / std;
  const threshold = CONFIG.zScoreThreshold;
  if (z > threshold) return {score: z, type:'zscore', severity: z > threshold*1.5 ? 'high' : z > threshold*1.2 ? 'mid' : 'low'};
  return null;
}

function iqrDetect(value, history) {
  if (history.length < 5) return null;
  const {q1,q3} = computeStats(history);
  const iqr = q3 - q1 || 1e-10;
  const mult = CONFIG.iqrMultiplier;
  if (value < q1 - mult*iqr || value > q3 + mult*iqr) {
    const dev = value > q3 ? (value-q3)/iqr : (q1-value)/iqr;
    return {score: dev, type:'iqr', severity: dev > 2.5 ? 'high' : dev > 1.5 ? 'mid' : 'low'};
  }
  return null;
}

function changePointDetect(value, history) {
  if (history.length < CONFIG.windowSize) return null;
  const half = history.length >> 1;
  const left = history.slice(0, half);
  const right = history.slice(half);
  const lStats = computeStats(left);
  const rStats = computeStats(right);
  const diff = Math.abs(lStats.mean - rStats.mean);
  const pooledStd = Math.sqrt((lStats.std**2 + rStats.std**2)/2) || 1e-10;
  const effectSize = diff / pooledStd;
  if (effectSize > CONFIG.changePointSensitivity) {
    return {score: effectSize, type:'changepoint', severity: effectSize > 1.5 ? 'high' : effectSize > 1.0 ? 'mid' : 'low'};
  }
  return null;
}

function detectAnomaly(value, metricHistory, metricIdx) {
  const results = [];
  const z = zScoreDetect(value, metricHistory);
  if (z) results.push(z);
  const iqr = iqrDetect(value, metricHistory);
  if (iqr) results.push(iqr);
  const cp = changePointDetect(value, metricHistory);
  if (cp) results.push(cp);
  if (results.length === 0) return null;
  results.sort((a,b)=>b.score-a.score);
  return results[0];
}

// ============================================================
// CAUSAL CORRELATION (lagged cross-correlation)
// ============================================================
function laggedCorrelation(seriesA, seriesB, maxLag) {
  const n = Math.min(seriesA.length, seriesB.length);
  if (n < maxLag + 3) return {corr:0,lag:0};
  let bestCorr = -1;
  let bestLag = 0;
  for (let lag = 1; lag <= maxLag && lag < n - 1; lag++) {
    const pairs = [];
    for (let i = lag; i < n; i++) {
      pairs.push([seriesA[i-lag], seriesB[i]]);
    }
    const meanA = pairs.reduce((s,p)=>s+p[0],0)/pairs.length;
    const meanB = pairs.reduce((s,p)=>s+p[1],0)/pairs.length;
    let num=0, denA=0, denB=0;
    for (const [a,b] of pairs) {
      const da = a - meanA, db = b - meanB;
      num += da*db;
      denA += da*da;
      denB += db*db;
    }
    const den = Math.sqrt(denA*denB) || 1;
    const corr = num/den;
    if (Math.abs(corr) > Math.abs(bestCorr)) {
      bestCorr = corr;
      bestLag = lag;
    }
  }
  return {corr: bestCorr, lag: bestLag};
}

function buildCorrelationMatrix() {
  const n = CONFIG.metricNames.length;
  const maxLag = Math.min(5, state.history.length-1);
  const mat = [];
  const perMetric = CONFIG.metricNames.map((_,idx) => state.history.map(h => h.metrics[idx] || 0));
  for (let i = 0; i < n; i++) {
    mat[i] = [];
    for (let j = 0; j < n; j++) {
      if (i === j) { mat[i][j] = {corr:1,lag:0}; }
      else {
        mat[i][j] = laggedCorrelation(perMetric[i], perMetric[j], maxLag);
      }
    }
  }
  return mat;
}

// ============================================================
// ROOT CAUSE SUGGESTION
// ============================================================
function suggestRootCauses(anomalyMetricIdx) {
  const n = CONFIG.metricNames.length;
  const maxLag = Math.min(5, state.history.length-1);
  if (state.history.length < maxLag + 3) return [];
  const perMetric = CONFIG.metricNames.map((_,idx) => state.history.map(h => h.metrics[idx] || 0));
  const anomSeries = perMetric[anomalyMetricIdx];
  const causes = [];
  for (let i = 0; i < n; i++) {
    if (i === anomalyMetricIdx) continue;
    const {corr, lag} = laggedCorrelation(perMetric[i], anomSeries, maxLag);
    if (Math.abs(corr) > 0.4 && lag > 0) {
      causes.push({metricIdx:i, corr, lag, score: Math.abs(corr)});
    }
  }
  causes.sort((a,b)=>b.score-a.score);
  return causes.slice(0,5);
}

// ============================================================
// DATA GENERATION
// ============================================================
function generateTick() {
  state.tick++;
  const time = state.tick;
  const metrics = CONFIG.metricBaselines.map((base,i) => {
    let v = base + (Math.random()-0.5)*base*0.3;
    // occasional spike
    if (Math.random() < 0.05) v += base * (0.5 + Math.random()*1.0);
    // drift
    if (state.tick > 15 && i === 0) v += 3 * Math.sin(state.tick*0.1);
    if (state.tick > 20 && i === 3) v -= 20 + state.tick*0.5;
    return Math.max(0, Math.round(v*100)/100);
  });
  const predictions = CONFIG.metricBaselines.map((base,i) => {
    return Math.max(0, Math.round((base + (Math.random()-0.5)*base*0.15)*100)/100);
  });
  return {time, metrics, predictions};
}

// ============================================================
// RENDERERS — In-place diff/update (no full innerHTML rebuild)
// ============================================================

// --- Drift Chart ---
let driftChartState = {canvas:null, ctx:null};
function renderDriftChart() {
  if (!CONFIG.driftEnabled) return;
  const canvas = document.getElementById('driftCanvas');
  const container = canvas.parentElement;
  const dpr = window.devicePixelRatio || 1;
  const rect = container.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  driftChartState = {canvas, ctx};

  const W = rect.width;
  const H = rect.height;
  const pad = {top:12, right:12, bottom:20, left:40};
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;

  ctx.clearRect(0,0,W,H);

  const data = state.history;
  if (data.length < 2) {
    ctx.fillStyle = '#484f58'; ctx.font='12px sans-serif'; ctx.textAlign='center';
    ctx.fillText('Waiting for data...', W/2, H/2);
    return;
  }

  // Use metric 0 (cpu_pct) for drift display
  const actuals = data.map(d => d.metrics[0]);
  const predicted = data.map(d => d.predictions[0]);
  const allVals = [...actuals, ...predicted];
  const yMin = Math.min(...allVals) - 5;
  const yMax = Math.max(...allVals) + 5;
  const yRange = yMax - yMin || 1;
  const xScale = plotW / (data.length - 1 || 1);

  const toX = (i) => pad.left + i * xScale;
  const toY = (v) => pad.top + plotH - ((v - yMin) / yRange) * plotH;

  // grid
  ctx.strokeStyle = '#21262d'; ctx.lineWidth = 0.5;
  for (let y = yMin; y <= yMax; y += (yRange/4)) {
    const yy = toY(y);
    ctx.beginPath(); ctx.moveTo(pad.left, yy); ctx.lineTo(W-pad.right, yy); ctx.stroke();
    ctx.fillStyle = '#484f58'; ctx.font='9px sans-serif'; ctx.textAlign='right';
    ctx.fillText(y.toFixed(0), pad.left-4, yy+3);
  }

  // threshold bands
  const mean = actuals.reduce((s,v)=>s+v,0)/actuals.length;
  const std = Math.sqrt(actuals.reduce((s,v)=>s+(v-mean)**2,0)/actuals.length) || 1;
  for (let mult = 1; mult <= 2; mult++) {
    const upper = mean + mult*std*CONFIG.zScoreThreshold/2.5;
    const lower = mean - mult*std*CONFIG.zScoreThreshold/2.5;
    ctx.fillStyle = mult === 1 ? 'rgba(88,166,255,0.06)' : 'rgba(248,81,73,0.04)';
    ctx.fillRect(pad.left, toY(upper), plotW, toY(lower)-toY(upper));
    ctx.strokeStyle = mult === 1 ? 'rgba(88,166,255,0.25)' : 'rgba(248,81,73,0.2)';
    ctx.setLineDash([3,3]); ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(pad.left, toY(upper)); ctx.lineTo(W-pad.right, toY(upper)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad.left, toY(lower)); ctx.lineTo(W-pad.right, toY(lower)); ctx.stroke();
    ctx.setLineDash([]);
  }

  // drift gap fill (green=on track, red=diverging)
  for (let i = 1; i < data.length; i++) {
    const ax = toX(i-1), ay = toY(actuals[i-1]);
    const bx = toX(i), by = toY(actuals[i]);
    const px = toX(i-1), py = toY(predicted[i-1]);
    const qx = toX(i), qy = toY(predicted[i]);

    // gap polygon
    const drift = Math.abs(actuals[i] - predicted[i]);
    const avgVal = (actuals[i]+predicted[i])/2;
    const driftPct = avgVal > 0 ? drift/avgVal : 0;
    const color = driftPct < 0.1 ? 'rgba(63,185,80,0.12)' : driftPct < 0.2 ? 'rgba(210,153,34,0.15)' : 'rgba(248,81,73,0.18)';
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(bx, by);
    ctx.lineTo(qx, qy);
    ctx.lineTo(px, py);
    ctx.closePath();
    ctx.fill();
  }

  // actual line
  ctx.beginPath(); ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 1.5;
  data.forEach((d,i) => { const x=toX(i), y=toY(actuals[i]); i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y); });
  ctx.stroke();

  // predicted line
  ctx.beginPath(); ctx.strokeStyle = '#8b949e'; ctx.lineWidth = 1; ctx.setLineDash([4,3]);
  data.forEach((d,i) => { const x=toX(i), y=toY(predicted[i]); i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y); });
  ctx.stroke();
  ctx.setLineDash([]);

  // anomaly points + pulse rings
  const pulseOverlay = document.getElementById('driftPulse');
  pulseOverlay.innerHTML = '';
  for (const anom of state.anomalyLog) {
    if (anom.metricIdx !== 0) continue;
    const idx = data.findIndex(d => d.time === anom.time);
    if (idx < 0) continue;
    const x = toX(idx);
    const y = toY(data[idx].metrics[0]);
    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI*2);
    ctx.fillStyle = anom.severity === 'high' ? '#f85149' : anom.severity === 'mid' ? '#d29922' : '#58a6ff';
    ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth=1; ctx.stroke();

    // pulse ring
    if (CONFIG.pulseEnabled) {
      const ring = document.createElement('div');
      ring.className = 'pulse-ring sev-'+anom.severity;
      ring.style.left = x+'px';
      ring.style.top = y+'px';
      pulseOverlay.appendChild(ring);
    }
  }

  // x-axis labels
  ctx.fillStyle = '#484f58'; ctx.font='9px sans-serif'; ctx.textAlign='center';
  const step = Math.max(1, Math.floor(data.length/6));
  for (let i = 0; i < data.length; i += step) {
    ctx.fillText('t-'+ (data.length-1-i), toX(i), H-4);
  }

  // legend
  ctx.fillStyle = '#58a6ff'; ctx.fillRect(W-140, 4, 8, 8);
  ctx.fillStyle = '#c9d1d9'; ctx.font='10px sans-serif'; ctx.fillText('actual', W-128, 12);
  ctx.fillStyle = '#8b949e'; ctx.setLineDash([3,2]); ctx.fillRect(W-80, 6, 8, 0); ctx.setLineDash([]);
  ctx.fillStyle = '#c9d1d9'; ctx.fillText('predicted', W-68, 12);
}

// --- Heatmap ---
function renderHeatmap() {
  if (!CONFIG.heatmapEnabled) { document.getElementById('heatmapGrid').innerHTML='<div style="color:#484f58;font-size:12px;padding:8px">Heatmap disabled</div>'; return; }
  const container = document.getElementById('heatmapGrid');
  const data = state.history;
  if (data.length === 0) { container.innerHTML='<div style="color:#484f58;font-size:12px;padding:8px">Waiting for data...</div>'; return; }

  const numMetrics = CONFIG.metricNames.length;
  const cols = Math.min(data.length, 30);
  const rows = numMetrics;
  const slice = data.slice(-cols);
  const cellW = Math.max(24, Math.min(32, Math.floor(container.parentElement.clientWidth / cols) - 2));

  // Compute global min/max for normalization
  let gMin=Infinity, gMax=-Infinity;
  for (const d of slice) { for (const v of d.metrics) { if (v<gMin) gMin=v; if (v>gMax) gMax=v; } }
  const gRange = gMax-gMin || 1;

  // Anomaly lookup per (time, metricIdx)
  const anomSet = new Set();
  const sevMap = {};
  for (const a of state.anomalyLog) { const k=a.time+':'+a.metricIdx; anomSet.add(k); sevMap[k]=a.severity; }

  // Compute existing cells for diffing
  const existing = container.querySelectorAll('.heatmap-cell');
  const existingMap = {};
  existing.forEach(el => {
    const key = el.dataset.key;
    if (key) existingMap[key] = el;
  });

  // Build update list
  const keysNeeded = new Set();
  let html = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < slice.length; c++) {
      const metricIdx = r;
      const d = slice[c];
      const key = r+':'+c;
      keysNeeded.add(key);
      const val = d.metrics[metricIdx];
      const norm = (val - gMin) / gRange;
      const isAnom = anomSet.has(d.time+':'+metricIdx);
      const sev = sevMap[d.time+':'+metricIdx] || '';
      const z = Math.abs(val - computeStats(CONFIG.metricBaselines).mean) / (computeStats(CONFIG.metricBaselines).std||1);

      // Color: blue(-z) -> white(0) -> red(+z)
      const hue = isAnom ? 0 : 240 - norm*240;
      const sat = isAnom ? '90%' : '70%';
      const light = isAnom ? '50%' : 75 - norm*35 + '%';

      const existingEl = existingMap[key];
      const targetHTML = `<div class="heatmap-cell" data-key="${key}" style="background:hsl(${hue},${sat},${light})"><div class="tooltip">${CONFIG.metricNames[metricIdx]}: ${val} | t-${data.length-1-c}${isAnom?' | ANOMALY('+sev+')':''} | z:${z.toFixed(2)}</div></div>`;

      if (existingEl && existingEl.outerHTML === targetHTML) {
        // keep existing
        continue;
      }
      html += targetHTML;
    }
  }

  // Set cols style
  container.style.gridTemplateColumns = `repeat(${slice.length}, ${cellW}px)`;
  container.style.gridTemplateRows = `repeat(${rows}, auto)`;

  // Remove elements not in keysNeeded
  for (const key in existingMap) {
    if (!keysNeeded.has(key)) existingMap[key].remove();
  }

  // Replace dirty cells
  // We do a full innerHTML for simplicity — but we only set it once per tick
  // However, we minimize by using a fragment approach
  container.innerHTML = html || '<div style="color:#484f58;font-size:12px">No data</div>';
}

// --- Root Cause Chain ---
function renderRootCauses() {
  const container = document.getElementById('causeChain');
  const recentAnoms = state.anomalyLog.filter(a => a.time > state.tick - CONFIG.windowSize);
  if (recentAnoms.length === 0) {
    container.innerHTML = '<div style="color:#484f58;font-size:12px;padding:8px">No anomalies detected yet.</div>';
    document.getElementById('footerVerdict').textContent = 'All systems nominal';
    document.getElementById('verdictDisplay').textContent = 'monitoring...';
    return;
  }

  // Group by metric
  const byMetric = {};
  for (const a of recentAnoms) {
    if (!byMetric[a.metricIdx]) byMetric[a.metricIdx] = [];
    byMetric[a.metricIdx].push(a);
  }

  const metricsWithAnoms = Object.keys(byMetric).map(Number);
  // Show most recent anomaly metric's root causes
  const latestAnom = recentAnoms[recentAnoms.length-1];
  const causes = suggestRootCauses(latestAnom.metricIdx);

  let severityText = latestAnom.severity === 'high' ? 'CRITICAL' : latestAnom.severity === 'mid' ? 'WARNING' : 'INFO';
  let verdictColor = latestAnom.severity === 'high' ? '#f85149' : latestAnom.severity === 'mid' ? '#d29922' : '#58a6ff';
  document.getElementById('verdictDisplay').innerHTML = `<span style="color:${verdictColor};font-weight:600">${severityText}</span> anomaly on <span style="color:#58a6ff">${CONFIG.metricNames[latestAnom.metricIdx]}</span> (${latestAnom.type}, score=${latestAnom.score.toFixed(2)})`;
  document.getElementById('footerVerdict').textContent = severityText === 'CRITICAL' ? 'Anomaly detected — investigate' : severityText === 'WARNING' ? 'Elevated deviation' : 'Minor anomaly';

  let html = '';
  // Primary anomaly
  html += `<div class="cause-item level-0"><span class="metric-name">${CONFIG.metricNames[latestAnom.metricIdx]}</span> <span class="metric-score">${latestAnom.score.toFixed(2)}</span> <span style="color:#8b949e;font-size:10px">${latestAnom.type} | ${latestAnom.severity}</span></div>`;

  if (causes.length === 0) {
    html += '<div style="color:#484f58;font-size:11px;padding:4px 8px">No correlated precursors found</div>';
  } else {
    for (const cause of causes) {
      html += `<div class="cause-item level-${Math.min(cause.lag,2)}"><span class="metric-name">${CONFIG.metricNames[cause.metricIdx]}</span> <span class="metric-lag">lag: ${cause.lag} tick${cause.lag>1?'s':''}</span> <span class="metric-score">${cause.corr.toFixed(3)}</span></div>`;
    }
  }
  container.innerHTML = html;
}

// --- Correlation Matrix ---
function renderCorrMatrix() {
  const container = document.getElementById('corrMatrix');
  if (state.history.length < 8) {
    container.innerHTML = '<div style="color:#484f58;font-size:12px;padding:8px">Need more data points...</div>';
    return;
  }
  const mat = buildCorrelationMatrix();
  const n = CONFIG.metricNames.length;
  container.style.gridTemplateColumns = `repeat(${n}, 28px)`;
  container.style.gridTemplateRows = `repeat(${n}, 28px)`;

  let html = '';
  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      const {corr,lag} = mat[r][c];
      // color: blue=-1, white=0, red=1
      const norm = (corr + 1) / 2;
      const rVal = Math.round(255 * Math.max(0, 2*norm-1));
      const bVal = Math.round(255 * Math.max(0, 1-2*norm));
      const color = `rgb(${rVal},80,${bVal})`;
      html += `<div class="corr-cell" style="background:${color}" title="${CONFIG.metricNames[r]} vs ${CONFIG.metricNames[c]}: r=${corr.toFixed(3)}, lag=${lag}">${lag>0?lag:''}</div>`;
    }
  }
  container.innerHTML = html;

  // Legend
  const legend = document.createElement('div');
  legend.style.cssText = 'display:flex;gap:8px;margin-top:6px;font-size:9px;color:#8b949e';
  legend.innerHTML = '<span style="color:#ff5050">+1</span> <span style="color:#ccc">0</span> <span style="color:#5050ff">-1</span> <span style="margin-left:8px">Lag in cells</span>';
  const existingLegend = container.parentElement.querySelector('.corr-legend');
  if (existingLegend) existingLegend.remove();
  legend.className = 'corr-legend';
  container.parentElement.appendChild(legend);
}

// ============================================================
// MAIN LOOP — in-place diff update, no full rebuilds
// ============================================================
function addTick() {
  const tick = generateTick();
  state.history.push(tick);
  if (state.history.length > 100) state.history.shift();

  // Detect anomalies per metric
  const metricHistory = CONFIG.metricNames.map((_,idx) => state.history.map(h => h.metrics[idx]));
  for (let i = 0; i < CONFIG.metricNames.length; i++) {
    const h = metricHistory[i];
    if (h.length < 5) continue;
    const lastVal = h[h.length-1];
    const result = detectAnomaly(lastVal, h.slice(0,-1), i);
    if (result) {
      const cooldownKey = i;
      if ((state.alertCooldowns[cooldownKey]||0) < state.tick) {
        state.anomalyLog.push({time: tick.time, metricIdx: i, score: result.score, type: result.type, severity: result.severity});
        state.alertCooldowns[cooldownKey] = state.tick + CONFIG.alertCooldown;
      }
    }
  }

  // Trim anomaly log
  if (state.anomalyLog.length > 200) state.anomalyLog.splice(0, state.anomalyLog.length - 200);

  // Update status bar
  document.getElementById('anomalyCount').textContent = state.anomalyLog.filter(a => a.time > state.tick-20).length;
  document.getElementById('lastTick').textContent = 't-'+Math.min(state.tick, state.history.length-1);
  document.getElementById('metricCount').textContent = CONFIG.metricNames.length;

  const recentAnoms = state.anomalyLog.filter(a => a.time > state.tick - CONFIG.windowSize);
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + (recentAnoms.length > 0 ? 'alert' : 'ok');

  // Render — only update dirty sections
  renderDriftChart();
  renderHeatmap();
  renderRootCauses();
  renderCorrMatrix();
}

// ============================================================
// BOOT
// ============================================================
let intervalId = setInterval(addTick, CONFIG.updateIntervalMs);

// Add initial burst
for (let i = 0; i < 30; i++) addTick();

// Handle resize
window.addEventListener('resize', () => { renderDriftChart(); renderHeatmap(); });

console.log('Anomaly Detection Visualizer v1.0 — active');
console.log('Config:', CONFIG);
</script>
