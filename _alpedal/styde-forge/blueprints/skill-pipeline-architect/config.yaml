agent:
  max_iterations: 10
  retry_on_failure: true
  timeout_seconds: 600
  toolsets:
  - terminal
  - file
  - web
  skills:
  - skill-analyzer
  - pipeline-designer
  - error-boundary-designer
  - state-contract-designer
  - pipeline-composer
  - pipeline-validator
  - pipeline-tester
  load_all_skills: false
blueprint:
  dependencies: []
  domain: skills-opt
  last_reviewed: '2026-06-26'
  name: skill-pipeline-architect
  version: 3.0.0
  version_history:
  - from: 1.0.0
    to: 2.0.0
    reason: 'MAJOR: skill pipeline engine with parallel execution, error boundaries,
      state contracts'
    score: null
    previous_score: null
    timestamp: '2026-06-26T00:00:00Z'
  - from: 2.0.0
    to: 3.0.0
    reason: 'MAJOR: quality gate passed (score=87.2)'
    score: 87.2
    previous_score: null
    timestamp: '2026-06-26T01:56:05Z'
eval:
  benchmarks: []
  judge_model: deepseek-v4-pro
  min_pass_score: 70
hardware_profiles:
  pontus-main:
    eval_model: deepseek-v4-pro
    max_tokens: 8192
    model: deepseek-v4-flash
    provider: deepseek
    temperature: 0.3
pipeline:
  name: skill-pipeline-architect
  version: '2.0'
  description: Multi-skill pipeline for designing, composing, and testing skill pipelines
  blueprint: skill-pipeline-architect
  timeout: 600
  error: halt
  steps:
  - id: analyze-skills
    skill: skill-analyzer
    error: halt
  - id: design-pipeline
    skill: pipeline-designer
    error: halt
  - parallel:
    - id: design-error-boundaries
      skill: error-boundary-designer
      depends_on:
      - design-pipeline
      error: skip
    - id: design-state-contracts
      skill: state-contract-designer
      depends_on:
      - design-pipeline
      error: retry
      max_retries: 2
  - id: compose-pipeline
    skill: pipeline-composer
    depends_on:
    - design-error-boundaries
    - design-state-contracts
    error: halt
  - id: validate-pipeline
    skill: pipeline-validator
    depends_on:
    - compose-pipeline
    error: halt
  - id: integration-test
    skill: pipeline-tester
    depends_on:
    - validate-pipeline
    error: retry
    max_retries: 1
    fallback_step: validate-pipeline
