agent:
  max_iterations: 10
  retry_on_failure: true
  timeout_seconds: 600
  toolsets:
  - terminal
  - file
  - web
  skills:
  - otel-collector-deployer
  - tempo-tracing-setup
  - loki-log-aggregator
  - mimir-metrics-engineer
  - slo-manager
  load_all_skills: false
blueprint:
  dependencies:
  - container-orchestrator
  - sre-practice-builder
  domain: devops
  last_reviewed: '2026-06-26'
  name: observability-platform-builder
  version: 2.0.0
  version_history:
  - from: null
    to: 1.0.0
    reason: 'INITIAL: LGTM stack with OpenTelemetry, Tempo, Loki, Mimir, Grafana SLOs'
    score: null
    previous_score: null
    timestamp: '2026-06-26T00:00:00Z'
  - from: 1.0.0
    to: 2.0.0
    reason: 'MAJOR: quality gate passed (score=86.2)'
    score: 86.2
    previous_score: null
    timestamp: '2026-06-26T01:55:50Z'
eval:
  benchmarks: []
  judge_model: deepseek-v4-pro
  min_pass_score: 70
hardware_profiles:
  pontus-main:
    eval_model: deepseek-v4-pro
    max_tokens: 8192
    model: deepseek-v4-flash
    provider: deepseek
    temperature: 0.3
pipeline:
  name: observability-platform-builder
  version: '1.0'
  description: Build a full LGTM observability stack with OpenTelemetry ingestion,
    Tempo tracing, Loki logs, Mimir metrics, and Grafana SLO dashboards
  blueprint: observability-platform-builder
  timeout: 600
  error: halt
  steps:
  - id: deploy-otel-collector
    skill: otel-collector-deployer
    error: halt
  - id: setup-tempo-tracing
    skill: tempo-tracing-setup
    depends_on:
    - deploy-otel-collector
    error: halt
  - id: configure-loki-logs
    skill: loki-log-aggregator
    depends_on:
    - deploy-otel-collector
    error: retry
    max_retries: 2
  - id: deploy-mimir-metrics
    skill: mimir-metrics-engineer
    depends_on:
    - deploy-otel-collector
    error: retry
    max_retries: 2
  - id: define-slos
    skill: slo-manager
    depends_on:
    - setup-tempo-tracing
    - configure-loki-logs
    - deploy-mimir-metrics
    error: halt
