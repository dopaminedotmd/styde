<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE CRUCIBLE — StydeForge</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   THE CRUCIBLE  —  Living Industrial Forge Interface
   
   Not a dashboard. A forge furnace wearing data as its skin.
   
   AGENTS: 22 refinery + 8 production blueprint agents consulted.
   Concept: Raw steel meets bioluminescent data streams.
   ═══════════════════════════════════════════════════════════════ */
:root{
  --void:#020208;
  --steel:#0c0c18;
  --iron:#141428;
  --ember-soft:rgba(240,160,16,0.06);
  --ember-mid:rgba(240,160,16,0.15);
  --ember-bright:rgba(240,160,16,0.35);
  --forge-amber:#F0A010;
  --forge-glow:0 0 20px rgba(240,160,16,0.3);
  --spark:#FFC040;
  --cool-indigo:#6C6CF0;
  --cool-glow:0 0 16px rgba(108,108,240,0.25);
  --violet:#9B6DFF;
  --cool-emerald:#22C55E;
  --cool-emerald-glow:0 0 14px rgba(34,197,94,0.25);
  --danger:#F04444;
  
  --text-bright:#F0F0FA;
  --text-mid:#B0B0D0;
  --text-dim:#686898;
  --text-faint:#3A3A5C;
  
  --border-subtle:rgba(255,255,255,0.04);
  --border-mid:rgba(255,255,255,0.07);
  --border-bright:rgba(255,255,255,0.12);
  
  --sans:'Geist',system-ui,sans-serif;
  --mono:'Geist Mono',monospace;
  
  --e-spring:cubic-bezier(0.34,1.56,0.64,1);
  --e-smooth:cubic-bezier(0.32,0.72,0,1);
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
html{zoom:1.25}
body{
  background:var(--void);
  color:var(--text-bright);
  font-family:var(--sans);
  font-size:13px;font-weight:400;line-height:1.4;
  -webkit-font-smoothing:antialiased;
}

/* ════════════════════ CANVAS PARTICLES ════════════════════ */
#particle-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.7}

/* ════════════════════ ATMOSPHERE ════════════════════ */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background:
    radial-gradient(ellipse 50% 30% at 35% 25%, rgba(240,160,16,0.03) 0%, transparent 60%),
    radial-gradient(ellipse 40% 35% at 68% 55%, rgba(108,108,240,0.025) 0%, transparent 55%),
    radial-gradient(ellipse 60% 20% at 50% 100%, rgba(108,108,240,0.015) 0%, transparent 50%);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  border:1px solid rgba(255,255,255,0.015);
  border-radius:0;
}

/* ════════════════════ TOP STATUS BAR ════════════════════ */
#top-strip{
  position:relative;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  height:46px;padding:0 24px;
  background:linear-gradient(180deg,rgba(10,10,22,0.98) 0%,rgba(10,10,22,0.6) 100%);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border-subtle);
}
#top-strip .brand-block{display:flex;align-items:center;gap:10px}
#top-strip .forge-mark{
  width:30px;height:30px;
  background:linear-gradient(145deg,var(--forge-amber),#C07000);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:13px;color:#0a0a0a;
  box-shadow:0 0 14px var(--ember-mid);
}
#top-strip .brand-text{font-size:15px;font-weight:700;letter-spacing:-0.02em}
#top-strip .brand-div{color:var(--text-faint);margin:0 4px}
#top-strip .brand-muted{font-size:11px;color:var(--text-dim);font-weight:400;letter-spacing:0.06em}

#top-strip .metric-row{display:flex;gap:32px;align-items:center}
.metric{text-align:center;position:relative}
.metric .m-value{
  font-size:18px;font-weight:800;font-family:var(--mono);
  line-height:1.1;color:var(--text-bright);
  transition:color 0.6s var(--e-smooth);
}
.metric .m-label{font-size:8px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.14em;margin-top:1px}

#top-strip .pulse-pill{
  display:flex;align-items:center;gap:8px;padding:5px 16px;
  border-radius:999px;background:rgba(10,10,22,0.7);
  border:1px solid var(--border-mid);font-size:11px;font-weight:500;
}
#forge-beat{width:7px;height:7px;border-radius:50%;background:var(--text-faint);transition:all 0.5s}
#forge-beat.live{background:var(--forge-amber);box-shadow:0 0 10px var(--ember-bright);animation:beat 1s ease-in-out infinite}
@keyframes beat{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:0.6}}

/* ════════════════════ MAIN LAYOUT — ASYMMETRIC ════════════════════ */
#workshop{
  position:relative;z-index:40;
  display:grid;
  grid-template-columns:340px 1fr 320px;
  grid-template-rows:0.75fr auto 1.25fr;
  gap:8px;padding:8px;
  height:calc(100% - 46px - 28px);
}

/* ════════════════════ PANEL BASE ════════════════════ */
.forge-block{
  background:linear-gradient(180deg,rgba(12,12,24,0.9) 0%,rgba(8,8,18,0.95) 100%);
  border:1px solid var(--border-subtle);
  position:relative;overflow:hidden;display:flex;flex-direction:column;
}
.forge-block::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.05),transparent);
  z-index:2;
}
.block-hdr{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px 8px;
  border-bottom:1px solid var(--border-subtle);
  flex-shrink:0;position:relative;z-index:3;
  background:rgba(0,0,0,0.2);
}
.block-hdr .bh-label{
  font-size:9px;font-weight:800;text-transform:uppercase;
  letter-spacing:0.16em;color:var(--text-dim);
}
.block-hdr .bh-badge{
  font-size:9px;font-weight:600;padding:2px 8px;border-radius:999px;
  background:rgba(108,108,240,0.06);border:1px solid rgba(108,108,240,0.12);
  color:var(--cool-indigo);margin-left:auto;
}
.block-body{
  flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 14px 12px;position:relative;z-index:2;
}
.block-body::-webkit-scrollbar{width:2px}
.block-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.03)}

/* Grid placement */
#furnace-block{grid-row:1/3;grid-column:1}
#cascade-block{grid-row:1/4;grid-column:2}
#instruments-block{grid-row:1;grid-column:3}
#terminal-block{grid-row:2;grid-column:3}
#skills-block{grid-row:3;grid-column:3}

/* ════════════════════ THE FURNACE (Forge Core) ════════════════════ */
.furnace-zone{
  border-radius:4px;padding:16px 18px;margin-bottom:6px;
  position:relative;overflow:hidden;
  border:1px solid var(--border-subtle);
  transition:all 0.6s var(--e-smooth);
}
.furnace-zone .fz-glow{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 1s var(--e-smooth)}
.furnace-zone .fz-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;position:relative;z-index:1}
.furnace-zone .fz-label{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}
.furnace-zone .fz-count{font-size:22px;font-weight:800;font-family:var(--mono);line-height:1}
.furnace-zone .fz-bar-outer{height:3px;border-radius:2px;background:rgba(255,255,255,0.02);overflow:hidden;position:relative;z-index:1}
.furnace-zone .fz-bar-inner{height:100%;transition:width 0.8s var(--e-spring)}

/* Refinery — molten hot */
.zone-refinery{border-left:4px solid rgba(240,160,16,0.3)}
.zone-refinery .fz-label{color:var(--forge-amber)}
.zone-refinery .fz-glow{background:radial-gradient(ellipse at 10% 50%,rgba(240,160,16,0.06),transparent 70%)}
.zone-refinery .fz-bar-inner{background:linear-gradient(90deg,rgba(240,160,16,0.7),rgba(240,160,16,0.2),transparent);box-shadow:0 0 6px rgba(240,160,16,0.2)}
/* Production — tempered emerald */
.zone-production{border-left:4px solid rgba(34,197,94,0.25)}
.zone-production .fz-label{color:var(--cool-emerald)}
.zone-production .fz-glow{background:radial-gradient(ellipse at 10% 50%,rgba(34,197,94,0.04),transparent 70%)}
.zone-production .fz-bar-inner{background:linear-gradient(90deg,rgba(34,197,94,0.5),rgba(34,197,94,0.15),transparent);box-shadow:0 0 4px rgba(34,197,94,0.15)}
/* Archive — cooled */
.zone-archive{border-left:4px solid rgba(255,255,255,0.06)}
.zone-archive .fz-label{color:var(--text-dim)}
.zone-archive .fz-glow{background:radial-gradient(ellipse at 10% 50%,rgba(255,255,255,0.015),transparent 70%)}
.zone-archive .fz-bar-inner{background:linear-gradient(90deg,rgba(255,255,255,0.05),transparent)}

/* Forge vitals */
.forge-vitals{margin-top:12px;padding-top:10px;border-top:1px solid var(--border-subtle)}
.fv-row{display:flex;justify-content:space-between;font-size:10px;padding:3px 0;color:var(--text-dim)}
.fv-row .fv-val{color:var(--text-mid);font-weight:500;font-family:var(--mono);font-size:10px}
.fv-section-label{font-size:8px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;margin-top:10px;font-weight:700}

/* Controls integrated into furnace */
.furnace-controls{margin-top:10px;padding-top:10px;border-top:1px solid var(--border-subtle)}
.fc-label{font-size:8px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;font-weight:700}
.fc-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.fc-btn{
  display:flex;align-items:center;justify-content:center;gap:5px;
  padding:8px 10px;border:1px solid var(--border-mid);
  background:rgba(8,8,18,0.8);color:var(--text-mid);
  font-family:var(--sans);font-size:10px;font-weight:600;cursor:pointer;
  transition:all 0.2s var(--e-smooth);position:relative;
}
.fc-btn:hover{border-color:var(--forge-amber);color:var(--forge-amber);background:var(--ember-soft);box-shadow:0 0 12px rgba(240,160,16,0.05)}
.fc-btn.go{border-color:rgba(240,160,16,0.3);background:var(--ember-soft);color:var(--forge-amber)}
.fc-btn.go:hover{border-color:var(--forge-amber);background:rgba(240,160,16,0.1)}
.fc-btn .fc-icon{font-size:14px;line-height:1}
.fc-input{
  width:100%;padding:7px 10px;background:rgba(5,5,15,0.9);border:1px solid var(--border-mid);
  color:var(--text-bright);font-family:var(--sans);font-size:10px;margin-top:6px;
  transition:border-color 0.2s var(--e-smooth);
}
.fc-input:focus{border-color:var(--cool-indigo);outline:none}
.fc-input::placeholder{color:var(--text-faint)}
.fc-toggle-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:10px;color:var(--text-dim);margin-top:6px}
.fc-toggle{position:relative;width:34px;height:18px;cursor:pointer;flex-shrink:0}
.fc-toggle input{opacity:0;width:0;height:0}
.fc-toggle-track{position:absolute;inset:0;background:rgba(255,255,255,0.06);border-radius:9px;transition:0.3s}
.fc-toggle-track::after{content:'';position:absolute;width:14px;height:14px;left:2px;top:2px;background:var(--text-dim);border-radius:50%;transition:0.3s}
.fc-toggle input:checked+.fc-toggle-track{background:var(--ember-soft)}
.fc-toggle input:checked+.fc-toggle-track::after{transform:translateX(16px);background:var(--forge-amber)}

/* ════════════════════ ACTIVITY CASCADE ════════════════════ */
.cascade-entry{
  padding:8px 10px;margin-bottom:2px;
  border-left:3px solid transparent;
  transition:all 0.3s var(--e-smooth);
  animation:cascadeIn 0.4s var(--e-spring) both;
  position:relative;
}
@keyframes cascadeIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.cascade-entry.running{border-left-color:var(--forge-amber);background:rgba(240,160,16,0.01)}
.cascade-entry.complete{border-left-color:var(--cool-emerald)}
.cascade-entry.failed{border-left-color:var(--danger);background:rgba(240,68,68,0.01)}
.ce-top{display:flex;align-items:center;gap:8px;justify-content:space-between}
.ce-name{font-size:11px;font-weight:600;color:var(--text-mid)}
.ce-tag{font-size:7px;padding:2px 7px;border-radius:999px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em}
.tag-spawn{background:rgba(108,108,240,0.1);color:var(--cool-indigo)}
.tag-eval{background:var(--ember-soft);color:var(--forge-amber)}
.tag-improve{background:rgba(34,197,94,0.08);color:var(--cool-emerald)}
.tag-loop{background:rgba(155,109,255,0.08);color:var(--violet)}
.tag-config{background:rgba(255,255,255,0.02);color:var(--text-dim)}
.ce-detail{font-size:9px;color:var(--text-faint);margin-top:1px}
.ce-time{font-size:8px;color:var(--text-faint);font-family:var(--mono)}
.ce-xp-outer{height:3px;background:rgba(255,255,255,0.015);margin-top:4px;overflow:hidden}
.ce-xp-inner{height:100%;transition:width 0.6s var(--e-spring)}
.ce-xp-inner.running{background:linear-gradient(90deg,var(--forge-amber),var(--violet));background-size:150% 100%;animation:shimmer 1.2s ease-in-out infinite}
.ce-xp-inner.complete{background:linear-gradient(90deg,var(--cool-emerald),transparent)}
.ce-xp-inner.failed{background:var(--danger)}
@keyframes shimmer{0%{background-position:150% 0}100%{background-position:-50% 0}}

/* ════════════════════ INSTRUMENTS (GPU) ════════════════════ */
.instrument{
  padding:14px 16px;margin-bottom:8px;
  border:1px solid var(--border-subtle);
  position:relative;
  transition:all 0.4s var(--e-smooth);
}
.instrument:hover{border-color:var(--border-mid)}
.instrument .ins-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.instrument .ins-name{font-size:11px;font-weight:600}
.instrument .ins-model{font-size:9px;color:var(--text-dim)}
.instrument .ins-row{display:flex;align-items:center;gap:14px}
.instrument .ins-gauge{cursor:default}
.instrument .ins-stats{display:flex;flex-direction:column;gap:4px;flex:1;font-size:9px;font-family:var(--mono)}
.ins-stat{display:flex;justify-content:space-between;color:var(--text-dim)}
.ins-stat .ins-val{color:var(--text-mid);font-weight:500}
.ins-minibar{height:2px;background:rgba(255,255,255,0.02);margin-top:2px;overflow:hidden}
.ins-minibar .ins-fill{height:100%;transition:width 1s var(--e-smooth)}
.ins-fill-load{background:linear-gradient(90deg,var(--cool-indigo),var(--violet))}
.ins-fill-vram{background:linear-gradient(90deg,var(--forge-amber),#C07000)}

/* System row */
.sys-block{border-top:1px solid var(--border-subtle);padding-top:8px;margin-top:4px}
.sys-row{display:flex;justify-content:space-between;font-size:9px;padding:2px 0;color:var(--text-dim)}
.sys-row .sys-val{color:var(--text-mid);font-family:var(--mono);font-size:9px}

/* ════════════════════ SKILL NODES ════════════════════ */
.skill-nodes{display:flex;flex-wrap:wrap;gap:4px}

/* ════════════════════ FORGE TERMINAL ════════════════════ */
#terminal-block{max-height:280px;min-height:160px}
#terminal-block .block-body{
  font-family:'Cascadia Code','Fira Code','JetBrains Mono',var(--mono);
  font-size:10px;line-height:1.5;
  color:#22C55E;
  background:rgba(2,8,2,0.9);
  padding:8px 12px;
  white-space:pre-wrap;word-break:break-all;
}
.term-line{display:flex;gap:8px}
.term-prompt{color:#22C55E;font-weight:700;flex-shrink:0}
.term-cmd{color:#F0F0FA}
.term-out{color:#686898;margin-left:16px}
.term-ok{color:#22C55E;margin-left:16px}
.term-err{color:#F04444;margin-left:16px}
.term-dim{color:#3A5A3A}
.skill-node{
  display:flex;align-items:center;gap:5px;
  padding:5px 8px;border:1px solid var(--border-subtle);
  font-size:9px;color:var(--text-mid);cursor:pointer;
  transition:all 0.2s var(--e-smooth);
  background:rgba(255,255,255,0.003);
  white-space:nowrap;
}
.skill-node:hover{
  border-color:var(--cool-indigo);color:var(--cool-indigo);
  background:rgba(108,108,240,0.04);transform:translateY(-1px);
  box-shadow:0 2px 10px rgba(108,108,240,0.06);
}
.skill-node .sn-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.skill-node .sn-name{font-weight:500}
.skill-node .sn-score{font-size:8px;font-family:var(--mono);color:var(--text-dim);font-weight:600}

/* ════════════════════ SKILL MODAL ════════════════════ */
#skill-modal{
  position:fixed;inset:0;z-index:200;
  background:rgba(2,2,8,0.85);backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;
}
#skill-modal.open{display:flex}
#skill-modal .modal-panel{
  background:var(--iron);border:1px solid var(--border-mid);
  width:min(560px,90vw);max-height:75vh;overflow-y:auto;
  padding:24px;position:relative;
  box-shadow:0 24px 80px rgba(0,0,0,0.7);
}
#skill-modal .modal-close{
  position:absolute;top:12px;right:14px;
  background:none;border:1px solid var(--border-mid);color:var(--text-dim);
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;transition:all 0.2s;
}
#skill-modal .modal-close:hover{border-color:var(--danger);color:var(--danger)}
#skill-modal .modal-name{font-size:16px;font-weight:700;margin-bottom:2px}
#skill-modal .modal-badge{font-size:9px;padding:3px 10px;border-radius:999px;font-weight:600;display:inline-block;margin-bottom:14px}
#skill-modal .modal-section{margin-top:16px}
#skill-modal .modal-section-title{font-size:8px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;font-weight:700}
.modal-run{display:flex;gap:8px;padding:4px 6px;font-size:9px;border:1px solid transparent;align-items:center}
.modal-run:hover{border-color:var(--border-subtle)}
.modal-run .mr-score{width:28px;font-weight:700;font-family:var(--mono);font-size:10px}
.modal-run .mr-id{font-family:var(--mono);color:var(--text-faint);flex:1}
.modal-output-preview{font-size:9px;color:var(--text-dim);padding:10px;background:rgba(5,5,15,0.6);max-height:100px;overflow-y:auto;font-family:var(--mono);line-height:1.4}

/* ════════════════════ BOTTOM BAR ════════════════════ */
#bottom-bar{
  position:relative;z-index:50;
  display:flex;align-items:center;gap:16px;
  height:28px;padding:0 18px;
  background:linear-gradient(0deg,rgba(10,10,22,0.98) 0%,rgba(10,10,22,0.6) 100%);
  backdrop-filter:blur(16px);
  border-top:1px solid var(--border-subtle);
  font-size:9px;color:var(--text-dim);font-family:var(--mono);
}
#bottom-bar .bb-led{width:4px;height:4px;border-radius:50%;background:var(--cool-indigo);box-shadow:0 0 5px rgba(108,108,240,0.4)}
#bb-message{font-size:9px;color:var(--forge-amber);font-weight:600;opacity:0;transition:opacity 0.3s}
#bb-message.show{opacity:1}

/* ════════════════════ RESPONSIVE ════════════════════ */
@media(max-width:1200px){#workshop{grid-template-columns:280px 1fr 280px;gap:6px;padding:6px}}
@media(max-width:900px){#workshop{grid-template-columns:1fr 1fr;grid-template-rows:auto}#furnace-block{grid-row:1/3;grid-column:1}#cascade-block{grid-row:1/3;grid-column:2}#instruments-block,#terminal-block,#skills-block{grid-row:auto;grid-column:1/3;max-height:280px}}
@media(max-width:600px){#workshop{grid-template-columns:1fr;overflow-y:auto}.forge-block{max-height:350px}}
</style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<!-- ═══════════ TOP STRIP ═══════════ -->
<div id="top-strip">
  <div class="brand-block">
    <div class="forge-mark">F</div>
    <span class="brand-text">THE CRUCIBLE</span>
    <span class="brand-div">/</span>
    <span class="brand-muted">StydeForge</span>
  </div>
  <div class="metric-row">
    <div class="metric"><div class="m-value" id="k-agents">--</div><div class="m-label">Agents</div></div>
    <div class="metric"><div class="m-value" id="k-loops">--</div><div class="m-label">Loops</div></div>

</div>

<!-- ═══════════ WORKSHOP ═══════════ -->
<div id="workshop">

  <!-- FURNACE: Forge Core + Pipeline + Controls -->
  <div class="forge-block" id="furnace-block">
    <div class="block-hdr"><span class="bh-label">The Furnace</span><span class="bh-badge" id="bh-pipe">--</span></div>
    <div class="block-body">
      <div id="pipeline-zones"></div>
      <div class="forge-vitals" id="forge-vitals"></div>
      <div class="furnace-controls">
        <div class="fc-label">Bellows (Controls)</div>
        <div class="fc-grid">
          <button class="fc-btn go" onclick="apiSpawn()"><span class="fc-icon">+</span>Spawn</button>
          <button class="fc-btn" onclick="apiEval()"><span class="fc-icon">&#9654;</span>Eval</button>
          <button class="fc-btn" onclick="apiImprove()"><span class="fc-icon">&#8657;</span>Improve</button>

  </div>

  <!-- CASCADE: Activity Feed -->

  <!-- INSTRUMENTS: GPU + Hardware -->
  <div class="forge-block" id="instruments-block">
    <div class="block-hdr"><span class="bh-label">Instruments</span><span class="bh-badge" id="bh-hw">--</span></div>

  </div>

  <!-- FORGE TERMINAL -->
  <div class="forge-block" id="terminal-block">
    <div class="block-hdr"><span class="bh-label">Forge Terminal</span><span class="bh-badge" style="color:#22C55E;background:rgba(34,197,94,0.06);border-color:rgba(34,197,94,0.12)">LIVE</span></div>
    <div class="block-body" id="terminal-body">
      <div class="term-line"><span class="term-prompt">forge$</span><span class="term-dim">waiting for input...</span></div>
    </div>

    <div class="block-hdr">
      <span class="bh-label">Skill Nodes</span>
      <input id="skill-search" placeholder="Filter..." style="background:rgba(5,5,15,0.9);border:1px solid var(--border-subtle);padding:3px 8px;color:var(--text-bright);font-family:var(--sans);font-size:9px;width:80px;margin-left:auto" oninput="renderSkills(prevData||{skills:[]})">
      <span class="bh-badge" id="bh-skills">--</span>

</div>

<!-- ═══════════ BOTTOM BAR ═══════════ -->
<div id="bottom-bar">
  <div class="bb-led"></div>
  <span id="bb-stats">--</span>

  <span style="margin-left:auto" id="bb-clock">--</span>
</div>

<!-- ═══════════ SKILL MODAL ═══════════ -->
<div id="skill-modal" onclick="if(event.target===this)closeSkillModal()">
  <div class="modal-panel" id="modal-content">
    <button class="modal-close" onclick="closeSkillModal()">&#x2715;</button>
    <div class="modal-name" id="modal-name">--</div>
    <div class="modal-badge" id="modal-badge">--</div>
    <div class="modal-section"><div class="modal-section-title">Runs</div><div id="modal-runs"></div></div>
    <div class="modal-section"><div class="modal-section-title">Latest Output</div><div class="modal-output-preview" id="modal-output"></div></div>
  </div>

<script>
/* ═══════════════════════════════════════════════════════════
   THE CRUCIBLE ENGINE
   
   Particle system + smart-diff + cascading activity feed
   + forge furnace visualization + skill nodes + GPU gauges
   ═══════════════════════════════════════════════════════════ */
const API='/api/state';
let prevData=null,autoRefresh=true,rt=null;
let particleActive=0;
let completedTimes={}; // track when entries became complete → auto-remove after 5s

/* ─── PARTICLE SYSTEM ─── */
(function(){
  const c=document.getElementById('particle-canvas');
  const ctx=c.getContext('2d');
  let w,h,particles=[];
  const MAX=80;
  
  function resize(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  
  function spawn(){return{x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3-0.2,life:Math.random()*200+50,alpha:Math.random()*0.4+0.1,size:Math.random()*1.5+0.5}}
  
  for(let i=0;i<MAX;i++)particles.push(spawn());
  
  function draw(){
    ctx.clearRect(0,0,w,h);
    const active=Math.floor(particleActive*MAX);
    for(let i=0;i<particles.length;i++){
      const p=particles[i];
      if(i<active){
        p.x+=p.vx;p.y+=p.vy;p.life--;
        if(p.life<=0||p.y<-10||p.y>h+10||p.x<-10||p.x>w+10)particles[i]=spawn();
        const glow=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*2);
        glow.addColorStop(0,`rgba(240,160,16,${p.alpha})`);
        glow.addColorStop(0.5,`rgba(108,108,240,${p.alpha*0.5})`);
        glow.addColorStop(1,'transparent');
        ctx.fillStyle=glow;ctx.fillRect(p.x-p.size*2,p.y-p.size*2,p.size*4,p.size*4);
      }else{
        // Cold particles
        p.x+=p.vx*0.5;p.y+=p.vy*0.3;
        ctx.fillStyle=`rgba(108,108,240,${p.alpha*0.2})`;
        ctx.fillRect(p.x,p.y,p.size,p.size);
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ─── GPU GAUGE SVG ─── */
const GR=20,GC=2*Math.PI*GR;
function gaugeSvg(temp,maxT,id){
  const p=Math.min(temp/maxT,1),o=GC*(1-p);
  const c=temp>80?'var(--danger)':temp>60?'var(--forge-amber)':'var(--cool-indigo)';
  const glow=temp>80?'drop-shadow(0 0 12px rgba(240,68,68,0.4))':temp>60?'drop-shadow(0 0 8px rgba(240,160,16,0.3))':'drop-shadow(0 0 6px rgba(108,108,240,0.2))';
  return`<svg class="ins-gauge" width="58" height="58" viewBox="0 0 58 58">
    <circle cx="29" cy="29" r="${GR}" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="3"/>
    <circle cx="29" cy="29" r="${GR}" fill="none" stroke="${c}" stroke-width="3" stroke-linecap="round"
      stroke-dasharray="${GC}" stroke-dashoffset="${o}" transform="rotate(-90 29 29)" id="gf-${id}"
      style="transition:stroke-dashoffset 1.2s var(--e-smooth);filter:${glow}"/>
    <text x="29" y="29" text-anchor="middle" dominant-baseline="central" font-family="var(--mono)" font-size="13" font-weight="700" fill="var(--text-bright)" id="gt-${id}">${Math.round(temp)}°</text>
    <text x="29" y="45" text-anchor="middle" font-family="var(--sans)" font-size="7" fill="var(--text-faint)">TEMP</text>
  </svg>`;
}

/* ─── SCORE COLOR ─── */
function scrClr(s){return s>=85?'var(--cool-emerald)':s>=60?'var(--forge-amber)':s>=40?'var(--text-mid)':'var(--text-dim)'}
function dotClr(stage){return stage==='production'?'var(--cool-emerald)':stage==='archive'?'var(--text-faint)':'var(--forge-amber)'}

/* ─── HELPERS ─── */
function tt(id,v){const e=document.getElementById(id);if(e&&e.textContent!==String(v))e.textContent=v}
function tw(id,p){const e=document.getElementById(id);if(e)e.style.width=p+'%'}

/* ─── RENDER STATIC ─── */
function renderStatic(){
  document.getElementById('pipeline-zones').innerHTML=`
    <div class="furnace-zone zone-refinery"><div class="fz-glow"></div>
      <div class="fz-top"><span class="fz-label">Refinery</span><span class="fz-count" id="ct-ref">--</span></div>
      <div class="fz-bar-outer"><div class="fz-bar-inner" id="bar-ref" style="width:0"></div></div></div>
    <div class="furnace-zone zone-production"><div class="fz-glow"></div>
      <div class="fz-top"><span class="fz-label">Production</span><span class="fz-count" id="ct-prod">--</span></div>
      <div class="fz-bar-outer"><div class="fz-bar-inner" id="bar-prod" style="width:0"></div></div></div>
    <div class="furnace-zone zone-archive"><div class="fz-glow"></div>
      <div class="fz-top"><span class="fz-label">Archive</span><span class="fz-count" id="ct-arch">--</span></div>
      <div class="fz-bar-outer"><div class="fz-bar-inner" id="bar-arch" style="width:0"></div></div></div>`;
  document.getElementById('forge-vitals').innerHTML=`
    <div class="fv-section-label">Forge Vitals</div>
    <div class="fv-row"><span>Codename</span><span class="fv-val" id="fv-codename">--</span></div>
    <div class="fv-row"><span>Version</span><span class="fv-val" id="fv-version">--</span></div>
    <div class="fv-row"><span>Checkpoint</span><span class="fv-val" id="fv-checkpoint">--</span></div>
    <div class="fv-row"><span>Caveman</span><span class="fv-val" id="fv-caveman">--</span></div>`;
}

/* ─── UPDATE: Top Strip ─── */
function updTop(d){
  const f=d.forge||{};tt('k-agents',f.total_agents||0);tt('k-loops',f.loop_iterations||0);tt('k-evals',f.total_evaluations||0);
  tt('k-skills',(d.skills||[]).length);
  const g=(d.hardware||{}).gpus||[];tt('k-gpu',g.length>0?(parseFloat(g[0].load_pct)||0)+'%':'--');
  const cnt=(d.pipeline||{}).refinery+(d.pipeline||{}).production||0;
  tt('forge-status-text',cnt>0?`Active \u00b7 ${cnt} agents`:'Idle');
  const beat=document.getElementById('forge-beat');
  beat.className=(f.is_working||cnt>0)?'live':'';
  // Particle activity
  particleActive=(cnt>10?0.8:cnt>0?0.4:0.15);
  const cv=document.getElementById('caveman-tgl');
  if(cv&&cv.checked!==f.caveman_ultra)cv.checked=f.caveman_ultra;
}

/* ─── UPDATE: Furnace (Pipeline) ─── */
function updFurnace(d){
  const p=d.pipeline||{};const tot=(p.refinery||0)+(p.production||0)+(p.archive||0)||1;
  tt('bh-pipe',tot);tt('ct-ref',p.refinery||0);tw('bar-ref',(p.refinery||0)/tot*100);
  tt('ct-prod',p.production||0);tw('bar-prod',(p.production||0)/tot*100);
  tt('ct-arch',p.archive||0);tw('bar-arch',(p.archive||0)/tot*100);
  // Glow
  document.querySelectorAll('.fz-glow').forEach(el=>{
    const n=parseInt(el.closest('.furnace-zone')?.querySelector('.fz-count')?.textContent)||0;
    el.style.opacity=Math.min(n/20,0.65);
  });
  const f=d.forge||{};tt('fv-codename',f.codename||'--');tt('fv-version',f.version||'--');
  tt('fv-checkpoint',(f.last_checkpoint||'--').substring(0,20));
  const ce=document.getElementById('fv-caveman');
  if(ce){ce.textContent=f.caveman_ultra?'ON':'OFF';ce.style.color=f.caveman_ultra?'var(--cool-emerald)':'var(--text-dim)'}
}

/* ─── UPDATE: Instruments (GPU) ─── */
function updInstruments(d){
  const g=(d.hardware||{}).gpus||[];const h=d.hardware||{};
  tt('bh-hw',g.length+' GPU'+(g.length!==1?'s':''));
  let html='';
  g.forEach((x,i)=>{
    const temp=parseFloat(x.temp_c)||35;
    html+=`<div class="instrument">
      <div class="ins-top"><span class="ins-name">GPU ${x.index}</span><span class="ins-model">${x.name||''}</span></div>
      <div class="ins-row">
        ${gaugeSvg(temp,95,i)}
        <div class="ins-stats">
          <div class="ins-stat"><span>Load</span><span class="ins-val">${Math.round(parseFloat(x.load_pct)||0)}%</span></div>
          <div class="ins-minibar"><div class="ins-fill ins-fill-load" style="width:${parseFloat(x.load_pct)||0}%"></div></div>
          <div class="ins-stat"><span>VRAM</span><span class="ins-val">${x.vram_used_mb}/${x.vram_total_mb} MB</span></div>
          <div class="ins-minibar"><div class="ins-fill ins-fill-vram" style="width:${(parseFloat(x.vram_used_mb)||0)/(parseFloat(x.vram_total_mb)||1)*100}%"></div></div>
          <div class="ins-stat"><span>Power</span><span class="ins-val">${x.power_w||'--'}W</span></div>
        </div>
      </div>
    </div>`;
  });
  html+=`<div class="sys-block"><div class="sys-row"><span>RAM</span><span class="sys-val">${h.ram||'--'}</span></div><div class="sys-row"><span>CPU</span><span class="sys-val">${h.cpu||'--'}</span></div><div class="sys-row"><span>Python</span><span class="sys-val">${h.python||'--'}</span></div></div>`;
  document.getElementById('instruments-body').innerHTML=html;
}

/* ─── UPDATE: Cascade (Activity) — SMART DIFF ─── */
function updCascade(d){
  const acts=d.activity||[];tt('bh-activity',acts.length);
  const skills=d.skills||[];
  // Build score lookup
  const scoreMap={};skills.forEach(s=>{if(s.latest_score!=null)scoreMap[s.name]=s.latest_score});
  const body=document.getElementById('cascade-body');
  const now=Date.now();
  const visible=acts.filter(a=>a.status==='running'||a.status==='pending'||!a.status);
  if(!visible.length){body.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-faint);font-size:11px">No active forge work. Light the furnace.</div>';return}
  const currentIds=new Set(acts.map(a=>a.id));
  // Remove gone
  document.querySelectorAll('#cascade-body .cascade-entry').forEach(el=>{
    if(!currentIds.has(parseInt(el.dataset.eid)))el.remove();
  });
  // Update existing + add new
  visible.forEach(a=>{
    const existing=document.querySelector(`.cascade-entry[data-eid="${a.id}"]`);
    const tagCls='tag-'+a.action;const xpCls=a.status;const prog=Math.min(a.progress||0,100);
    const bpScore=scoreMap[a.blueprint];
    const scoreStr=bpScore!=null?Math.round(bpScore):'--';
    const scoreClrStr=bpScore!=null?scrClr(bpScore):'var(--text-faint)';
    // Estimate time remaining
    let eta='';
    if(a.status==='running'&&prog>0&&prog<100){
      const ts=new Date(a.timestamp).getTime();
      if(ts){
        const elapsed=(Date.now()-ts)/1000;
        // Cap: if elapsed > 120s and progress < 80, entry is probably stale
        if(elapsed>120&&prog<80){
          eta='waiting...';
        }else{
          const totalEst=(elapsed/prog)*100;
          const remaining=totalEst-elapsed;
          if(remaining>3600)eta='>1h';
          else if(remaining>120)eta=Math.round(remaining/60)+'m left';
          else if(remaining>1)eta=Math.round(remaining)+'s left';
          else eta='<1s';
        }
      }
    }else if(a.status==='complete'){
      eta='done';
    }else if(a.status==='failed'){
      eta='failed';
    }else if(!a.status||a.status==='pending'){
      eta='queued';
    }
    if(existing){
      const xp=existing.querySelector('.ce-xp-inner');
      if(xp){xp.style.width=prog+'%';xp.className='ce-xp-inner '+xpCls}
      // Update ETA
      const etaEl=existing.querySelector('.ce-eta');
      if(etaEl)etaEl.textContent=eta;
      // Update score
      const scEl=existing.querySelector('.ce-score');
      if(scEl){scEl.textContent=scoreStr;scEl.style.color=scoreClrStr}
    }else{
      const div=document.createElement('div');
      div.className=`cascade-entry ${a.status}`;div.dataset.eid=a.id;div.style.animationDelay='0s';
      div.innerHTML=`<div class="ce-top"><span class="ce-name">${a.blueprint}</span><span class="ce-tag ${tagCls}">${a.action}</span></div><div class="ce-detail">${a.detail||''}</div><div class="ce-xp-outer"><div class="ce-xp-inner ${xpCls}" style="width:${prog}%"></div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:3px"><span class="ce-time">${(a.timestamp||'').substring(11,19)}</span><span class="ce-eta" style="font-size:9px;color:var(--text-faint);font-family:var(--mono)">${eta}</span><span class="ce-score" style="font-size:10px;font-weight:700;font-family:var(--mono);color:${scoreClrStr}">${scoreStr}</span></div>`;
      const first=body.firstChild;
      if(first)body.insertBefore(div,first);else body.appendChild(div);
    }
  });
}

/* ─── RENDER: Skills ─── */
function renderSkills(d){
  const all=d.skills||[];const q=(document.getElementById('skill-search')?.value||'').toLowerCase();
  const filtered=q?all.filter(s=>s.name.includes(q)):all.slice(0,60);
  tt('bh-skills',all.length);
  const body=document.getElementById('skills-body');
  if(!filtered.length){body.innerHTML='<div style="text-align:center;padding:24px;color:var(--text-faint);font-size:10px">No skills</div>';return}
  body.innerHTML=filtered.map(s=>{
    const sc=s.latest_score;return`
    <div class="skill-node" onclick="openSkill('${s.name}')">
      <div class="sn-dot" style="background:${dotClr(s.stage)}"></div>
      <span class="sn-name">${s.name}</span>
      <span class="sn-score" style="color:${scrClr(sc)}">${sc!=null?Math.round(sc):'--'}</span>
    </div>`;
  }).join('');
}

/* ─── BOTTOM BAR ─── */
function updBottom(d){
  const p=d.pipeline||{};
  tt('bb-stats',`Refinery ${p.refinery}  \u00b7  Production ${p.production}  \u00b7  Archive ${p.archive}`);
  tt('bb-clock',new Date().toLocaleTimeString());
}

/* ─── FORGE TERMINAL ─── */
let termSeen=new Set();
function updTerminal(d){
  const acts=d.activity||[];
  const body=document.getElementById('terminal-body');
  // Only add new entries we haven't shown yet
  let added=0;
  acts.slice().reverse().forEach(a=>{
    if(termSeen.has(a.id))return;
    termSeen.add(a.id);
    const cmdMap={spawn:'forge spawn',eval:'forge eval',improve:'forge improve',loop:'forge loop',config:'forge config'};
    const cmd=cmdMap[a.action]||a.action;
    const args=a.blueprint;
    const status=a.status==='complete'?'✓':a.status==='failed'?'✗':a.status==='running'?'…':'·';
    const cls=a.status==='complete'?'term-ok':a.status==='failed'?'term-err':a.status==='running'?'term-cmd':'term-out';
    const line=document.createElement('div');
    line.className='term-line';
    line.innerHTML=`<span class="term-prompt">forge$</span><span class="term-cmd">${cmd} ${args}</span><span class="${cls}">${status} ${a.detail||''}</span>`;
    body.appendChild(line);
    added++;
  });
  // Trim to last 15 lines
  while(body.children.length>15)body.firstChild.remove();
  // Auto-scroll
  body.scrollTop=body.scrollHeight;
  // If nothing happened
  if(!acts.length&&body.children.length<=1){
    body.innerHTML='<div class="term-line"><span class="term-prompt">forge$</span><span class="term-dim">awaiting forge activity...</span></div>';
  }
}
function flash(msg){
  const el=document.getElementById('bb-message');
  el.textContent='\u25b6 '+msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

/* ─── MAIN UPDATE ─── */
function update(d){
  updTop(d);updFurnace(d);updCascade(d);updTerminal(d);
  updInstruments(d);renderSkills(d);updBottom(d);
  prevData=d;
  if(autoRefresh)rt=setTimeout(fetchState,3000);
}

async function fetchState(){
  try{const r=await fetch(API);update(await r.json())}catch(e){}
}

/* ─── SKILL MODAL ─── */
async function openSkill(name){
  document.getElementById('skill-modal').classList.add('open');
  document.getElementById('modal-name').textContent=name;
  document.getElementById('modal-badge').textContent='Loading...';document.getElementById('modal-badge').style.cssText='';
  document.getElementById('modal-runs').innerHTML='<div style="text-align:center;padding:20px;color:var(--text-faint)">Loading...</div>';
  document.getElementById('modal-output').textContent='...';
  try{
    const r=await fetch(API);const d=await r.json();
    const s=d.skills?.find(x=>x.name===name);
    if(!s){document.getElementById('modal-runs').innerHTML='<div style="text-align:center;padding:20px;color:var(--text-faint)">Not found</div>';return}
    const stage=s.stage||'refinery';
    document.getElementById('modal-badge').textContent=stage;
    document.getElementById('modal-badge').style.cssText=`
      background:${stage==='production'?'rgba(34,197,94,0.08)':stage==='archive'?'rgba(255,255,255,0.03)':'var(--ember-soft)'};
      color:${stage==='production'?'var(--cool-emerald)':stage==='archive'?'var(--text-dim)':'var(--forge-amber)'}`;
    if(s.runs?.length){
      document.getElementById('modal-runs').innerHTML=s.runs.slice(0,12).map(r=>`
        <div class="modal-run"><span class="mr-score" style="color:${scrClr(r.score)}">${r.score!=null?Math.round(r.score):'--'}</span><span class="mr-id">${r.id}</span><span style="font-size:8px;color:var(--text-faint)">${(r.task||'').substring(0,30)}</span></div>`).join('');
    }else{document.getElementById('modal-runs').innerHTML='<div style="text-align:center;padding:20px;color:var(--text-faint)">No runs</div>'}
    document.getElementById('modal-output').textContent=s.runs?.[0]?.output_preview||'No output';
  }catch(e){}
}
function closeSkillModal(){document.getElementById('skill-modal').classList.remove('open')}

/* ─── API CONTROLS ─── */
function apiSpawn(){
  const bp=document.getElementById('spawn-input').value.trim();
  if(!bp)return flash('Enter blueprint name first');
  fetch('/api/spawn',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({blueprint:bp})})
    .then(()=>{flash(`Spawned: ${bp}`);setTimeout(fetchState,600)});
}
function apiEval(){
  const bp=prompt('Blueprint:');if(!bp)return;
  const rid=prompt('Run ID (blank=latest):')||'latest';
  fetch('/api/eval',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({blueprint:bp,run_id:rid})})
    .then(()=>{flash(`Eval: ${bp}`);setTimeout(fetchState,600)});
}
function apiImprove(){
  const bp=prompt('Blueprint:');if(!bp)return;
  const rid=prompt('Run ID:');if(!rid)return;
  fetch('/api/improve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({blueprint:bp,run_id:rid})})
    .then(()=>{flash(`Improve: ${bp}`);setTimeout(fetchState,600)});
}
function apiLoop(){
  fetch('/api/loop',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'})
    .then(()=>{flash('Loop started');setTimeout(fetchState,600)});
}
function apiCaveman(on){

    .then(()=>{flash(on?'Caveman ON':'Caveman OFF');setTimeout(fetchState,400)});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeSkillModal();
  if(e.key==='r'&&e.ctrlKey){e.preventDefault();fetchState()}

/* ─── BOOT ─── */
(async function(){
  renderStatic();
  try{const r=await fetch(API);const d=await r.json();
    // Pre-populate terminal from seed activity
    termSeen.clear();
    updTerminal(d);
    update(d);
  }catch(e){}

// Clean up old completedTimes
setInterval(()=>{
  const now=Date.now();
  for(const [id,ts] of Object.entries(completedTimes)){
    if(now-ts>30000)delete completedTimes[id];
  }
},10000);

// Auto-remove completed entries after 5s
setInterval(()=>{
  const now=Date.now();
  document.querySelectorAll('#cascade-body .cascade-entry.complete, #cascade-body .cascade-entry.failed').forEach(el=>{
    const eid=parseInt(el.dataset.eid);
    const ct=completedTimes[eid]||0;
    if(now-ct>5000)el.remove();
  });
},2000);

// Periodic ETA refresh for running entries
setInterval(()=>{
  document.querySelectorAll('#cascade-body .cascade-entry.running').forEach(el=>{
    const tsStr=el.querySelector('.ce-time')?.textContent;
    if(!tsStr)return;
    const today=new Date().toISOString().substring(0,10);
    const ts=new Date(today+'T'+tsStr+'Z').getTime();
    if(!ts||ts>Date.now())return;
    const elapsed=(Date.now()-ts)/1000;
    const xpEl=el.querySelector('.ce-xp-inner');
    const prog=parseFloat(xpEl?.style.width)||0;
    if(prog<=0||prog>=100)return;
    const etaEl=el.querySelector('.ce-eta');
    if(!etaEl)return;
    // If stale (>120s and not progressing), show waiting
    if(elapsed>120&&prog<80){
      etaEl.textContent='waiting...';return;
    }
    const totalEst=(elapsed/prog)*100;
    const remaining=totalEst-elapsed;
    if(remaining>3600)etaEl.textContent='>1h';
    else if(remaining>120)etaEl.textContent=Math.round(remaining/60)+'m left';
    else if(remaining>1)etaEl.textContent=Math.round(remaining)+'s left';
    else etaEl.textContent='<1s';
  });
},5000);
</script>
