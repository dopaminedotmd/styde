.btn-play{width:34px;height:30px;justify-content:center;font-size:16px}
.legend{display:flex;gap:14px;font-size:11px;color:#6b7b90;margin-left:auto}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(255,255,255,0.1)}
.timeline-container{position:relative;padding:0}
.timeline-canvas{width:100%;overflow-x:auto;overflow-y:auto;height:calc(100vh - 150px);position:relative}
.timeline-canvas svg{display:block}
.node{cursor:pointer;transition:r 0.15s,opacity 0.15s;filter:drop-shadow(0 0 3px rgba(255,215,0,0.15))}
.node:hover{filter:drop-shadow(0 0 10px rgba(255,215,0,0.4))}
.node-label{font-size:10px;fill:#6b7b90;dominant-baseline:middle}
.track-label{font-size:11px;fill:#8899b0;font-family:'JetBrains Mono','SF Mono',monospace;text-anchor:end;dominant-baseline:middle;transition:fill 0.15s}
.track-label:hover{fill:#ffd700;cursor:pointer}
.track-line{stroke:#1e2430;stroke-width:1;fill:none}
.track-bg{fill:#0d1117;transition:fill 0.15s}
.track-bg:hover{fill:#11161e}
.tick-line{stroke:#161b22;stroke-width:1}
.tick-label{font-size:9px;fill:#3a4a60;font-family:'JetBrains Mono','SF Mono',monospace}
.popup-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:200;justify-content:center;align-items:center}
.popup-overlay.show{display:flex}
.popup{background:#12171f;border:1px solid #2a3340;border-radius:12px;padding:24px 28px;max-width:460px;width:90%;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.6)}

.popup .popup-bp{font-size:12px;color:#ffd700;margin-bottom:14px}

.popup .popup-label{color:#6b7b90}
.popup .popup-value{color:#c8d0e0;font-family:'JetBrains Mono',monospace}
.popup .popup-score{font-size:22px;font-weight:700;text-align:center;padding:8px 0;margin-bottom:8px}

.score-amber{color:#ffaa33}

.popup-close{position:absolute;top:12px;right:16px;color:#6b7b90;cursor:pointer;font-size:18px;background:none;border:none}

.search-box{background:#0d1117;border:1px solid #1e2430;border-radius:6px;padding:5px 12px;color:#c8d0e0;font-size:12px;width:180px;outline:none;font-family:'JetBrains Mono',monospace}

.auto-play-indicator .bar{height:100%;width:0%;background:linear-gradient(90deg,#ffd700,#ffaa33);border-radius:1px;transition:width 0.1s linear}

// ====== RENDERER ======
const MARGIN={left:200,right:60,top:20,bottom:40};
const TRACK_H=28;
const NODE_R=6;
const NODE_R_SMALL=4;

let state={timeRange:[0,1],blueprintFilter:"",autoPlay:false,autoPlayTimer:null};

function fmtTime(iso){const d=new Date(iso);return d.toLocaleString('sv-SE',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'UTC'}).replace(' ','T')}

function getScore(a){
  for(let e of DATA.evals)if(e.run_id===a.run_id)return e.score;
  if(a.stage==='production')return 75;
  if(a.stage==='archive')return 55;
  return 45;
}
function getColor(score){
  if(score>=85)return '#ffd700';
  if(score>=70)return '#ffaa33';
  return '#5a8ab5';
}

function getBlueprints(){
  const seen=new Set();
  for(const a of DATA.agents)seen.add(a.blueprint);
  return [...seen].sort();
}

function getAgentsForBlueprint(bp){
  return DATA.agents.filter(a=>a.blueprint===bp);
}

function render(){
  const svg=document.getElementById('timeline-svg');
  const container=document.getElementById('canvas-container');
  const blueprints=getBlueprints();
  const query=state.blueprintFilter.toLowerCase();
  const filtered=query?blueprints.filter(b=>b.includes(query)):blueprints;
  
  const totalH=MARGIN.top+MARGIN.bottom+filtered.length*TRACK_H;
  const w=Math.max(container.clientWidth||1400,1400);
  const h=Math.max(totalH,600);
  svg.setAttribute('width',w);
  svg.setAttribute('height',h);
  
  // time domain
  const times=DATA.agents.map(a=>new Date(a.spawned_at).getTime());
  const tMin=Math.min(...times),tMax=Math.max(...times);
  const tRange=tMax-tMin||1;
  const tMid=new Date(state.timeRange[1]*tRange+tMin);
  const shownEnd=tMid.getTime();
  const shownStart=state.timeRange[0]*tRange+tMin;
  const shownRange=shownEnd-shownStart||1;
  
  const plotLeft=MARGIN.left;
  const plotRight=w-MARGIN.right;
  const plotW=plotRight-plotLeft;
  
  function x(iso){return plotLeft+((new Date(iso).getTime()-shownStart)/shownRange)*plotW}
  
  svg.innerHTML='';
  
  // clip
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  const clip=document.createElementNS('http://www.w3.org/2000/svg','clipPath');
  clip.setAttribute('id','plot-clip');
  const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',plotLeft);
  rect.setAttribute('y',0);
  rect.setAttribute('width',plotW);
  rect.setAttribute('height',h);
  clip.appendChild(rect);
  defs.appendChild(clip);
  svg.appendChild(defs);
  
  // bg
  const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
  bg.setAttribute('width',w);
  bg.setAttribute('height',h);
  bg.setAttribute('fill','#0a0b0f');
  svg.appendChild(bg);
  
  // time ticks
  const tickCount=8;
  for(let i=0;i<=tickCount;i++){
    const t=shownStart+(shownRange*i/tickCount);
    const px=plotLeft+(plotW*i/tickCount);
    const tl=document.createElementNS('http://www.w3.org/2000/svg','line');
    tl.setAttribute('x1',px);tl.setAttribute('y1',MARGIN.top);
    tl.setAttribute('x2',px);tl.setAttribute('y2',h-MARGIN.bottom);
    tl.setAttribute('class','tick-line');
    svg.appendChild(tl);
    const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',px);txt.setAttribute('y',h-8);
    txt.setAttribute('class','tick-label');
    txt.setAttribute('text-anchor','middle');
    txt.textContent=fmtTime(new Date(t).toISOString());
    svg.appendChild(txt);
  }
  
  // tracks
  const trackG=document.createElementNS('http://www.w3.org/2000/svg','g');
  trackG.setAttribute('clip-path','url(#plot-clip)');
  
  filtered.forEach((bp,i)=>{
    const y=MARGIN.top+i*TRACK_H;
    
    // bg
    const tbg=document.createElementNS('http://www.w3.org/2000/svg','rect');
    tbg.setAttribute('x',plotLeft);
    tbg.setAttribute('y',y);
    tbg.setAttribute('width',plotW);
    tbg.setAttribute('height',TRACK_H);
    tbg.setAttribute('class','track-bg');
    trackG.appendChild(tbg);
    
    // line
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',plotLeft);
    line.setAttribute('y1',y+TRACK_H/2);
    line.setAttribute('x2',plotRight);
    line.setAttribute('y2',y+TRACK_H/2);
    line.setAttribute('class','track-line');
    trackG.appendChild(line);
    
    // nodes
    const agents=getAgentsForBlueprint(bp).filter(a=>{
      const t=new Date(a.spawned_at).getTime();
      return t>=shownStart&&t<=shownEnd;
    });
    
    agents.forEach(a=>{
      const cx=x(a.spawned_at);
      const cy=y+TRACK_H/2;
      const score=getScore(a);
      const isKey=a.benchmark&&a.benchmark!=='manual'||a.stage==='production'||a.stage==='archive';
      const r=isKey?NODE_R:NODE_R_SMALL;
      
      const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
      circle.setAttribute('cx',cx);
      circle.setAttribute('cy',cy);
      circle.setAttribute('r',r);
      circle.setAttribute('fill',getColor(score));
      circle.setAttribute('class','node');
      circle.setAttribute('opacity',a.status==='spawned'?'0.4':'0.85');
      circle.setAttribute('data-run-id',a.run_id);
      circle.style.cursor='pointer';
      circle.addEventListener('click',()=>showPopup(a,score));
      trackG.appendChild(circle);
      
      // iteration badge for iter>1
      if(a.iteration&&a.iteration>1){
        const badge=document.createElementNS('http://www.w3.org/2000/svg','text');
        badge.setAttribute('x',cx+r+3);
        badge.setAttribute('y',cy+3);
        badge.setAttribute('font-size','7');
        badge.setAttribute('fill','#5a7a9a');
        badge.textContent='i'+a.iteration;
        trackG.appendChild(badge);
      }
    });
  });
  
  svg.appendChild(trackG);
  
  // labels (outside clip)
  filtered.forEach((bp,i)=>{
    const y=MARGIN.top+i*TRACK_H;
    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',MARGIN.left-10);
    lbl.setAttribute('y',y+TRACK_H/2);
    lbl.setAttribute('class','track-label');
    const display=bp.length>24?bp.slice(0,22)+'..':bp;
    lbl.textContent=display;
    svg.appendChild(lbl);
  });
  
  // update stats
  document.getElementById('stat-bp').textContent=DATA.meta.blueprints;
  document.getElementById('stat-runs').textContent=DATA.agents.length;
  document.getElementById('stat-evals').textContent=DATA.meta.total_evals;
  document.getElementById('stat-loop').textContent=DATA.meta.loop_iterations;
  document.getElementById('stat-spawned').textContent=DATA.meta.total_spawned;
  document.getElementById('stat-last').textContent=DATA.meta.last_checkpoint?fmtTime(DATA.meta.last_checkpoint):'-';
  document.getElementById('time-display').textContent=fmtTime(tMid.toISOString());
}

// ====== POPUP ======
function showPopup(agent,score){
  document.getElementById('popup-title').textContent=agent.run_id;
  document.getElementById('popup-bp').textContent=agent.blueprint;
  const scEl=document.getElementById('popup-score');
  const color=getColor(score);
  scEl.innerHTML=`<span style="color:${color}">${score}</span> <span style="font-size:12px;color:#6b7b90">/ 100</span>`;
  
  const rows=document.getElementById('popup-rows');
  rows.innerHTML='';
  const fields=[
    {label:'Blueprint',val:agent.blueprint},
    {label:'Run ID',val:agent.run_id},
    {label:'Version / Stage',val:agent.stage},
    {label:'Status',val:agent.status},
    {label:'Benchmark',val:agent.benchmark||'-'},
    {label:'Iteration',val:agent.iteration||1},
    {label:'Spawned',val:fmtTime(agent.spawned_at)},
  ];
  
  // add eval data if exists
  for(const e of DATA.evals){
    if(e.run_id===agent.run_id){
      fields.push({label:'Diagnosis',val:e.diagnosis});
      fields.push({label:'Summary',val:e.summary});
    }
  }
  
  fields.forEach(f=>{
    const row=document.createElement('div');
    row.className='popup-row';
    row.innerHTML=`<span class="popup-label">${f.label}</span><span class="popup-value">${f.val}</span>`;
    rows.appendChild(row);
  });
  
  document.getElementById('popup-overlay').classList.add('show');
}

// ====== CONTROLS ======
const slider=document.getElementById('time-slider');
slider.addEventListener('input',()=>{
  const val=parseInt(slider.value);
  state.timeRange[1]=val/100;
  render();
});

document.getElementById('search-box').addEventListener('input',(e)=>{
  state.blueprintFilter=e.target.value;
  render();
});

document.getElementById('popup-overlay').addEventListener('click',(e)=>{
  if(e.target===document.getElementById('popup-overlay')){
    document.getElementById('popup-overlay').classList.remove('show');
  }
});
document.getElementById('popup-close').addEventListener('click',()=>{
  document.getElementById('popup-overlay').classList.remove('show');
});

document.getElementById('btn-play').addEventListener('click',()=>{
  state.autoPlay=!state.autoPlay;
  const btn=document.getElementById('btn-play');
  const bar=document.getElementById('progress-bar');
  if(state.autoPlay){
    btn.innerHTML='&#10074;&#10074;';
    btn.classList.add('active');
    bar.style.display='block';
    if(parseInt(slider.value)>=99)slider.value=0;
    state.autoPlayTimer=setInterval(()=>{
      let v=parseInt(slider.value)+1;
      if(v>100){v=100;state.autoPlay=false;clearInterval(state.autoPlayTimer);btn.innerHTML='&#9654;';btn.classList.remove('active');bar.style.display='none';}
      slider.value=v;
      state.timeRange[1]=v/100;
      document.getElementById('progress-fill').style.width=v+'%';
      render();
    },80);
  }else{
    clearInterval(state.autoPlayTimer);
    btn.innerHTML='&#9654;';
    btn.classList.remove('active');
    bar.style.display='none';
  }
});

// resize
window.addEventListener('resize',render);

// init
render();
</script>
