<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Sonification Console</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e17;color:#c8d6e5;font-family:'Segoe UI',system-ui,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.header{background:#111827;border-bottom:1px solid #1e3a5f;padding:10px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.header h1{font-size:18px;font-weight:300;letter-spacing:1px;color:#60a5fa}
.header .controls{margin-left:auto;display:flex;gap:10px;align-items:center}
.header button{background:#1e293b;color:#94a3b8;border:1px solid #334155;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:13px;transition:all 0.2s}
.header button:hover{background:#334155;color:#e2e8f0}
.header button.active{background:#1e3a5f;border-color:#3b82f6;color:#60a5fa}
.indicator{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;border-radius:3px}
.indicator.active{background:#1a3a2a;color:#4ade80;border:1px solid #166534}
.indicator.inactive{background:#1a1a2e;color:#64748b;border:1px solid #1e293b}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:300px;min-width:300px;background:#0f1729;border-right:1px solid #1e3a5f;display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:10px 14px;border-bottom:1px solid #1e293b;font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:1px;flex-shrink:0}
.channel-list{flex:1;overflow-y:auto;padding:6px}
.channel-panel{background:#111827;border:1px solid #1e293b;border-radius:4px;margin-bottom:6px;padding:10px 12px;transition:border-color 0.3s}
.channel-panel.muted{border-color:#3a1a1a;opacity:0.6}
.channel-panel.soloed{border-color:#eab308}
.channel-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.channel-name{font-size:13px;font-weight:500;flex:1;color:#e2e8f0}
.channel-value{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;color:#60a5fa;min-width:50px;text-align:right;font-family:'Segoe UI',monospace}
.channel-controls{display:flex;align-items:center;gap:6px;margin-top:4px}
.channel-controls button{background:transparent;border:1px solid #334155;color:#94a3b8;width:30px;height:26px;border-radius:3px;cursor:pointer;font-size:12px;line-height:1;transition:all 0.15s;padding:0}
.channel-controls button:hover{background:#1e293b}
.channel-controls button.active-solo{background:#713f12;border-color:#eab308;color:#fbbf24}
.channel-controls button.active-mute{background:#3a1a1a;border-color:#dc2626;color:#ef4444}
.channel-controls input[type=range]{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:#1e293b;border-radius:2px;outline:none;min-width:0}
.channel-controls input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#3b82f6;cursor:pointer;border:2px solid #60a5fa}
.channel-meta{font-size:10px;color:#475569;margin-top:4px;display:flex;gap:10px}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.viz-panel{height:180px;min-height:120px;background:#0a0e17;border-bottom:1px solid #1e3a5f;position:relative;flex-shrink:0}
.viz-panel canvas{width:100%;height:100%;display:block}
.viz-controls{position:absolute;top:6px;right:8px;display:flex;gap:4px;z-index:2}
.viz-controls button{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:3px 8px;border-radius:3px;font-size:11px;cursor:pointer}
.viz-controls button.active{background:#1e3a5f;border-color:#3b82f6;color:#60a5fa}
.metrics-area{flex:1;overflow-y:auto;padding:14px}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.metric-card{background:#111827;border:1px solid #1e293b;border-radius:6px;padding:12px}
.metric-card .label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:0.5px}
.metric-card .value{font-size:24px;font-weight:700;color:#e2e8f0;margin-top:4px;font-variant-numeric:tabular-nums}
.metric-card .value.positive{color:#4ade80}
.metric-card .value.negative{color:#ef4444}
.diag-panel{background:#0a0e17;border-top:1px solid #1e3a5f;padding:8px 12px;max-height:120px;overflow-y:auto;font-family:'Consolas','Courier New',monospace;font-size:11px;line-height:1.5;color:#64748b;flex-shrink:0}
.diag-panel .warning{color:#f59e0b}
.diag-panel .error{color:#ef4444}
.diag-panel .info{color:#60a5fa}
.overlay{position:fixed;inset:0;background:#0a0e17ee;display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:16px}
.overlay h2{font-size:24px;font-weight:300;color:#94a3b8}
.overlay button{background:#3b82f6;color:#fff;border:none;padding:14px 32px;border-radius:8px;font-size:16px;cursor:pointer}
.overlay button:hover{background:#2563eb}
.hidden{display:none!important}
.fade-in{animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0a0e17}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#334155}
</style>
</head>
<body>

<div id="startOverlay" class="overlay">
  <h2>Data Sonification Console</h2>
  <p style="color:#64748b;font-size:14px">Tap to enable audio and start monitoring</p>
  <button id="startBtn">Enable Audio</button>
</div>

<div class="header">
  <h1>SONIFICATION CONSOLE</h1>
  <div id="headphoneIndicator" class="indicator inactive">HEADPHONE MODE</div>
  <div class="controls">
    <button id="headphoneToggle">Headphone Mode</button>
    <button id="soloResetBtn">Clear Solos</button>
    <button id="muteAllBtn">Mute All</button>
    <span style="font-size:12px;color:#475569" id="channelCount">0 channels</span>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">Audio Channels</div>
    <div class="channel-list" id="channelList"></div>
  </div>
  <div class="content">
    <div class="viz-panel" id="vizPanel">
      <canvas id="vizCanvas"></canvas>
      <div class="viz-controls">
        <button id="vizFreqBtn" class="active">Freq Bars</button>
        <button id="vizTimeBtn">Waveform</button>
        <button id="vizOffBtn">Off</button>
      </div>
    </div>
    <div class="metrics-area" id="metricsArea">
      <div class="metrics-grid" id="metricsGrid"></div>
    </div>
  </div>
</div>

<div class="diag-panel" id="diagPanel">
  <div>[system] Console initialised. Tap "Enable Audio" to begin.</div>
</div>

<script>
'use strict';

function log(level, msg) {
  const diag = document.getElementById('diagPanel');
  const el = document.createElement('div');
  el.className = level;
  const t = new Date().toLocaleTimeString();
  el.textContent = `[${t}] [${level}] ${msg}`;
  diag.appendChild(el);
  if (diag.children.length > 100) diag.removeChild(diag.firstChild);
  diag.scrollTop = diag.scrollHeight;
}

let audioCtx = null;
let masterGain = null;
let masterLimiter = null;
let analyserNode = null;
let analyserConnected = false;
let isHeadphoneMode = false;
let isRunning = false;
let soloCount = 0;
let vizMode = 'freq';
let animFrameId = null;

const channels = new Map();
const channelElements = new Map();
const metricValues = new Map();

// ============================================================
// Noise generators
// ============================================================
function createNoiseBuffer(ctx, type, duration) {
  const sr = ctx.sampleRate;
  const len = Math.floor(sr * (duration || 2));
  const buf = ctx.createBuffer(1, len, sr);
  const data = buf.getChannelData(0);
  let lastOut = 0;
  let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
  for (let i = 0; i < len; i++) {
    const white = Math.random() * 2 - 1;
    if (type === 'white') {
      data[i] = white;
    } else if (type === 'pink') {
      b0 = 0.99886 * b0 + white * 0.0555179;
      b1 = 0.99332 * b1 + white * 0.0750759;
      b2 = 0.96900 * b2 + white * 0.1538520;
      b3 = 0.86650 * b3 + white * 0.3104856;
      b4 = 0.55000 * b4 + white * 0.5329522;
      b5 = -0.7616 * b5 - white * 0.0168980;
      data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
      b6 = white * 0.115926;
    } else {
      data[i] = white * 0.5 + lastOut * 0.5;
      lastOut = data[i];
    }
  }
  return buf;
}

// ============================================================
// Metric Bus
// ============================================================
const MetricBus = {
  _data: new Map(),
  _listeners: new Map(),
  set(channelId, metric, value) {
    const prev = this._data.get(metric);
    const changed = prev !== value;
    this._data.set(metric, value);
    metricValues.set(metric, value);
    if (changed) {
      const ls = this._listeners.get(metric);
      if (ls) ls.forEach(fn => fn(value, prev));
    }
  },
  get(metric) { return this._data.get(metric); },
  on(metric, fn) {
    if (!this._listeners.has(metric)) this._listeners.set(metric, new Set());
    this._listeners.get(metric).add(fn);
  },
  off(metric, fn) {
    const s = this._listeners.get(metric);
    if (s) s.delete(fn);
  },
  updateFromObject(obj) {
    for (const [k, v] of Object.entries(obj)) {
      if (typeof v === 'number') this.set(k, k, v);
    }
  }
};

// ============================================================
// Master Audio Setup
// ============================================================
function setupAudio() {
  if (audioCtx && audioCtx.state !== 'closed') {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return;
  }
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e) {
    log('error', 'AudioContext unavailable. Running in silent mode.');
    isRunning = false;
    document.getElementById('startOverlay').classList.add('hidden');
    document.querySelector('.header').insertAdjacentHTML('beforeend',
      '<div class="indicator" style="background:#2a1a1a;color:#ef4444;border-color:#7f1d1d">SILENT MODE</div>');
    return;
  }
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 1.0;
  masterLimiter = audioCtx.createDynamicsCompressor();
  masterLimiter.threshold.value = -0.5;
  masterLimiter.attack.value = 0.003;
  masterLimiter.release.value = 0.050;
  masterGain.connect(masterLimiter);
  masterLimiter.connect(audioCtx.destination);
  isRunning = true;
  updateAnalyser();
  log('info', `AudioContext initialised (sampleRate: ${audioCtx.sampleRate})`);
}

function updateAnalyser() {
  if (analyserNode) {
    analyserNode.disconnect();
    analyserNode = null;
    analyserConnected = false;
  }
  if (vizMode === 'off' || !isRunning || !masterLimiter) return;
  analyserNode = audioCtx.createAnalyser();
  analyserNode.fftSize = 512;
  analyserNode.smoothingTimeConstant = 0.8;
  masterLimiter.connect(analyserNode);
  analyserNode.connect(audioCtx.destination);
  analyserConnected = true;
  log('info', 'Analyser node activated');
}

// ============================================================
// AudioNode pooling
// ============================================================
const nodePool = new Map();

function getOrCreateOscillator(ctx, channelId, type) {
  const key = `${channelId}-osc`;
  let pool = nodePool.get(key);
  if (!pool) {
    pool = { node: null, inUse: false };
    nodePool.set(key, pool);
  }
  if (!pool.node || pool.node.frequency) {
    pool.node = ctx.createOscillator();
    pool.node.type = type || 'sine';
    pool.node.frequency.value = 220;
    pool.node.start();
    pool.inUse = true;
  }
  return pool.node;
}

function releaseOscillator(channelId) {
  const key = `${channelId}-osc`;
  const pool = nodePool.get(key);
  if (pool && pool.node) {
    try { pool.node.stop(); } catch(e) {}
    pool.node.disconnect();
    pool.node = null;
    pool.inUse = false;
  }
}

// ============================================================
// Frequency Mapping Functions (blueprint formulas)
// ============================================================
function linearMap(v, min, max, fLow, fHigh) {
  const clamped = Math.max(min, Math.min(v, max));
  return fLow + ((clamped - min) / (Math.max(max - min, 1))) * (fHigh - fLow);
}

function expMap(r, rMin, rMax, bpmLow, bpmHigh) {
  const clamped = Math.max(rMin, Math.min(r, rMax));
  const ratio = (clamped - rMin) / (Math.max(rMax - rMin, 1));
  return bpmLow * Math.pow(bpmHigh / bpmLow, ratio);
}

function powerLawMap(e, eMin, eMax, nLow, nHigh, gamma) {
  gamma = gamma || 0.5;
  const clamped = Math.max(eMin, Math.min(e, eMax));
  const ratio = (clamped - eMin) / (Math.max(eMax - eMin, 1));
  return nLow + Math.pow(ratio, gamma) * (nHigh - nLow);
}

function freqToNoiseType(freq) {
  if (freq <= 200) return 'white';
  if (freq <= 1000) return 'pink';
  return 'brown';
}

// ============================================================
// Summation Constraint
// ============================================================
let scaleFactor = 1.0;
let rmsHistory = [];
function applySummationConstraint() {
  let sum = 0;
  for (const ch of channels.values()) {
    if (ch.gainNode && !ch.muted && !(soloCount > 0 && !ch.soloed)) {
      sum += ch.currentGain || 0;
    }
  }
  if (sum > 1.0) {
    scaleFactor = 1.0 / sum;
  } else if (sum < 0.6 && scaleFactor < 1.0) {
    scaleFactor = Math.min(1.0, scaleFactor + 0.05);
  }
  rmsHistory.push(sum);
  if (rmsHistory.length > 30) rmsHistory.shift();
  const rms = rmsHistory.reduce((a,b)=>a+b,0) / Math.max(rmsHistory.length,1);
  if (rms > 0.8 && scaleFactor < 1.0) {
    log('warning', `Summation constraint active: scale=${scaleFactor.toFixed(3)}, RMS=${rms.toFixed(3)}`);
  }
  if (scaleFactor < 1.0) {
    for (const ch of channels.values()) {
      if (ch.gainNode && !ch.muted) {
        const target = (ch.currentGain || 0) * scaleFactor;
        ch.gainNode.gain.setTargetAtTime(target, audioCtx.currentTime, 0.02);
      }
    }
  }
}

// ============================================================
// Mute/Solo Manager
// ============================================================
function applyMuteSolo() {
  const anySolo = soloCount > 0;
  for (const [id, ch] of channels) {
    if (!ch.gainNode) continue;
    if (anySolo) {
      if (ch.soloed) {
        ch.gainNode.gain.setTargetAtTime(ch.currentGain || 0, audioCtx.currentTime, 0.02);
      } else {
        ch.gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
        ch.gainNode.gain.value = 0;
      }
    } else {
      if (ch.muted) {
        ch.gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
        ch.gainNode.gain.value = 0;
      } else {
        ch.gainNode.gain.setTargetAtTime(ch.currentGain || 0, audioCtx.currentTime, 0.02);
      }
    }
  }
  updateChannelUI();
}

function setMute(channelId, mute) {
  const ch = channels.get(channelId);
  if (!ch) return;
  ch.muted = mute;
  updateChannelPanel(channelId);
  applyMuteSolo();
}

function toggleMute(channelId) {
  const ch = channels.get(channelId);
  if (!ch) return;
  setMute(channelId, !ch.muted);
}

function setSolo(channelId, solo) {
  const ch = channels.get(channelId);
  if (!ch) return;
  const prev = ch.soloed;
  ch.soloed = solo;
  if (solo && !prev) soloCount++;
  if (!solo && prev) soloCount--;
  updateChannelPanel(channelId);
  applyMuteSolo();
  log('info', `Solo: ${channelId}=${solo} (count: ${soloCount})`);
}

function toggleSolo(channelId) {
  const ch = channels.get(channelId);
  if (!ch) return;
  setSolo(channelId, !ch.soloed);
}

function clearAllSolos() {
  for (const [id, ch] of channels) {
    if (ch.soloed) {
      ch.soloed = false;
      soloCount--;
    }
    updateChannelPanel(id);
  }
  if (soloCount < 0) soloCount = 0;
  applyMuteSolo();
  log('info', 'All solos cleared');
}

function muteAll() {
  for (const [id, ch] of channels) {
    ch.muted = true;
    updateChannelPanel(id);
  }
  applyMuteSolo();
  log('info', 'All channels muted');
}

// ============================================================
// Channel Factory
// ============================================================
function createChannel(config) {
  const id = config.id || `ch_${channels.size}`;
  const ch = {
    id,
    name: config.name || id,
    type: config.type || 'oscillator',
    muted: false,
    soloed: false,
    volume: config.volume || 0.7,
    pan: config.pan || 0,
    currentGain: config.volume || 0.7,
    currentValue: config.defaultValue || 50,
    range: config.range || [0, 100],
    audioRange: config.audioRange || [80, 800],
    gainNode: null,
    sourceNode: null,
    pannerNode: null,
    oscNode: null,
    config,
    _intervalId: null,
    _lastPulseTime: 0
  };

  if (audioCtx) {
    ch.gainNode = audioCtx.createGain();
    ch.gainNode.gain.value = 0;

    ch.pannerNode = audioCtx.createStereoPanner();
    ch.pannerNode.pan.value = ch.pan;

    if (ch.type === 'oscillator') {
      ch.oscNode = audioCtx.createOscillator();
      ch.oscNode.type = config.oscType || 'sine';
      ch.oscNode.frequency.value = 220;
      ch.oscNode.start();
      ch.oscNode.connect(ch.gainNode);
    } else if (ch.type === 'noise') {
      const noiseType = config.noiseType || 'pink';
      const buf = createNoiseBuffer(audioCtx, noiseType, 4);
      ch.sourceNode = audioCtx.createBufferSource();
      ch.sourceNode.buffer = buf;
      ch.sourceNode.loop = true;
      ch.sourceNode.start();
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 1000;
      bp.Q.value = 0.7;
      ch.sourceNode.connect(bp);
      bp.connect(ch.gainNode);
      ch._bpFilter = bp;
    } else if (ch.type === 'rhythm') {
      ch.oscNode = audioCtx.createOscillator();
      ch.oscNode.type = 'triangle';
      ch.oscNode.frequency.value = 440;
      ch.oscNode.start();
      ch.oscNode.connect(ch.gainNode);
      ch.gainNode.gain.value = 0;
    }

    ch.gainNode.connect(ch.pannerNode);
    ch.pannerNode.connect(masterGain);
  }

  channels.set(id, ch);
  createChannelPanel(ch);
  updateChannelCount();
  log('info', `Channel created: ${ch.name} (${ch.type})`);
  return ch;
}

// ============================================================
// Channel value updates
// ============================================================
function updateOscillatorChannel(ch, value) {
  ch.currentValue = value;
  const [min, max] = ch.range;
  const [fLow, fHigh] = ch.audioRange;
  const freq = linearMap(value, min, max, fLow, fHigh);
  if (ch.oscNode && ch.oscNode.frequency) {
    ch.oscNode.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.12);
  }
  ch.currentGain = ch.volume;
  if (!ch.muted && !(soloCount > 0 && !ch.soloed)) {
    ch.gainNode.gain.setTargetAtTime(ch.volume, audioCtx.currentTime, 0.02);
  }
  updateChannelValueDisplay(ch.id, value, freq.toFixed(1));
}

function updateRhythmChannel(ch, value) {
  ch.currentValue = value;
  const [rMin, rMax] = ch.range;
  const bpm = expMap(value, rMin, rMax, 30, 240);
  const interval = 60 / bpm;
  ch._bpm = bpm;
  ch._interval = interval;
  if (!ch._intervalId) {
    scheduleRhythmPulse(ch);
  }
  ch.currentGain = ch.volume * 0.6;
  updateChannelValueDisplay(ch.id, value, `${bpm.toFixed(1)} bpm`);
}

function scheduleRhythmPulse(ch) {
  if (!audioCtx || !ch.oscNode) return;
  function tick() {
    if (!channels.has(ch.id)) return;
    const now = audioCtx.currentTime;
    const interval = ch._interval || 0.5;
    if (ch.muted || (soloCount > 0 && !ch.soloed)) {
      ch._intervalId = setTimeout(tick, interval * 1000);
      return;
    }
    const gainNode = ch.gainNode;
    if (gainNode) {
      gainNode.gain.setValueAtTime(ch.volume * 0.5, now);
      gainNode.gain.setTargetAtTime(0, now + interval * 0.1, 0.02);
    }
    ch._intervalId = setTimeout(tick, interval * 1000);
  }
  tick();
}

let noiseOverflowCount = 0;
let lastNoiseReset = 0;

function updateNoiseChannel(ch, value) {
  ch.currentValue = value;
  const [eMin, eMax] = ch.range;
  const nFreq = powerLawMap(value, eMin, eMax, 80, 4000, 0.5);
  const clampedFreq = Math.max(20, Math.min(nFreq, (audioCtx ? audioCtx.sampleRate/2 : 22050) - 1));
  if (clampedFreq !== nFreq) {
    noiseOverflowCount++;
    const now = Date.now();
    if (noiseOverflowCount > 5 && now - lastNoiseReset > 10000) {
      ch.audioRange = [80, 1200];
      lastNoiseReset = now;
      noiseOverflowCount = 0;
      log('warning', `${ch.id}: frequency overflow, range narrowed`);
    }
  }
  const noiseType = freqToNoiseType(clampedFreq);
  if (ch._bpFilter) {
    ch._bpFilter.frequency.setTargetAtTime(clampedFreq, audioCtx.currentTime, 0.1);
    ch._bpFilter.Q.value = 1.0;
  }
  ch.currentGain = ch.volume * 0.4;
  updateChannelValueDisplay(ch.id, value, `${clampedFreq.toFixed(0)} Hz (${noiseType})`);
}

// ============================================================
// Event sounds (chimes)
// ============================================================
function playChime(ascending, intensity) {
  if (!audioCtx || !isRunning) return;
  intensity = intensity || 1.0;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(masterGain);
  osc.type = 'sine';
  if (ascending) {
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.linearRampToValueAtTime(800 + intensity * 400, now + 0.15);
  } else {
    osc.frequency.setValueAtTime(600, now);
    osc.frequency.linearRampToValueAtTime(200 - intensity * 100, now + 0.2);
  }
  gain.gain.setValueAtTime(intensity * 0.3, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
  osc.start(now);
  osc.stop(now + 0.4);
}

// Event bus for status changes
const EventBus = {
  _lastValues: new Map(),
  ingest(metric, value) {
    const prev = this._lastValues.get(metric);
    if (prev !== undefined && value !== prev) {
      const delta = value - prev;
      const absDelta = Math.abs(delta);
      const relDelta = prev !== 0 ? absDelta / Math.abs(prev) : absDelta;
      if (relDelta > 0.2) {
        playChime(delta > 0, Math.min(relDelta, 3) / 3);
        log('info', `Event: ${metric} ${delta > 0 ? '+' : ''}${delta.toFixed(1)} (chime: ${delta > 0 ? 'ascending' : 'descending'})`);
      }
    }
    this._lastValues.set(metric, value);
    MetricBus.set(null, metric, value);
  }
};

// ============================================================
// Ambient Drone
// ============================================================
let ambientNodes = null;
function updateAmbientDrone(healthValue) {
  if (!audioCtx || !isRunning) return;
  if (!ambientNodes) {
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    osc1.type = 'sine';
    osc2.type = 'sine';
    osc1.frequency.value = 55;
    osc2.frequency.value = 82.5;
    osc1.connect(filter);
    osc2.connect(filter);
    filter.connect(gain);
    const hpMode = isHeadphoneMode ? 0.5 : 1.0;
    gain.gain.value = 0.08 * hpMode;
    gain.connect(masterGain);
    osc1.start();
    osc2.start();
    ambientNodes = { osc1, osc2, gain, filter };
  }
  const h = Math.max(0, Math.min(1, (healthValue || 50) / 100));
  const baseFreq = 50 + h * 30;
  ambientNodes.osc1.frequency.setTargetAtTime(baseFreq, audioCtx.currentTime, 0.5);
  ambientNodes.osc2.frequency.setTargetAtTime(baseFreq * 1.5, audioCtx.currentTime, 0.5);
  ambientNodes.filter.frequency.setTargetAtTime(200 + h * 600, audioCtx.currentTime, 0.3);
}

// ============================================================
// Headphone Mode
// ============================================================
function setHeadphoneMode(active) {
  isHeadphoneMode = active;
  const indicator = document.getElementById('headphoneIndicator');
  const btn = document.getElementById('headphoneToggle');
  if (active) {
    indicator.className = 'indicator active';
    indicator.textContent = 'HEADPHONE MODE';
    btn.classList.add('active');
  } else {
    indicator.className = 'indicator inactive';
    indicator.textContent = 'HEADPHONE MODE';
    btn.classList.remove('active');
  }
  for (const [id, ch] of channels) {
    if (!ch.pannerNode) continue;
    if (active) {
      if (id.includes('noise') || id.includes('error') || id.includes('churn')) {
        ch.pannerNode.pan.value = 1.0;
        log('info', `${ch.name}: routed to right ear (headphone mode)`);
      } else if (id.includes('rhythm') || id.includes('users')) {
        ch.pannerNode.pan.value = -0.3;
      } else {
        ch.pannerNode.pan.value = ch.pan || 0;
      }
    } else {
      ch.pannerNode.pan.value = ch.pan || 0;
    }
  }
  if (ambientNodes && ambientNodes.gain) {
    const targetGain = active ? 0.04 : 0.08;
    ambientNodes.gain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.1);
  }
  log('info', `Headphone mode: ${active ? 'ON' : 'OFF'}`);
}

// ============================================================
// UI: Channel Panels
// ============================================================
function createChannelPanel(ch) {
  const list = document.getElementById('channelList');
  const panel = document.createElement('div');
  panel.className = 'channel-panel';
  panel.id = `panel-${ch.id}`;

  panel.innerHTML = `
    <div class="channel-header">
      <span class="channel-name">${ch.name}</span>
      <span class="channel-value" id="val-${ch.id}">--</span>
    </div>
    <div class="channel-controls">
      <button id="mute-${ch.id}" class="js-mute" data-channel="${ch.id}" title="Mute">M</button>
      <button id="solo-${ch.id}" class="js-solo" data-channel="${ch.id}" title="Solo">S</button>
      <input type="range" id="vol-${ch.id}" class="js-volume" data-channel="${ch.id}" min="0" max="1" step="0.01" value="${ch.volume}">
      <input type="range" id="pan-${ch.id}" class="js-pan" data-channel="${ch.id}" min="-1" max="1" step="0.01" value="${ch.pan}" style="width:60px">
      <span style="font-size:10px;color:#475569;min-width:20px">PAN</span>
    </div>
    <div class="channel-meta">
      <span>${ch.type}</span>
      <span id="meta-${ch.id}">range: ${ch.range[0]}-${ch.range[1]}</span>
    </div>
  `;

  list.appendChild(panel);
  channelElements.set(ch.id, panel);

  panel.querySelector('.js-mute').addEventListener('click', () => toggleMute(ch.id));
  panel.querySelector('.js-solo').addEventListener('click', () => toggleSolo(ch.id));
  panel.querySelector('.js-volume').addEventListener('input', (e) => {
    ch.volume = parseFloat(e.target.value);
    ch.currentGain = ch.volume;
    if (!ch.muted && !(soloCount > 0 && !ch.soloed)) {
      if (ch.gainNode) ch.gainNode.gain.setTargetAtTime(ch.volume, audioCtx.currentTime, 0.02);
    }
  });
  panel.querySelector('.js-pan').addEventListener('input', (e) => {
    ch.pan = parseFloat(e.target.value);
    if (ch.pannerNode && !isHeadphoneMode) {
      ch.pannerNode.pan.value = ch.pan;
    }
  });
}

function updateChannelPanel(channelId) {
  const ch = channels.get(channelId);
  if (!ch) return;
  const panel = channelElements.get(channelId);
  if (!panel) return;
  panel.className = 'channel-panel';
  if (ch.muted) panel.classList.add('muted');
  if (ch.soloed) panel.classList.add('soloed');
  const muteBtn = panel.querySelector('.js-mute');
  const soloBtn = panel.querySelector('.js-solo');
  if (muteBtn) muteBtn.className = ch.muted ? 'active-mute' : '';
  if (soloBtn) soloBtn.className = ch.soloed ? 'active-solo' : '';
}

function updateChannelValueDisplay(channelId, value, extra) {
  const el = document.getElementById(`val-${channelId}`);
  if (el) {
    el.textContent = typeof value === 'number' ? value.toFixed(1) : value;
  }
  const meta = document.getElementById(`meta-${channelId}`);
  if (meta && extra) meta.textContent = extra;
}

function updateChannelUI() {
  for (const id of channels.keys()) {
    updateChannelPanel(id);
  }
}

function updateChannelCount() {
  document.getElementById('channelCount').textContent = `${channels.size} channels`;
}

// ============================================================
// UI: Metric Cards
// ============================================================
function createMetricCard(metric, value) {
  const grid = document.getElementById('metricsGrid');
  const card = document.createElement('div');
  card.className = 'metric-card';
  card.id = `mcard-${metric.replace(/\s+/g,'-')}`;
  card.innerHTML = `
    <div class="label">${metric}</div>
    <div class="value" id="mval-${metric.replace(/\s+/g,'-')}">${typeof value === 'number' ? value.toFixed(1) : value}</div>
  `;
  grid.appendChild(card);
}

function updateMetricCard(metric, value) {
  const id = metric.replace(/\s+/g, '-');
  const el = document.getElementById(`mval-${id}`);
  if (!el) {
    createMetricCard(metric, value);
    return;
  }
  const prev = parseFloat(el.textContent);
  el.textContent = typeof value === 'number' ? value.toFixed(1) : value;
  el.className = 'value';
  if (typeof value === 'number' && !isNaN(prev)) {
    if (value > prev + 0.5) el.classList.add('positive');
    else if (value < prev - 0.5) el.classList.add('negative');
  }
}

// ============================================================
// Visualisation
// ============================================================
function startVisualisation() {
  if (animFrameId) cancelAnimationFrame(animFrameId);
  if (!analyserNode || vizMode === 'off') return;
  const canvas = document.getElementById('vizCanvas');
  const ctx = canvas.getContext('2d');
  const w = canvas.width = canvas.parentElement.clientWidth;
  const h = canvas.height = canvas.parentElement.clientHeight;

  function draw() {
    if (!analyserNode || vizMode === 'off') {
      ctx.clearRect(0,0,w,h);
      animFrameId = requestAnimationFrame(draw);
      return;
    }
    const w2 = canvas.width = canvas.parentElement.clientWidth;
    const h2 = canvas.height = canvas.parentElement.clientHeight;
    ctx.fillStyle = '#0a0e17';
    ctx.fillRect(0,0,w2,h2);

    if (vizMode === 'freq') {
      const bufferLength = analyserNode.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      analyserNode.getByteFrequencyData(dataArray);
      const barWidth = w2 / bufferLength * 2.5;
      let x = 0;
      for (let i = 0; i < bufferLength; i++) {
        const barHeight = (dataArray[i] / 255) * h2;
        const hue = 200 + (dataArray[i] / 255) * 60;
        ctx.fillStyle = `hsl(${hue}, 80%, ${40 + dataArray[i] / 255 * 30}%)`;
        ctx.fillRect(x, h2 - barHeight, Math.max(barWidth - 1, 1), barHeight);
        x += barWidth;
      }
    } else if (vizMode === 'time') {
      const bufferLength = analyserNode.fftSize;
      const dataArray = new Float32Array(bufferLength);
      analyserNode.getFloatTimeDomainData(dataArray);
      ctx.strokeStyle = '#3b82f6';
      ctx.lineWidth = 2;
      ctx.beginPath();
      const sliceWidth = w2 / bufferLength;
      let x = 0;
      for (let i = 0; i < bufferLength; i++) {
        const y = (dataArray[i] * 0.5 + 0.5) * h2;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
        x += sliceWidth;
      }
      ctx.stroke();
    }
    animFrameId = requestAnimationFrame(draw);
  }
  draw();
}

// ============================================================
// Data Ingestion
// ============================================================
function ingestDataPoint(data) {
  if (!data || typeof data !== 'object') return;
  for (const [metric, value] of Object.entries(data)) {
    if (typeof value !== 'number') continue;
    EventBus.ingest(metric, value);
    updateMetricCard(metric, value);
    for (const [id, ch] of channels) {
      if (ch.config.metric === metric) {
        if (ch.type === 'oscillator') updateOscillatorChannel(ch, value);
        else if (ch.type === 'rhythm') updateRhythmChannel(ch, value);
        else if (ch.type === 'noise') updateNoiseChannel(ch, value);
      }
    }
    const avgHealth = [...channels.values()].reduce((s, c) => s + c.currentValue, 0) / Math.max(channels.size, 1);
    updateAmbientDrone(avgHealth);
    applySummationConstraint();
  }
}

// File drop handler
function setupFileDrop() {
  const area = document.querySelector('.main');
  area.addEventListener('dragover', (e) => { e.preventDefault(); area.style.opacity = '0.8'; });
  area.addEventListener('dragleave', () => { area.style.opacity = '1'; });
  area.addEventListener('drop', (e) => {
    e.preventDefault();
    area.style.opacity = '1';
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const parsed = JSON.parse(evt.target.result);
        if (Array.isArray(parsed)) {
          parsed.forEach(d => ingestDataPoint(d));
          log('info', `File ingested: ${file.name} (${parsed.length} data points)`);
        } else {
          ingestDataPoint(parsed);
          log('info', `File ingested: ${file.name}`);
        }
      } catch {
        log('error', `Failed to parse file: ${file.name}`);
      }
    };
    reader.readAsText(file);
  });
}

// POST endpoint listener (simulated EventSource for dev)
function setupPostListener() {
  const polling = setInterval(() => {
    if (window.__pendingData) {
      for (const d of window.__pendingData) ingestDataPoint(d);
      window.__pendingData = [];
    }
  }, 500);
  window.ingestPost = function(data) {
    if (!window.__pendingData) window.__pendingData = [];
    window.__pendingData.push(data);
  };
  log('info', 'POST ingestion endpoint ready. Call ingestPost({...}) to simulate.');
}

// Simulated data for demo
function setupDemoData() {
  const metrics = ['revenue', 'error_rate', 'active_users', 'latency', 'cpu_load', 'memory_usage'];
  const ranges = {
    revenue: [0, 100],
    error_rate: [0, 15],
    active_users: [0, 1000],
    latency: [0, 500],
    cpu_load: [0, 100],
    memory_usage: [0, 100]
  };
  const currents = {};

  metrics.forEach(m => {
    const [lo, hi] = ranges[m];
    currents[m] = lo + Math.random() * (hi - lo) * 0.3;
    metricValues.set(m, currents[m]);
  });

  setInterval(() => {
    metrics.forEach(m => {
      const [lo, hi] = ranges[m];
      const drift = (Math.random() - 0.5) * (hi - lo) * 0.05;
      currents[m] = Math.max(lo, Math.min(hi, currents[m] + drift));
      currents[m] += Math.sin(Date.now() / 10000 + metrics.indexOf(m)) * 0.5;
      currents[m] = Math.max(lo, Math.min(hi, currents[m]));
      ingestDataPoint({ [m]: currents[m] });
    });
  }, 1500);
}

// ============================================================
// Initialisation
// ============================================================
function init() {
  document.getElementById('startBtn').addEventListener('click', () => {
    setupAudio();
    document.getElementById('startOverlay').classList.add('hidden');

    createChannel({ id: 'revenue', name: 'Revenue', type: 'oscillator', oscType: 'sine', volume: 0.7, range: [0, 100], audioRange: [80, 800], metric: 'revenue', defaultValue: 50 });
    createChannel({ id: 'error_rate', name: 'Error Rate', type: 'noise', noiseType: 'pink', volume: 0.5, range: [0, 15], audioRange: [80, 4000], metric: 'error_rate', defaultValue: 2 });
    createChannel({ id: 'active_users', name: 'Active Users', type: 'rhythm', volume: 0.6, range: [0, 1000], metric: 'active_users', defaultValue: 300 });
    createChannel({ id: 'latency', name: 'Latency', type: 'oscillator', oscType: 'sawtooth', volume: 0.4, range: [0, 500], audioRange: [55, 300], metric: 'latency', defaultValue: 100 });
    createChannel({ id: 'cpu_load', name: 'CPU Load', type: 'oscillator', oscType: 'square', volume: 0.5, range: [0, 100], audioRange: [100, 500], metric: 'cpu_load', defaultValue: 30 });

    updateChannelCount();
    setupFileDrop();
    setupPostListener();
    setupDemoData();
    startVisualisation();
    updateAmbientDrone(50);
    log('info', 'Console fully initialised. Streaming demo data every 1.5s.');
  });

  // Headphone toggle
  document.getElementById('headphoneToggle').addEventListener('click', () => {
    if (!audioCtx) return;
    setHeadphoneMode(!isHeadphoneMode);
  });

  // Clear solos
  document.getElementById('soloResetBtn').addEventListener('click', clearAllSolos);

  // Mute all
  document.getElementById('muteAllBtn').addEventListener('click', muteAll);

  // Viz controls
  document.getElementById('vizFreqBtn').addEventListener('click', () => {
    vizMode = 'freq';
    document.querySelectorAll('.viz-controls button').forEach(b => b.classList.remove('active'));
    document.getElementById('vizFreqBtn').classList.add('active');
    updateAnalyser();
    startVisualisation();
  });
  document.getElementById('vizTimeBtn').addEventListener('click', () => {
    vizMode = 'time';
    document.querySelectorAll('.viz-controls button').forEach(b => b.classList.remove('active'));
    document.getElementById('vizTimeBtn').classList.add('active');
    updateAnalyser();
    startVisualisation();
  });
  document.getElementById('vizOffBtn').addEventListener('click', () => {
    vizMode = 'off';
    document.querySelectorAll('.viz-controls button').forEach(b => b.classList.remove('active'));
    document.getElementById('vizOffBtn').classList.add('active');
    if (analyserNode) {
      analyserNode.disconnect();
      analyserNode = null;
      analyserConnected = false;
    }
  });

  // Window resize for canvas
  window.addEventListener('resize', () => {
    if (vizMode !== 'off') startVisualisation();
  });

  log('info', 'Console loaded. Waiting for user gesture to enable audio.');
}

document.addEventListener('DOMContentLoaded', init);
</script>
