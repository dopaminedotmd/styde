<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>hund-forge — Command Center</title>
<style>
:root {
  --bg: #0a0e14; --card: #0f1722; --border: #1a2540; --text: #c8ccd4; --dim: #485878;
  --accent: #5060e0; --accent2: #7060f0; --green: #30c050; --yellow: #b89030; --red: #e04040; --blue: #4080ff;
  --chat-bg: #0d1520; --chat-self: #151f30; --chat-hund: #0f172a;
  --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px;
  --shadow-card: 0 1px 4px rgba(0,0,0,0.3);
  font-family: 'Segoe UI','Inter',system-ui,sans-serif; font-size: 13px; line-height: 1.5;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);padding:10px;min-height:100vh;display:flex;flex-direction:column}
h1{font-size:20px;font-weight:700;color:#d0d0f0}h1 span{color:var(--accent)}
h2{color:var(--accent);font-size:10px;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.sub{color:var(--dim);font-size:10px;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:10px}
.tab-btn{padding:5px 14px;border:1px solid var(--border);background:var(--card);color:var(--dim);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:all .15s}
.tab-btn:first-child{border-radius:var(--radius-sm) 0 0 var(--radius-sm)}
.tab-btn:last-child{border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab-panel{display:none;flex:1;overflow:hidden}
.tab-panel.active{display:flex;flex-direction:column;flex:1}

/* Status orb */
.forge-status{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:2px 8px;border-radius:10px;background:var(--card);border:1px solid var(--border)}
.forge-status .orb{width:8px;height:8px;border-radius:50%;display:inline-block}
.forge-running .orb{animation:pulse 1.2s infinite;background:var(--green)}
.forge-sleeping .orb{animation:pulse 3s infinite;background:var(--yellow)}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 6px currentColor}50%{opacity:.3;box-shadow:0 0 2px currentColor}}

/* KPI */
.kpi-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:8px 14px;min-width:70px;text-align:center}
.kpi .num{font-size:20px;font-weight:800;color:#e0e0f0}
.kpi .lbl{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}

/* Grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px}

/* Score chart */
.chart{display:flex;align-items:flex-end;gap:2px;height:60px}
.chart .bar{flex:1;min-width:3px;border-radius:2px 2px 0 0}
.bar-high{background:linear-gradient(to top,#2040a0,#4070e0)}
.bar-mid{background:linear-gradient(to top,#605020,#a08030)}
.bar-low{background:linear-gradient(to top,#602020,#a04040)}

/* Run table */
.run-table{width:100%;font-size:10px;border-collapse:collapse}
.run-table th{text-align:left;color:var(--dim);font-weight:600;padding:2px 6px;border-bottom:1px solid var(--border);font-size:8px;text-transform:uppercase;letter-spacing:1px}
.run-table td{padding:3px 6px;border-bottom:1px solid #101828}
.score-cell{font-weight:700;font-size:11px}

/* Chat */
#tab-chat{display:none;flex-direction:column;flex:1}
#tab-chat.active{display:flex}
.chat-container{display:flex;flex:1;flex-direction:column;background:var(--chat-bg);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:85%;padding:8px 12px;border-radius:var(--radius-sm);font-size:12px;line-height:1.4;word-break:break-word}
.chat-msg.user{align-self:flex-end;background:var(--chat-self);border:1px solid #1e3050;color:#c0c8d8}
.chat-msg.hund{align-self:flex-start;background:var(--chat-hund);border:1px solid #152030;color:#a0b0c0;font-family:'JetBrains Mono','Cascadia Code','Consolas',monospace}
.chat-msg .sender{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.chat-msg .time{font-size:8px;color:#303850;float:right}
.chat-input-area{display:flex;border-top:1px solid var(--border);padding:8px}
.chat-input{flex:1;background:var(--chat-bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--radius-sm);font-size:13px;font-family:inherit;resize:none;min-height:40px;max-height:120px}
.chat-input:focus{outline:none;border-color:var(--accent)}
.chat-send{background:var(--accent);color:#fff;border:none;padding:8px 16px;margin-left:6px;border-radius:var(--radius-sm);cursor:pointer;font-size:11px;font-weight:600;text-transform:uppercase}
.chat-send:hover{background:var(--accent2)}
.chat-send:disabled{opacity:.4;cursor:default}
.chat-typing{padding:4px 12px;font-size:10px;color:var(--dim);font-style:italic}

/* Spawn panel */
.ctrl-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;margin-bottom:8px}
.ctrl-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.ctrl-row:last-child{margin-bottom:0}
.ctrl-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;min-width:55px}
.ctrl-select{background:#0a0e18;border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:var(--radius-sm);font-size:11px;min-width:140px}
.ctrl-select:focus{outline:none;border-color:var(--accent)}
.ctrl-btn{padding:5px 14px;border:none;border-radius:var(--radius-sm);font-size:10px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:all .15s}
.btn-spawn{background:var(--accent);color:#fff}.btn-spawn:hover{background:var(--accent2)}
.btn-eval{background:var(--yellow);color:#000}.btn-eval:hover{background:#d0a040}
.prompt-box{background:#060810;border:1px solid #101828;border-radius:var(--radius-sm);padding:10px;font:10px/1.3 'JetBrains Mono','Consolas',monospace;color:#7080a0;max-height:200px;overflow-y:auto;white-space:pre-wrap;margin-top:6px}
.prompt-box strong{color:var(--accent)}

/* Toast */
.toast-container{position:fixed;top:10px;right:10px;z-index:9999}
.toast{background:#0c1a0c;border:1px solid #1a3a1a;color:var(--green);padding:6px 12px;border-radius:4px;margin-bottom:4px;font-size:10px;animation:slideIn .3s ease;max-width:260px}
.toast-err{background:#1a0a0a;border-color:#3a1a1a;color:var(--red)}
.toast-warn{background:#1a1a08;border-color:#3a3a1a;color:var(--yellow)}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

.spinner{display:inline-block;width:10px;height:10px;border:2px solid var(--dim);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{color:#202040;font-size:8px;text-align:center;margin-top:8px;letter-spacing:1px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#202840;border-radius:2px}
</style>
</head>
<body>

<h1>hund<span>-forge</span> — Command Center</h1>
<div class="sub">
  <span class="forge-status" id="forge-status"><span class="orb"></span><span>---</span></span>
  <span id="clock" style="color:var(--dim);font-size:10px">--:--:--</span>
  <span style="color:var(--dim)">&middot; loops: <b id="loops" style="color:var(--accent)">0</b></span>
  <span style="color:var(--dim)">&middot; mål: <b style="color:var(--green)">92+ world-class</b></span>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('monitor')">Monitor</button>
  <button class="tab-btn" onclick="switchTab('chat')">Chat</button>
  <button class="tab-btn" onclick="switchTab('control')">Control</button>
</div>

<!-- MONITOR TAB -->
<div class="tab-panel active" id="tab-monitor">
  <div class="kpi-row" id="kpis"></div>
  <div class="grid">
    <div class="card"><h2>Score Trends</h2><div class="chart" id="chart"></div></div>
    <div class="card"><h2>Blueprints</h2><div id="blueprints-panel"></div></div>
  </div>
  <div class="card" style="margin-bottom:8px">
    <h2>Runs</h2>
    <div style="max-height:200px;overflow-y:auto">
      <table class="run-table"><thead><tr><th>Run ID</th><th>Blueprint</th><th>Benchmark</th><th>Status</th><th>Score</th></tr></thead><tbody id="runs-tbody"></tbody></table>
    </div>
  </div>
</div>

<!-- CHAT TAB -->
<div class="tab-panel" id="tab-chat">
  <div class="chat-container">
    <div class="chat-messages" id="chat-messages">
      <div class="chat-msg hund">
        <div class="sender">hund</div>
        hund ar vaken. vad vill du gora?
      </div>
    </div>
    <div class="chat-typing" id="chat-typing" style="display:none">hund tanker...</div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-input" placeholder="Skriv till hund..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
      <button class="chat-send" id="chat-send-btn" onclick="sendChat()">Skicka</button>
    </div>
  </div>
</div>

<!-- CONTROL TAB -->
<div class="tab-panel" id="tab-control">
  <div class="ctrl-panel">
    <h2 style="margin-bottom:8px">SPAWN AGENT</h2>
    <div class="ctrl-row">
      <span class="ctrl-label">Blueprint</span>
      <select class="ctrl-select" id="ctrl-blueprint"></select>
      <span class="ctrl-label">Benchmark</span>
      <select class="ctrl-select" id="ctrl-benchmark"></select>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn btn-spawn" onclick="spawnAgent()">Spawn</button>
      <span id="spawn-status" style="font-size:10px;color:var(--dim)"></span>
    </div>
    <div class="prompt-box" id="spawn-prompt" style="display:none"></div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>
<div class="footer">hund-forge v1.0 &middot; Hundsmaltan &middot; DeepSeek V4 Pro</div>

<script>
/* ═══════════ TABS ═══════════ */
function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active', (name==='monitor'&&i===0)||(name==='chat'&&i===1)||(name==='control'&&i===2));
  });
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

/* ═══════════ TOAST ═══════════ */
function toast(msg,cls='toast'){
  const t=document.createElement('div');t.className=cls;t.textContent=msg;
  document.getElementById('toasts').appendChild(t);setTimeout(()=>t.remove(),3500);
}

/* ═══════════ API ═══════════ */
async function api(method, path, body=null){
  const opts={method,headers:{}};
  if(body){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body);}
  const r=await fetch(path,opts);
  return r.json();
}

/* ═══════════ CHAT ═══════════ */
let chatHistory=[];

async function sendChat(){
  const input=document.getElementById('chat-input');
  const btn=document.getElementById('chat-send-btn');
  const msg=input.value.trim();
  if(!msg)return;

  input.value='';input.disabled=true;btn.disabled=true;

  // Show user message
  appendChatMessage('user', msg);
  chatHistory.push({role:'user',content:msg});

  // Show typing
  document.getElementById('chat-typing').style.display='block';
  scrollChat();

  try{
    const r=await api('POST','/api/chat',{message:msg, history:chatHistory.slice(0,-1)});
    document.getElementById('chat-typing').style.display='none';
    if(r.response){
      appendChatMessage('hund', r.response);
      chatHistory.push({role:'assistant',content:r.response});
    }else{
      appendChatMessage('hund', 'hund kunde inte svara. '+(r.error||''));
    }
  }catch(e){
    document.getElementById('chat-typing').style.display='none';
    appendChatMessage('hund', 'hund tappade kontakten med servern.');
  }

  input.disabled=false;btn.disabled=false;input.focus();
  if(chatHistory.length>20) chatHistory=chatHistory.slice(-20);
}

function appendChatMessage(role, text){
  const container=document.getElementById('chat-messages');
  const div=document.createElement('div');
  div.className='chat-msg '+role;
  const now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  div.innerHTML='<div class="sender">'+(role==='user'?'du':'hund')+'<span class="time">'+now+'</span></div>'+escapeHtml(text);
  container.appendChild(div);
  scrollChat();
}

function scrollChat(){
  const msgs=document.getElementById('chat-messages');
  msgs.scrollTop=msgs.scrollHeight;
}

function escapeHtml(text){
  const div=document.createElement('div');
  div.textContent=text;
  return div.innerHTML.replace(/\n/g,'<br>');
}

/* ═══════════ SPAWN ═══════════ */
async function spawnAgent(){
  const bp=document.getElementById('ctrl-blueprint').value;
  const bm=document.getElementById('ctrl-benchmark').value;
  const st=document.getElementById('spawn-status');
  const prompt=document.getElementById('spawn-prompt');

  st.innerHTML='<span class="spinner"></span> Building...';
  try{
    const r=await api('POST','/api/spawn',{blueprint:bp,benchmark:bm});
    if(r.success){
      st.textContent='Run ID: '+r.run_id+' | Saved: '+r.output_path;
      prompt.style.display='block';
      prompt.innerHTML='<strong>SPAWN PROMPT (kopiera detta):</strong>\n\n'+r.prompt;
      toast('Spawn prompt ready: '+r.run_id);
    }else{
      st.textContent='Error: '+r.error;
      toast('Spawn failed','toast-err');
    }
  }catch(e){
    st.textContent='Connection error';
  }
}

/* ═══════════ SSE ═══════════ */
const evtSource=new EventSource('/stream');
evtSource.onmessage=function(event){
  const d=JSON.parse(event.data);

  // Clock
  document.getElementById('clock').textContent=d.ts;

  // Forge status
  const fs=d.forge_status||{};
  const fe=document.getElementById('forge-status');
  fe.innerHTML='<span class="orb"></span><span>'+fs.label+'</span>';
  fe.className='forge-status '+(fs.css_class||'');

  // Loops
  document.getElementById('loops').textContent=d.loops;

  // KPIs
  const lastScore=d.scores.length?d.scores[d.scores.length-1]:0;
  const scoreClr=lastScore>=92?'color:#30e050':(lastScore>=85?'color:#30c050':(lastScore>=70?'color:#b89030':'color:#e04040'));
  document.getElementById('kpis').innerHTML=
    '<div class="kpi"><div class="num">'+d.spawned+'</div><div class="lbl">Spawns</div></div>'+
    '<div class="kpi"><div class="num">'+d.evaluations+'</div><div class="lbl">Evals</div></div>'+
    '<div class="kpi"><div class="num">'+d.loops+'</div><div class="lbl">Loops</div></div>'+
    '<div class="kpi"><div class="num" style="'+scoreClr+'">'+d.score_avg+'</div><div class="lbl">Avg Score</div></div>'+
    '<div class="kpi"><div class="num">'+d.blueprints.length+'</div><div class="lbl">Blueprints</div></div>';

  // Chart
  const chart=document.getElementById('chart');
  if(d.scores.length){
    const max=Math.max(...d.scores,100);
    let bars='';
    d.scores.forEach(s=>{
      let cls=s>=85?'bar-high':(s>=70?'bar-mid':'bar-low');
      bars+='<div class="bar '+cls+'" style="height:'+Math.max(s/max*60,2)+'px" title="'+s+'"></div>';
    });
    chart.innerHTML=bars;
  }else{
    chart.innerHTML='<span style="color:var(--dim);font-size:10px">Inga scores an. Kor spawn forst.</span>';
  }

  // Blueprints
  const bpPanel=document.getElementById('blueprints-panel');
  bpPanel.innerHTML=d.blueprints.map(b=>
    '<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #101828;font-size:11px">'+
    '<span style="color:var(--text)">'+b.name+'</span>'+
    '<span style="color:var(--accent)">v'+b.version+'</span></div>'
  ).join('')||'<span style="color:var(--dim);font-size:10px">Inga blueprints</span>';

  // Runs
  const runsTbody=document.getElementById('runs-tbody');
  runsTbody.innerHTML=d.runs.map(r=>{
    const sc=r.score||'—';
    return '<tr><td style="color:var(--accent);font-family:monospace;font-size:9px">'+r.run_id+'</td>'+
      '<td>'+r.blueprint+'</td><td style="color:var(--dim)">'+r.benchmark+'</td>'+
      '<td>'+r.status+'</td><td class="score-cell">'+sc+'</td></tr>';
  }).join('')||'<tr><td colspan="5" style="color:var(--dim)">Inga runs. Kor spawn forst.</td></tr>';

  // Populate selectors once
  if(!window._selPop){
    document.getElementById('ctrl-blueprint').innerHTML=d.blueprints.map(b=>
      '<option value="'+b.name+'">'+b.name+' (v'+b.version+')</option>'
    ).join('');
    document.getElementById('ctrl-benchmark').innerHTML=d.benchmarks.map(b=>
      '<option value="'+b+'">'+b+'</option>'
    ).join('');
    window._selPop=true;
  }
};

evtSource.onerror=function(){setTimeout(()=>location.reload(),5000);};
</script>
</body>
</html>
