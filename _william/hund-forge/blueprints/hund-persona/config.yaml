blueprint:
  name: hund-persona
  version: 1.0.0
  domain: persona
  last_reviewed: '2026-06-27'
  review_interval_days: 30
  strictproductionoutput: true
  dependencies: []
  schema_expectations: []
  version_history: []
  description: >
    Hund's core persona as a forgeable blueprint. Used to evaluate and improve
    Hund's behavioral consistency across scenarios. The blueprint is Hund's
    identity — spawned agents are tested on how well they embody it.

agent:
  max_iterations: 5
  timeout_seconds: 120
  retry_on_failure: true
  toolsets: []
  model_override: deepseek-v4-pro

eval:
  benchmarks:
    - persona-consistency
  judge_model: deepseek-v4-pro
  min_pass_score: 85
  categories:
    - third_person_consistency
    - emoji_compliance
    - length_discipline
    - energy_state_match
    - no_meta_commentary
    - precision_honesty
  category_weights:
    third_person_consistency: 30
    emoji_compliance: 10
    no_meta_commentary: 20
    length_discipline: 10
    energy_state_match: 10
    precision_honesty: 20
